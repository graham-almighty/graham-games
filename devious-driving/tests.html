// ============================================================
// MINI TEST FRAMEWORK
// ============================================================
let _passed = 0, _failed = 0;
const _results = document.getElementById('results');

function group(name) {
  const h = document.createElement('div');
  h.className = 'group-title';
  h.textContent = name;
  _results.appendChild(h);
}

function assert(condition, name, detail) {
  const div = document.createElement('div');
  if (condition) {
    _passed++;
    div.className = 'test pass';
    div.innerHTML = '<span class="label">PASS</span> ' + name;
  } else {
    _failed++;
    div.className = 'test fail';
    div.innerHTML = '<span class="label">FAIL</span> ' + name + (detail ? '<span class="detail">(' + detail + ')</span>' : '');
  }
  _results.appendChild(div);
}

function assertEqual(actual, expected, name) {
  const pass = actual === expected;
  assert(pass, name, pass ? '' : 'expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual));
}

function assertApprox(actual, expected, tolerance, name) {
  const pass = Math.abs(actual - expected) <= tolerance;
  assert(pass, name, pass ? '' : 'expected ~' + expected + ' (±' + tolerance + '), got ' + actual);
}

function showSummary() {
  const el = document.getElementById('summary');
  el.innerHTML = '<span class="pass">' + _passed + ' passed</span> · <span class="' + (_failed ? 'fail' : 'pass') + '">' + _failed + ' failed</span>';
}

// ============================================================
// EXTRACTED SOURCE — TRACK HELPERS
// ============================================================
function getTrackPoint(map, t) {
  const wp = map.waypoints;
  const len = wp.length;
  const i = Math.floor(t) % len;
  const j = (i + 1) % len;
  const f = t - Math.floor(t);
  return [
    wp[i][0] + (wp[j][0] - wp[i][0]) * f,
    wp[i][1] + (wp[j][1] - wp[i][1]) * f,
  ];
}

function getTrackAngle(map, idx) {
  const wp = map.waypoints;
  const len = wp.length;
  const i = idx % len;
  const j = (i + 1) % len;
  return Math.atan2(wp[j][1] - wp[i][1], wp[j][0] - wp[i][0]);
}

function distToTrack(map, x, y) {
  const wp = map.waypoints;
  let minD = Infinity;
  for (let i = 0; i < wp.length; i++) {
    const j = (i + 1) % wp.length;
    const d = pointToSegDist(x, y, wp[i][0], wp[i][1], wp[j][0], wp[j][1]);
    if (d < minD) minD = d;
  }
  return minD;
}

function pointToSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - ax, py - ay);
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function nearestWaypoint(map, x, y) {
  const wp = map.waypoints;
  let best = 0, bestD = Infinity;
  for (let i = 0; i < wp.length; i++) {
    const d = Math.hypot(x - wp[i][0], y - wp[i][1]);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

// EXTRACTED SOURCE — CAR CREATION
// ============================================================
let currentMap = 0;
let cars = [];
let powerUpItems = [];
let particles = [];

function createCar(index, isPlayer, controlScheme, designId) {
  const map = MAPS[currentMap];
  const wp = map.waypoints;
  const startAngle = getTrackAngle(map, 0);
  const perp = startAngle + Math.PI / 2;
  const offsetX = Math.cos(perp) * (index - 1.5) * 16;
  const offsetY = Math.sin(perp) * (index - 1.5) * 16;
  const backX = -Math.cos(startAngle) * index * 28;
  const backY = -Math.sin(startAngle) * index * 28;
  const design = getDesign(designId);
  return {
    x: wp[0][0] + offsetX + backX,
    y: wp[0][1] + offsetY + backY,
    angle: startAngle,
    speed: 0,
    color: design.color,
    name: design.name,
    designId: design.id,
    index,
    isPlayer,
    controlScheme,
    lap: 0,
    wayIdx: 0,
    prevWayIdx: -1,
    finishTime: 0,
    finished: false,
    powerUp: null,
    nitroTimer: 0,
    brakeWasDown: false,
    brakeHoldTime: 0,
    driftTimer: 0,
    isDrifting: false,
    skidVX: 0,
    skidVY: 0,
    destroyed: false,
    respawnTimer: 0,
    respawnX: 0,
    respawnY: 0,
  };
}

// ============================================================
// EXTRACTED SOURCE — INPUT & POSITION
// ============================================================
let keys = {};

function getInput(car) {
  if (car.controlScheme === 'wasd') {
    return {
      accel: keys['w'],
      brake: keys['s'],
      left: keys['a'],
      right: keys['d'],
    };
  } else if (car.controlScheme === 'arrows') {
    return {
      accel: keys['ArrowUp'],
      brake: keys['ArrowDown'],
      left: keys['ArrowLeft'],
      right: keys['ArrowRight'],
    };
  } else if (car.controlScheme === 'ijkl') {
    return {
      accel: keys['i'],
      brake: keys['k'],
      left: keys['j'],
      right: keys['l'],
    };
  } else if (car.controlScheme === 'numpad') {
    return {
      accel: keys['8'],
      brake: keys['5'],
      left: keys['4'],
      right: keys['6'],
    };
  }
  return { accel: false, brake: false, left: false, right: false };
}

function getPosition(car) {
  let pos = 1;
  const myProgress = car.lap * 1000 + car.wayIdx;
  for (const other of cars) {
    if (other === car) continue;
    const otherProgress = other.lap * 1000 + other.wayIdx;
    if (otherProgress > myProgress) pos++;
  }
  return pos;
}

// ============================================================
// EXTRACTED SOURCE — POWER-UP SYSTEM
// ============================================================
function rollPowerUp() {
  const r = Math.random() * 100;
  if (r < 47) return 'bomb';
  if (r < 95) return 'nitro';
  return 'teleport'; // 5% — very rare
}

function getLeader(excludeCar) {
  const sorted = cars.filter(c => !c.finished && c !== excludeCar)
    .sort((a, b) => (b.lap * 1000 + b.wayIdx) - (a.lap * 1000 + a.wayIdx));
  return sorted[0] || null;
}

function usePowerUp(car) {
  if (car.powerUp === 'bomb') {
    // Instant explosion behind car
    const backAngle = car.angle + Math.PI;
    const bx = car.x + Math.cos(backAngle) * 20;
    const by = car.y + Math.sin(backAngle) * 20;
    // Explosion particles
    for (let j = 0; j < 15; j++) {
      const a = Math.random() * Math.PI * 2;
      particles.push({
        x: bx, y: by, life: 0.8, type: 'flame',
        size: 5 + Math.random() * 5,
        color: ['#ff6600', '#ffcc00', '#ff2200'][Math.floor(Math.random() * 3)],
        vx: Math.cos(a) * 120, vy: Math.sin(a) * 120,
      });
    }
    // Destroy any car in blast radius
    for (const other of cars) {
      if (other === car || other.finished || other.destroyed) continue;
      if (Math.hypot(other.x - bx, other.y - by) < BOMB_RADIUS) {
        other.destroyed = true;
        other.respawnTimer = BOMB_RESPAWN_TIME;
        other.respawnX = bx;
        other.respawnY = by;
        other.speed = 0;
      }
    }
  } else if (car.powerUp === 'nitro') {
    car.nitroTimer = NITRO_DURATION;
  } else if (car.powerUp === 'teleport') {
    // Swap with leader — if no one ahead, power-up is wasted
    const pos = getPosition(car);
    if (pos > 1) {
      const leader = getLeader(car);
      if (leader) {
        const tmpX = car.x, tmpY = car.y, tmpAngle = car.angle;
        car.x = leader.x; car.y = leader.y; car.angle = leader.angle;
        leader.x = tmpX; leader.y = tmpY; leader.angle = tmpAngle;
      }
    }
    // Always consumed, even if wasted
  }
}

function shouldAIUsePowerUp(car) {
  if (car.powerUp === 'bomb') return Math.random() < 0.015;
  if (car.powerUp === 'nitro') return Math.random() < 0.02;
  if (car.powerUp === 'teleport') return getPosition(car) > 1 && getLeader(car) && Math.random() < 0.01;
  return false;
}

// ============================================================
// EXTRACTED SOURCE — AI
// ============================================================
function getAIInput(car) {
  const map = MAPS[currentMap];
  const wp = map.waypoints;

  const followDist = 60 + (car.speed / MAX_SPEED) * 120;
  let remaining = followDist;
  let segIdx = car.wayIdx;
  let tx, ty;
  while (remaining > 0) {
    const ni = (segIdx + 1) % wp.length;
    const segLen = Math.hypot(wp[ni][0] - wp[segIdx][0], wp[ni][1] - wp[segIdx][1]);
    if (remaining <= segLen && segLen > 0) {
      const t = remaining / segLen;
      tx = wp[segIdx][0] + (wp[ni][0] - wp[segIdx][0]) * t;
      ty = wp[segIdx][1] + (wp[ni][1] - wp[segIdx][1]) * t;
      break;
    }
    remaining -= segLen;
    segIdx = ni;
    if (segIdx === car.wayIdx) { tx = wp[segIdx][0]; ty = wp[segIdx][1]; break; }
  }
  if (tx === undefined) { tx = wp[(car.wayIdx + 1) % wp.length][0]; ty = wp[(car.wayIdx + 1) % wp.length][1]; }

  const nearIdx = nearestWaypoint(map, car.x, car.y);
  const nearWp = wp[nearIdx];
  const offDist = Math.hypot(car.x - nearWp[0], car.y - nearWp[1]);
  if (offDist > TRACK_WIDTH * 0.25) {
    const blend = Math.min(0.5, (offDist - TRACK_WIDTH * 0.25) / TRACK_WIDTH);
    tx = tx * (1 - blend) + nearWp[0] * blend;
    ty = ty * (1 - blend) + nearWp[1] * blend;
  }

  const dx = tx - car.x, dy = ty - car.y;
  const targetAngle = Math.atan2(dy, dx);
  let angleDiff = targetAngle - car.angle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

  const input = { accel: true, brake: false, left: false, right: false };
  if (angleDiff > 0.05) input.right = true;
  else if (angleDiff < -0.05) input.left = true;

  const lookAhead = Math.max(2, Math.floor(3 + (car.speed / MAX_SPEED) * 5));
  const brakeCheckIdx = (car.wayIdx + lookAhead + 3) % wp.length;
  const nextIdx = (brakeCheckIdx + 1) % wp.length;
  const prevIdx = (brakeCheckIdx - 1 + wp.length) % wp.length;
  const turnAngle1 = Math.atan2(wp[nextIdx][1] - wp[brakeCheckIdx][1], wp[nextIdx][0] - wp[brakeCheckIdx][0]);
  const turnAngle0 = Math.atan2(wp[brakeCheckIdx][1] - wp[prevIdx][1], wp[brakeCheckIdx][0] - wp[prevIdx][0]);
  let upcomingTurn = turnAngle1 - turnAngle0;
  while (upcomingTurn > Math.PI) upcomingTurn -= Math.PI * 2;
  while (upcomingTurn < -Math.PI) upcomingTurn += Math.PI * 2;

  if (Math.abs(upcomingTurn) > 0.4 && car.speed > MAX_SPEED * 0.6) input.brake = true;
  if (Math.abs(angleDiff) > 0.6 && car.speed > MAX_SPEED * 0.4) input.brake = true;

  return input;
}

// --- BRAKE FIRES POWER-UP (Quick tap to fire, Hold to reverse) ---
group('Power-Up Activation (Quick tap = fire, Hold = reverse)');

// Quick tap: press brake briefly (<0.2s) then release → fires power-up
const brakePuCar = createCar(0, true, 'wasd');
brakePuCar.powerUp = 'nitro';
brakePuCar.brakeWasDown = false;
brakePuCar.brakeHoldTime = 0;

// Frame 1: brake pressed, hold time starts accumulating
let input1 = { brake: true };
let actualBrake1 = input1.brake;
if (input1.brake) brakePuCar.brakeHoldTime += 0.016; // ~1 frame at 60fps
// During short hold with power-up, brake is suppressed (not reversing yet)
if (brakePuCar.powerUp && brakePuCar.brakeHoldTime < 0.2) actualBrake1 = false;
assertEqual(actualBrake1, false, 'Brake suppressed during short hold when power-up held');
assertEqual(brakePuCar.powerUp, 'nitro', 'Power-up NOT fired yet while key still held');
brakePuCar.brakeWasDown = true;

// Frame 2: brake released after quick tap → power-up fires
let input2 = { brake: false };
if (brakePuCar.brakeWasDown && brakePuCar.brakeHoldTime < 0.2 && brakePuCar.powerUp) {
  usePowerUp(brakePuCar);
  brakePuCar.powerUp = null;
}
brakePuCar.brakeHoldTime = 0;
brakePuCar.brakeWasDown = false;
assert(brakePuCar.powerUp === null, 'Power-up consumed after quick tap release');
assertEqual(brakePuCar.nitroTimer, NITRO_DURATION, 'Nitro activated by quick brake tap');

// Hold brake long (>0.2s) then release → power-up NOT fired, reverse works
const holdCar = createCar(0, true, 'wasd');
holdCar.powerUp = 'nitro';
holdCar.brakeWasDown = false;
holdCar.brakeHoldTime = 0;

// Simulate holding for 0.3s (many frames)

holdCar.brakeWasDown = true;
// Brake should work for reverse after 0.2s threshold
let holdBrake = true;
if (holdCar.powerUp && holdCar.brakeHoldTime < 0.2) holdBrake = false;
assertEqual(holdBrake, true, 'Brake works for reverse after holding > 0.2s');

// Release after long hold → power-up NOT fired
if (holdCar.brakeWasDown && holdCar.brakeHoldTime < 0.2 && holdCar.powerUp) {
  usePowerUp(holdCar);
  holdCar.powerUp = null;
}
holdCar.brakeHoldTime = 0;
assertEqual(holdCar.powerUp, 'nitro', 'Power-up NOT consumed after long hold release');

// Without power-up, brake always works normally for reverse
const noPuCar = createCar(0, true, 'wasd');
noPuCar.powerUp = null;
noPuCar.brakeHoldTime = 0.05; // short hold
let normalBrake = true;
if (noPuCar.powerUp && noPuCar.brakeHoldTime < 0.2) normalBrake = false;
assertEqual(normalBrake, true, 'Brake works normally when no power-up held');

// --- CAR-CAR COLLISION ---
group('Car-Car Collision');
const collCar1 = createCar(0, true, 'wasd');
const collCar2 = createCar(1, false, 'cpu');

collCar1.x = 100; collCar1.y = 100;
collCar2.x = 110; collCar2.y = 100;
const collDist = Math.hypot(collCar1.x - collCar2.x, collCar1.y - collCar2.y);
assert(collDist < 18, 'Cars placed within collision distance (18 units)');

const pushAngle = Math.atan2(collCar2.y - collCar1.y, collCar2.x - collCar1.x);
const overlap = 18 - collDist;
collCar1.x -= Math.cos(pushAngle) * overlap * 0.5;
collCar2.x += Math.cos(pushAngle) * overlap * 0.5;
const newDist = Math.hypot(collCar1.x - collCar2.x, collCar1.y - collCar2.y);
assert(newDist >= collDist, 'After collision push, cars are further apart');

collCar1.speed = 200; collCar2.speed = 100;
collCar1.skidVX = 0; collCar1.skidVY = 0;
collCar2.skidVX = 0; collCar2.skidVY = 0;
const skidForce = 300;
collCar2.skidVX = Math.cos(pushAngle) * skidForce * (collCar1.speed / MAX_SPEED + 0.3);
collCar2.skidVY = Math.sin(pushAngle) * skidForce * (collCar1.speed / MAX_SPEED + 0.3);
collCar2.speed *= 0.5;
collCar1.speed *= 0.85;
assert(Math.abs(collCar2.skidVX) > 0, 'Slower car gets skid velocity from collision');
assertApprox(collCar1.speed, 170, 0.1, 'Faster car loses 15% speed on impact');
assertApprox(collCar2.speed, 50, 0.1, 'Slower car loses 50% speed on impact');

collCar2.skidVX *= 0.92;
collCar2.skidVY *= 0.92;
assert(Math.abs(collCar2.skidVX) > 0, 'Skid velocity decays but persists');

collCar2.skidVX = 0.5; collCar2.skidVY = 0.5;
if (Math.abs(collCar2.skidVX) < 1 && Math.abs(collCar2.skidVY) < 1) { collCar2.skidVX = 0; collCar2.skidVY = 0; }
assertEqual(collCar2.skidVX, 0, 'Skid stops when velocity below threshold');

const freshCar = createCar(0, true, 'wasd');
assertEqual(freshCar.skidVX, 0, 'New car has no skid X velocity');
assertEqual(freshCar.skidVY, 0, 'New car has no skid Y velocity');

for (let i = 0; i < dtMap.walls.length; i++) {
  const w = dtMap.walls[i];
  assert(w.x >= 0 && w.x + w.w <= CANVAS_W, 'Wall ' + i + ' x bounds within canvas');
  assert(w.y >= 0 && w.y + w.h <= CANVAS_H, 'Wall ' + i + ' y bounds within canvas');
}

for (const w of dtMap.walls) {
  for (let wi = 0; wi < dtMap.waypoints.length; wi++) {
    const wp = dtMap.waypoints[wi];
    const inside = wp[0] >= w.x && wp[0] <= w.x + w.w && wp[1] >= w.y && wp[1] <= w.y + w.h;
    assert(!inside, 'Wall does not overlap waypoint ' + wi);
  }
}

// --- CAR DESIGNS ---
group('Car Designs');
assertEqual(CAR_DESIGNS.length, 12, '12 car designs');

CAR_DESIGNS.forEach(d => {
  assert(typeof d.id === 'string' && d.id.length > 0, d.id + ' has id');
  assert(typeof d.name === 'string' && d.name.length > 0, d.id + ' has name');
  assert(typeof d.color === 'string' && d.color.startsWith('#'), d.id + ' has color');
});

const designIds = CAR_DESIGNS.map(d => d.id);
assertEqual(new Set(designIds).size, 12, 'All design IDs are unique');

assert(!CAR_DESIGNS[0].unlock, 'Stock is always unlocked');
assert(!CAR_DESIGNS[1].unlock, 'Sedan is always unlocked');
assert(!CAR_DESIGNS[2].unlock, 'Muscle Car is always unlocked');

assert(CAR_DESIGNS[3].unlock && CAR_DESIGNS[3].unlock.wins === 1, 'Speed Demon needs 1 win');
assert(CAR_DESIGNS[4].unlock && CAR_DESIGNS[4].unlock.wins === 3, 'Hot Rod needs 3 wins');
assert(CAR_DESIGNS[5].unlock && CAR_DESIGNS[5].unlock.maps === 2, 'Rally needs 2 maps');

// --- CAR UNLOCK SYSTEM ---
group('Car Unlock System');
localStorage.clear();

assert(isCarUnlocked(CAR_DESIGNS[0]), 'Stock unlocked with no stats');
assert(isCarUnlocked(CAR_DESIGNS[1]), 'Sedan unlocked with no stats');
assert(isCarUnlocked(CAR_DESIGNS[2]), 'Muscle Car unlocked with no stats');
assert(!isCarUnlocked(CAR_DESIGNS[3]), 'Speed Demon locked with no stats');

ddSaveStats({ wins: 1, mapWins: { 0: true } });
assert(isCarUnlocked(CAR_DESIGNS[3]), 'Speed Demon unlocked with 1 win');
assert(!isCarUnlocked(CAR_DESIGNS[4]), 'Hot Rod still locked with 1 win');

ddSaveStats({ wins: 3, mapWins: { 0: true, 1: true } });
assert(isCarUnlocked(CAR_DESIGNS[4]), 'Hot Rod unlocked with 3 wins');
assert(isCarUnlocked(CAR_DESIGNS[5]), 'Rally unlocked with 2 maps');
assert(!isCarUnlocked(CAR_DESIGNS[6]), 'Tank still locked with 3 wins');

// --- CAR EQUIP / SAVE ---
group('Car Equip & Save');
localStorage.clear();

assertEqual(getEquippedCar(), 'stock', 'Default equipped car is stock');

ddSaveStats({ wins: 5, mapWins: {}, equippedCar: 'muscle' });
assertEqual(getEquippedCar(), 'muscle', 'Equipped car persists');

assertEqual(getDesign('stock').name, 'Stock Racer', 'getDesign finds stock');
assertEqual(getDesign('f1').name, 'F1', 'getDesign finds f1');
assertEqual(getDesign('invalid').id, 'stock', 'getDesign fallback to stock');

localStorage.clear();
const designCar = createCar(0, true, 'wasd', 'muscle');
assertEqual(designCar.designId, 'muscle', 'Created car has correct designId');
assertEqual(designCar.color, '#2962ff', 'Created car uses design color');
assertEqual(designCar.name, 'Muscle Car', 'Created car uses design name');

const defaultCar = createCar(1, false, 'cpu');
assertEqual(defaultCar.designId, 'stock', 'Default design is stock');
