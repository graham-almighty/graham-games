<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHOOL NURSE SIMULATOR - Graham Games</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0f'/><text x='16' y='22' text-anchor='middle' font-family='serif' font-weight='bold' font-size='16' fill='%23c9a84c'>GG</text></svg>">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #ddd;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, #0a1a2a22 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, #1a2a0a22 0%, transparent 50%);
    pointer-events: none;
  }

  /* Exit Bar */
  .exit-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 42px;
    background: linear-gradient(180deg, #111118, #0a0a0f);
    border-bottom: 1px solid #4caa6444;
    display: flex;
    align-items: center;
    padding: 0 12px;
    z-index: 100;
  }
  .exit-bar .gg-logo { width: 28px; height: 28px; margin-right: 10px; }
  .exit-bar .gg-title {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: #888;
    letter-spacing: 0.1em;
    flex: 1;
  }
  .exit-bar .exit-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    padding: 5px 14px;
    background: transparent;
    border: 1px solid #555;
    color: #777;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .exit-bar .exit-btn:hover { color: #4caa64; border-color: #4caa64; }

  /* Toast */
  #gg-toast {
    position: fixed;
    top: 20px; right: 20px;
    background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
    border: 1px solid #c9a84c;
    border-radius: 8px;
    padding: 12px 18px;
    z-index: 200;
    opacity: 0;
    transform: translateX(100px);
    transition: all 0.4s;
    box-shadow: 0 0 20px #c9a84c22;
  }
  #gg-toast.visible { opacity: 1; transform: translateX(0); }
  .toast-header {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: #c9a84c;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .toast-name { font-size: 0.9rem; color: #fff; margin-bottom: 2px; }
  .toast-reward { font-size: 0.75rem; color: #c9a84c; }

  /* Screens */
  .screen {
    position: absolute;
    top: 42px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
    transition: opacity 0.3s;

  .screen.hidden { opacity: 0; pointer-events: none; }

  /* Title */
  #title-screen h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #4caa64;
    text-shadow: 0 0 20px #4caa6444, 2px 2px 0 #001a0a;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    text-align: center;
  }
  .title-sub {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: #888;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .title-icon { font-size: 3.5rem; margin-bottom: 12px; }
  .title-stats {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 20px;
    text-align: center;
    line-height: 1.6;
  }

  /* Buttons */
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    padding: 10px 40px;
    background: linear-gradient(135deg, #4caa6433, #4caa6411);
    border: 1px solid #4caa6488;
    color: #4caa64;
    cursor: pointer;

    border-radius: 4px;
    transition: all 0.2s;
    margin: 4px;

  .btn:hover { background: #4caa6444; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn.secondary {
    background: transparent;
    border-color: #555;
    color: #777;
    font-size: 0.8rem;
    padding: 6px 20px;
  }
  .btn.secondary:hover { border-color: #4caa64; color: #4caa64; }
  .btn.danger {

    color: #e07070;
  }

    border-color: #aa8c4c88;
    color: #ddb060;

    margin-top: 8px;

    top: 42px; left: 0; right: 0;

    height: 8px;

    border-radius: 4px;

    margin-bottom: 16px;

  .cond-btn {

</style>

<script>
// ═══════════════════════════════════════════
// G BUX SYSTEM
// ═══════════════════════════════════════════
const GG_KEY = 'graham-games-data';
function ggLoad() {
  try { return JSON.parse(localStorage.getItem(GG_KEY)) || { gBux: 0, achievements: {}, shopPurchases: {} }; }
  catch(e) { return { gBux: 0, achievements: {}, shopPurchases: {} }; }
}
function ggSave(data) { localStorage.setItem(GG_KEY, JSON.stringify(data)); }
function ggUnlockAchievement(id, name, reward) {
  const data = ggLoad();
  if (data.achievements[id]) return false;
  data.achievements[id] = true;
  data.gBux += reward;
  ggSave(data);
  showAchievementToast(name, reward);
  return true;
}

let ggToastQueue = [], ggToastShowing = false;
function showAchievementToast(name, reward) {
  ggToastQueue.push({ name, reward });
  if (!ggToastShowing) processToastQueue();
}
function processToastQueue() {
  if (!ggToastQueue.length) { ggToastShowing = false; return; }
  ggToastShowing = true;
  const { name, reward } = ggToastQueue.shift();
  document.getElementById('gg-toast-name').textContent = name;
  document.getElementById('gg-toast-reward').textContent = '+' + reward + ' G Bux';
  document.getElementById('gg-toast').classList.add('visible');
  setTimeout(() => {
    document.getElementById('gg-toast').classList.remove('visible');
    setTimeout(processToastQueue, 400);
  }, 3000);
}

function tryAch(id) {

// SAVE / LOAD STATS
// ═══════════════════════════════════════════
const SAVE_KEY = 'school-nurse-save';
const PROGRESS_KEY = 'school-nurse-progress';
function loadStats() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch(e) { return {}; }
}
function saveStats() {
  const s = loadStats();
  s.highScore = Math.max(s.highScore || 0, state.score);
  s.totalPatients = (s.totalPatients || 0) + state.dayTotal;
  s.totalCorrect = (s.totalCorrect || 0) + state.dayCorrect;
  s.totalFakersCaught = (s.totalFakersCaught || 0) + state.dayFakersCaught;
  s.bestDay = Math.max(s.bestDay || 0, state.day);
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}
function saveFinalStats() {
  const s = loadStats();
  s.highScore = Math.max(s.highScore || 0, state.score);
  s.bestDay = Math.max(s.bestDay || 0, state.day);
  s.gamesPlayed = (s.gamesPlayed || 0) + 1;
  localStorage.setItem(SAVE_KEY, JSON.stringify(s));
}
function serializePatient(p) {
  return {
    name: p.name, gender: p.gender, grade: p.grade,
    skinTone: p.skinTone, hairColor: p.hairColor, hairStyle: p.hairStyle, shirtColor: p.shirtColor,
    conditionId: p.condition.id, conditionName: p.condition.name,
    complaint: p.complaint, faking: p.faking, examResults: p.examResults,
    physicalLabel: p.physicalLabel, correctTreatment: p.correctTreatment,
    conditionEffect: p.conditionEffect, fakeReason: p.fakeReason
  };
}
function deserializePatient(d) {
  const condition = CONDITIONS.find(c => c.id === d.conditionId) || { id: d.conditionId, name: d.conditionName };
  return {
    name: d.name, gender: d.gender, grade: d.grade,
    skinTone: d.skinTone, hairColor: d.hairColor, hairStyle: d.hairStyle, shirtColor: d.shirtColor,
    condition, complaint: d.complaint, faking: d.faking, examResults: d.examResults,
    physicalLabel: d.physicalLabel, correctTreatment: d.correctTreatment,
    conditionEffect: d.conditionEffect, fakeReason: d.fakeReason
  };
}
function saveProgress() {
  const data = {
    day: state.day,
    score: state.score,
    reputation: state.reputation,
    totalPatients: state.totalPatients,
    totalCorrect: state.totalCorrect,
    totalFakersCaught: state.totalFakersCaught,
    weekCorrect: state.weekCorrect,
    weekMistakes: state.weekMistakes,
    // Mid-day state
    patientIndex: state.patientIndex,
    dayCorrect: state.dayCorrect,
    dayTotal: state.dayTotal,
    dayFakersCaught: state.dayFakersCaught,
    dayMistakes: state.dayMistakes,
    patients: state.patients.map(serializePatient),
    phase: state.phase,
    screen: getCurrentScreen()
  };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
}
function getCurrentScreen() {
  for (const id of ['title-screen','day-screen','game-screen','summary-screen','gameover-screen']) {
    const el = document.getElementById(id);
    if (el && !el.classList.contains('hidden')) return id;
  }
  return 'title-screen';
}
function loadProgress() {
  try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)); } catch(e) { return null; }
}
function clearProgress() {
  localStorage.removeItem(PROGRESS_KEY);
}
function hasSavedProgress() {
  return !!loadProgress();
}
function continueGame() {
  const p = loadProgress();
  if (!p) return;
  resetState();
  state.day = p.day;
  state.score = p.score;
  state.reputation = p.reputation;
  state.totalPatients = p.totalPatients;
  state.totalCorrect = p.totalCorrect || 0;
  state.totalFakersCaught = p.totalFakersCaught;
  state.weekCorrect = p.weekCorrect || 0;
  state.weekMistakes = p.weekMistakes || 0;
  state.dayCorrect = p.dayCorrect || 0;
  state.dayTotal = p.dayTotal || 0;
  state.dayFakersCaught = p.dayFakersCaught || 0;
  state.dayMistakes = p.dayMistakes || 0;

  if (p.patients && p.patients.length) {
    state.patients = p.patients.map(deserializePatient);
    state.patientIndex = p.patientIndex || 0;
    // Resume into the right screen
    if (p.screen === 'game-screen' || p.screen === 'day-screen') {
      showScreen('game-screen');
      showPatient();
      return;
    }
    if (p.screen === 'summary-screen') {
      endDay();
      return;
    }
  }
  // Default: start the next day
  state.day++;
  showDayScreen();
}

// PATIENT GENERATION
// ═══════════════════════════════════════════
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generatePatient(isFaker, difficulty) {
  const gender = Math.random() < 0.5 ? 'm' : 'f';
  const name = gender === 'm' ? pick(NAMES_M) : pick(NAMES_F);
  const grade = pick(GRADES);
  const skinTone = pick(SKIN_TONES);
  const hairColor = pick(HAIR_COLORS);
  const hairStyle = pick(HAIR_STYLES);
  const shirtColor = pick(SHIRT_COLORS);

  // Pick condition - allergic reactions are always real
  let condPool = isFaker ? CONDITIONS.filter(c => !c.alwaysReal) : CONDITIONS;
  const condition = pick(condPool);

  let complaint, examResults = {}, faking = isFaker && !condition.alwaysReal;

  if (faking) {
    // Pick a fake complaint appropriate to difficulty
    const fakes = condition.fakeComplaints;
    let pool;
    if (difficulty === 'easy') {
      pool = fakes.filter(f => f[1] === 'easy');
    } else if (difficulty === 'medium') {
      pool = fakes.filter(f => f[1] === 'easy' || f[1] === 'medium');
    } else {
      pool = fakes.filter(f => f[1] === 'medium' || f[1] === 'hard');
    }
    if (!pool.length) pool = fakes;
    complaint = pick(pool)[0];

    // Build exam results (fake versions)
    for (const key of ['temperature','physical','observe','questions']) {
      const ex = condition.exams[key];
      if (difficulty === 'hard' && ex.fakeHard) {
        examResults[key] = ex.fakeHard;
      } else {
        examResults[key] = ex.fake;
      }
    }
  } else {
    complaint = pick(condition.realComplaints);
    for (const key of ['temperature','physical','observe','questions']) {
      examResults[key] = condition.exams[key].real;
    }
  }

  return {
    name, gender, grade, skinTone, hairColor, hairStyle, shirtColor,
    condition: condition,
    complaint,
    faking,
    examResults,
    physicalLabel: condition.exams.physical.label,
    correctTreatment: condition.correctTreatment,
    conditionEffect: faking ? null : condition.conditionEffect,
    fakeReason: faking ? generateFakeReason() : null
  };
}

function generateFakeReason() {
  return pick([
    "They admitted they wanted to skip a test.",
    "They confessed they just wanted to go home early.",
    "They were trying to get out of PE class.",
    "They wanted to avoid an oral presentation.",
    "They just didn't feel like going to class.",
    "They wanted to play on their phone in the nurse's office.",
    "They were trying to avoid a homework check."
  ]);
}

function generateDayPatients(day) {
  let total, fakers, difficulty;
  if (day <= 2) { total = 3; fakers = 1; difficulty = 'easy'; }
  else if (day <= 4) { total = 4; fakers = 2; difficulty = 'medium'; }
  else if (day <= 6) { total = 5; fakers = 2; difficulty = 'medium'; }
  else { total = 5; fakers = Math.random() < 0.5 ? 3 : 2; difficulty = 'hard'; }

  const patients = [];
  const fakerSlots = new Set();
  while (fakerSlots.size < fakers) fakerSlots.add(Math.floor(Math.random() * total));

  for (let i = 0; i < total; i++) {
    patients.push(generatePatient(fakerSlots.has(i), difficulty));
  }
  return patients;
}

let canvas, ctx;

function drawOfficeBackground() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Wall
  ctx.fillStyle = '#C8E6C9';
  ctx.fillRect(0, 0, w, h * 0.62);

  // Wall trim
  ctx.fillStyle = '#A5D6A7';
  ctx.fillRect(0, h * 0.58, w, 12);

  // Floor
  ctx.fillStyle = '#D7CCC8';
  ctx.fillRect(0, h * 0.62, w, h * 0.38);

  // Floor tile lines
  ctx.strokeStyle = '#BCAAA4';
  ctx.lineWidth = 1;
  for (let x = 0; x < w; x += 50) {
    ctx.beginPath();
    ctx.moveTo(x, h * 0.62);
    ctx.lineTo(x, h);
    ctx.stroke();
  }
  for (let y = h * 0.62; y < h; y += 30) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Window
  drawWindow(w * 0.72, h * 0.06, 80, 85);

  // Cabinet
  drawCabinet(15, h * 0.12, 70, 130);

  // Medical cross poster
  drawCrossPoster(w * 0.42, h * 0.04, 40, 35);

  // Clock
  drawClock(w * 0.58, h * 0.08, 16);

  // Exam table
  drawExamTable(w * 0.32, h * 0.55, 140, 40);

  // Desk
  drawDesk(w * 0.02, h * 0.55, 80, 40);
}

function drawOffice() {
  drawOfficeBackground();
  if (state.currentPatient) {
    drawStudent(state.currentPatient, canvas.width * 0.32 + 45, canvas.height * 0.55 - 5);
  }
}

function drawWindow(x, y, w, h) {
  // Frame
  ctx.fillStyle = '#795548';
  ctx.fillRect(x - 4, y - 4, w + 8, h + 8);
  // Glass
  ctx.fillStyle = '#81D4FA';
  ctx.fillRect(x, y, w, h);
  // Sky detail
  ctx.fillStyle = '#B3E5FC';
  ctx.fillRect(x, y, w, h * 0.4);
  // Cross bars
  ctx.fillStyle = '#795548';
  ctx.fillRect(x + w/2 - 2, y, 4, h);
  ctx.fillRect(x, y + h/2 - 2, w, 4);
  // Curtains
  ctx.fillStyle = '#FFECB3';
  ctx.beginPath();
  ctx.moveTo(x - 4, y - 4);
  ctx.lineTo(x + 14, y - 4);
  ctx.lineTo(x - 4, y + h * 0.7);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + w + 4, y - 4);
  ctx.lineTo(x + w - 14, y - 4);
  ctx.lineTo(x + w + 4, y + h * 0.7);
  ctx.fill();
}

function drawCabinet(x, y, w, h) {
  // Cabinet body
  ctx.fillStyle = '#ECEFF1';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#B0BEC5';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  // Shelves
  for (let sy = 1; sy < 4; sy++) {
    ctx.fillStyle = '#CFD8DC';
    ctx.fillRect(x + 2, y + sy * (h/4), w - 4, 2);
  }
  // Bottles
  const bottleColors = ['#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA','#00ACC1'];
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const bx = x + 8 + col * 22;
      const by = y + 8 + row * (h/4);
      const bc = bottleColors[(row * 3 + col) % bottleColors.length];
      ctx.fillStyle = bc;
      ctx.fillRect(bx, by + 6, 10, 16);
      ctx.fillRect(bx + 3, by, 4, 8);
    }
  }
  // Glass door effect
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x + 2, y + 2, w/2 - 3, h - 4);
}

function drawCrossPoster(x, y, w, h) {
  // Poster background
  ctx.fillStyle = '#fff';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#E53935';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  // Red cross
  ctx.fillStyle = '#E53935';
  const cx = x + w/2, cy = y + h/2 - 3;
  ctx.fillRect(cx - 3, cy - 8, 6, 16);
  ctx.fillRect(cx - 8, cy - 3, 16, 6);
  // Text
  ctx.fillStyle = '#333';
  ctx.font = 'bold 5px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('WASH YOUR', x + w/2, y + h - 7);
  ctx.fillText('HANDS!', x + w/2, y + h - 2);
  ctx.textAlign = 'left';
}

function drawClock(x, y, r) {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Hour marks
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI/2;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(x + Math.cos(a) * (r - 3), y + Math.sin(a) * (r - 3), 1, 0, Math.PI * 2);
    ctx.fill();
  }
  // Hands
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + Math.cos(-Math.PI/3) * (r - 6), y + Math.sin(-Math.PI/3) * (r - 6));
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + Math.cos(Math.PI/6) * (r - 4), y + Math.sin(Math.PI/6) * (r - 4));
  ctx.stroke();
}

function drawExamTable(x, y, w, h) {
  // Legs
  ctx.fillStyle = '#795548';
  ctx.fillRect(x + 5, y + h, 8, 50);
  ctx.fillRect(x + w - 13, y + h, 8, 50);
  // Table top
  ctx.fillStyle = '#A1887F';
  ctx.fillRect(x, y, w, h);
  // Paper
  ctx.fillStyle = '#FAFAFA';
  ctx.fillRect(x + 5, y + 3, w - 10, h - 6);
  // Paper crinkle lines
  ctx.strokeStyle = '#E0E0E0';
  ctx.lineWidth = 0.5;
  for (let lx = x + 15; lx < x + w - 10; lx += 18) {
    ctx.beginPath();
    ctx.moveTo(lx, y + 4);
    ctx.lineTo(lx + 5, y + h - 4);
    ctx.stroke();
  }
}

function drawDesk(x, y, w, h) {
  // Desk body
  ctx.fillStyle = '#8D6E63';
  ctx.fillRect(x, y, w, h);
  ctx.fillRect(x + 5, y + h, 6, 45);
  ctx.fillRect(x + w - 11, y + h, 6, 45);
  // Desk top
  ctx.fillStyle = '#A1887F';
  ctx.fillRect(x, y, w, 5);
  // Papers
  ctx.fillStyle = '#fff';
  ctx.save();
  ctx.translate(x + 20, y + 10);
  ctx.rotate(-0.1);
  ctx.fillRect(0, 0, 18, 22);
  ctx.restore();
  ctx.save();
  ctx.translate(x + 35, y + 8);
  ctx.rotate(0.08);
  ctx.fillRect(0, 0, 18, 22);
  ctx.restore();
  // Pen
  ctx.fillStyle = '#1565C0';
  ctx.save();
  ctx.translate(x + 55, y + 15);
  ctx.rotate(0.3);
  ctx.fillRect(0, 0, 3, 20);
  ctx.restore();
}

function drawStudent(p, cx, tableY) {
  const bodyY = tableY - 40;
  const headY = bodyY - 25;

  // Legs dangling
  ctx.fillStyle = '#37474F';
  ctx.fillRect(cx - 12, tableY, 9, 28);
  ctx.fillRect(cx + 4, tableY, 9, 28);
  // Shoes
  ctx.fillStyle = '#263238';
  ctx.fillRect(cx - 14, tableY + 28, 13, 6);
  ctx.fillRect(cx + 2, tableY + 28, 13, 6);

  // Body (shirt)
  ctx.fillStyle = p.shirtColor;
  roundRect(cx - 16, bodyY, 33, 40, 3);

  // Arms
  ctx.fillStyle = p.skinTone;
  ctx.fillRect(cx - 22, bodyY + 4, 8, 24);
  ctx.fillRect(cx + 15, bodyY + 4, 8, 24);
  // Sleeves
  ctx.fillStyle = p.shirtColor;
  ctx.fillRect(cx - 22, bodyY + 2, 8, 8);
  ctx.fillRect(cx + 15, bodyY + 2, 8, 8);

  // Head
  ctx.fillStyle = p.skinTone;
  ctx.beginPath();
  ctx.arc(cx, headY, 16, 0, Math.PI * 2);
  ctx.fill();

  // Condition effects on face
  if (p.conditionEffect === 'pale' || p.conditionEffect === 'nauseous') {
    ctx.fillStyle = 'rgba(129, 199, 132, 0.3)';
    ctx.beginPath();
    ctx.arc(cx, headY, 16, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.conditionEffect === 'flushed') {
    ctx.fillStyle = 'rgba(229, 57, 53, 0.25)';
    ctx.beginPath();
    ctx.arc(cx, headY, 16, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.conditionEffect === 'hives') {
    ctx.fillStyle = '#E53935';
    for (let i = 0; i < 8; i++) {
      const hx = cx - 20 + Math.random() * 40;
      const hy = bodyY + 5 + Math.random() * 30;
      ctx.beginPath();
      ctx.arc(hx, hy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Cheek blush for flushed
  if (p.conditionEffect === 'flushed') {
    ctx.fillStyle = 'rgba(229, 115, 115, 0.5)';
    ctx.beginPath(); ctx.arc(cx - 10, headY + 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 10, headY + 4, 4, 0, Math.PI * 2); ctx.fill();
  }

  // Red eye
  if (p.conditionEffect === 'redEye') {
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.arc(cx - 5, headY - 2, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - 5, headY - 2, 1.5, 0, Math.PI * 2); ctx.fill();
    // Normal eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx + 5, headY - 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx + 5, headY - 2, 1.5, 0, Math.PI * 2); ctx.fill();
  } else {
    // Normal eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 5, headY - 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, headY - 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - 5, headY - 2, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, headY - 2, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // Mouth expression
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (p.faking && !p.conditionEffect) {
    // Slight smirk for fakers (but player shouldn't see state.faking directly - this is subtle)
    ctx.arc(cx, headY + 7, 4, 0.1, Math.PI - 0.1);
  } else if (p.conditionEffect === 'nauseous' || p.conditionEffect === 'pale') {
    // Frown
    ctx.arc(cx, headY + 10, 4, Math.PI + 0.3, -0.3);
  } else {
    // Neutral
    ctx.moveTo(cx - 4, headY + 6);
    ctx.lineTo(cx + 4, headY + 6);
  }
  ctx.stroke();

  // Hair
  drawHair(cx, headY, p.hairColor, p.hairStyle);

  // Scrape on knee
  if (p.conditionEffect === 'scrape') {
    ctx.fillStyle = '#C62828';
    ctx.beginPath();
    ctx.ellipse(cx - 7, tableY + 8, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#E57373';
    ctx.beginPath();
    ctx.ellipse(cx - 7, tableY + 8, 3, 2, 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Swollen ankle
  if (p.conditionEffect === 'swollen') {
    ctx.fillStyle = 'rgba(229, 115, 115, 0.5)';
    ctx.beginPath();
    ctx.ellipse(cx - 8, tableY + 30, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHair(cx, headY, color, style) {
  ctx.fillStyle = color;
  if (style === 'short') {
    ctx.beginPath();
    ctx.arc(cx, headY - 4, 16, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(cx - 16, headY - 8, 32, 8);
  } else if (style === 'long') {
    ctx.beginPath();
    ctx.arc(cx, headY - 2, 18, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(cx - 17, headY, 6, 28);
    ctx.fillRect(cx + 11, headY, 6, 28);
  } else if (style === 'ponytail') {
    ctx.beginPath();
    ctx.arc(cx, headY - 4, 16, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(cx - 16, headY - 8, 32, 8);
    // Ponytail
    ctx.beginPath();
    ctx.moveTo(cx + 2, headY - 14);
    ctx.quadraticCurveTo(cx + 22, headY - 10, cx + 18, headY + 12);
    ctx.quadraticCurveTo(cx + 14, headY + 18, cx + 4, headY + 8);
    ctx.fill();
    // Hair tie
    ctx.fillStyle = '#E53935';
    ctx.beginPath();
    ctx.arc(cx + 6, headY - 8, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (style === 'buzz') {
    ctx.beginPath();
    ctx.arc(cx, headY - 2, 17, Math.PI + 0.3, -0.3);
    ctx.fill();
  } else if (style === 'curly') {
    for (let i = 0; i < 10; i++) {
      const a = Math.PI + (i / 9) * Math.PI;
      const r = 17 + Math.sin(i * 1.5) * 3;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r * 0.85, headY - 4 + Math.sin(a) * r * 0.85, 6, 0, Math.PI * 2);
      ctx.fill();
    }
    // Top curls
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(cx - 10 + i * 5, headY - 18, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.fill();
}

function drawSpeechBubble(text) {
  const w = canvas.width, h = canvas.height;
  const bx = w * 0.52, by = h * 0.08;
  const bw = w * 0.44, bh = 55;

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(bx + 6, by);
  ctx.lineTo(bx + bw - 6, by);
  ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + 6);
  ctx.lineTo(bx + bw, by + bh - 6);
  ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - 6, by + bh);
  ctx.lineTo(bx + 20, by + bh);
  ctx.lineTo(bx + 10, by + bh + 12);
  ctx.lineTo(bx + 14, by + bh);
  ctx.lineTo(bx + 6, by + bh);
  ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - 6);
  ctx.lineTo(bx, by + 6);
  ctx.quadraticCurveTo(bx, by, bx + 6, by);
  ctx.fill();

  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Text wrapping
  ctx.fillStyle = '#333';
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  const words = text.split(' ');
  let line = '', ly = by + 14, maxW = bw - 16;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line.trim(), bx + 8, ly);
      line = word + ' ';
      ly += 13;
    } else {
      line = test;
    }
  }
  if (line.trim()) ctx.fillText(line.trim(), bx + 8, ly);
  ctx.textAlign = 'left';
}

// UI RENDERING

const uiPanel = () => document.getElementById('ui-panel');

function updateHUD() {
  document.getElementById('hud-day').textContent = state.day;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-rep-fill').style.width = state.reputation + '%';
  const total = state.patients.length;
  document.getElementById('hud-patient').textContent = (state.patientIndex + 1) + '/' + total;
}

function renderPatientUI() {
  const p = state.currentPatient;
  const panel = uiPanel();
  state.phase = 'exam';
  state.examsUsed = 0;
  state.notes = [];

  let html = '';

  // Patient info card
  html += '<div class="card" id="patient-card">';
  html += '<h3>Patient</h3>';
  html += '<div style="font-size:1rem;font-weight:bold;color:#fff;margin-bottom:4px">' + p.name + '</div>';
  html += '<div class="patient-meta">' + p.grade + ' &bull; Complaint: ' + p.condition.name + '</div>';
  html += '<div class="complaint-text" style="margin-top:8px">"' + p.complaint + '"</div>';
  html += '</div>';

  // Exam card
  html += '<div class="card" id="exam-card">';
  html += '<h3>Examinations</h3>';
  html += '<div class="exams-left" id="exams-left">3 exams remaining</div>';
  html += '<div class="exam-grid">';
  html += '<button class="exam-btn" onclick="doExam(\'temperature\')" id="exam-temperature"><span class="exam-icon">\ud83c\udf21\ufe0f</span> Take Temperature</button>';
  html += '<button class="exam-btn" onclick="doExam(\'physical\')" id="exam-physical"><span class="exam-icon">\ud83e\ude7a</span> ' + p.physicalLabel + '</button>';
  html += '<button class="exam-btn" onclick="doExam(\'observe\')" id="exam-observe"><span class="exam-icon">\ud83d\udc41\ufe0f</span> Observe Behavior</button>';
  html += '<button class="exam-btn" onclick="doExam(\'questions\')" id="exam-questions"><span class="exam-icon">\ud83d\udcac</span> Ask Questions</button>';
  html += '</div>';
  html += '</div>';

  // Notes card
  html += '<div class="card" id="notes-card">';
  html += '<h3>Nurse\'s Notes</h3>';
  html += '<div id="notes-list"><div class="note-empty">No observations yet. Examine the patient!</div></div>';
  html += '</div>';

  // Treatment button
  html += '<button class="btn" onclick="showTreatmentUI()" style="width:100%">CHOOSE TREATMENT</button>';

  panel.innerHTML = html;
}

function doExam(type) {
  if (state.examsUsed >= state.maxExams) return;
  if (document.getElementById('exam-' + type).disabled) return;

  state.examsUsed++;
  const result = state.currentPatient.examResults[type];

  // Disable this exam button
  document.getElementById('exam-' + type).disabled = true;

  // Add to notes
  const labels = { temperature: 'Temperature', physical: state.currentPatient.physicalLabel, observe: 'Behavior', questions: 'Questions' };
  state.notes.push({ label: labels[type], text: result });

  // Update notes display
  const notesList = document.getElementById('notes-list');
  let html = '';
  for (const note of state.notes) {
    html += '<div class="note-entry"><span class="note-label">' + note.label + ':</span> ' + note.text + '</div>';
  }
  notesList.innerHTML = html;

  // Update exams remaining
  const remaining = state.maxExams - state.examsUsed;
  document.getElementById('exams-left').textContent = remaining + ' exam' + (remaining !== 1 ? 's' : '') + ' remaining';

  // Disable all if no more exams
  if (remaining <= 0) {
    document.querySelectorAll('.exam-btn').forEach(b => b.disabled = true);
  }

  // Redraw canvas
  drawOffice();
  drawSpeechBubble(state.currentPatient.complaint);
}

function showTreatmentUI() {
  state.phase = 'treat';
  const panel = uiPanel();

  let html = '';

  // Keep patient info visible
  const p = state.currentPatient;
  html += '<div class="card">';
  html += '<h3>Patient</h3>';
  html += '<div style="font-size:1rem;font-weight:bold;color:#fff;margin-bottom:4px">' + p.name + '</div>';
  html += '<div class="patient-meta">' + p.grade + ' &bull; ' + p.condition.name + '</div>';
  html += '</div>';

  // Notes (carried over)
  if (state.notes.length) {
    html += '<div class="card">';
    html += '<h3>Your Notes</h3>';
    for (const note of state.notes) {
      html += '<div class="note-entry"><span class="note-label">' + note.label + ':</span> ' + note.text + '</div>';
    }
    html += '</div>';
  }

  // Treatment options
  html += '<div class="card">';
  html += '<h3>Choose Treatment</h3>';
  html += '<div class="treat-grid">';
  for (const t of TREATMENTS) {
    if (t.id === 'sendBack') continue;
    html += '<button class="treat-btn" onclick="applyTreatment(\'' + t.id + '\')">' + t.icon + ' ' + t.name + '<div style="font-size:0.65rem;color:#888;margin-top:2px">' + t.desc + '</div></button>';
  }
  html += '</div>';
  html += '<button class="btn send-back" onclick="applyTreatment(\'sendBack\')" style="width:100%">\ud83c\udfeb Send Back to Class \u2014 "They\'re faking it!"</button>';
  html += '</div>';

  // Back button
  html += '<button class="btn secondary" onclick="renderPatientUI()" style="width:100%">BACK TO EXAMS</button>';

  panel.innerHTML = html;
}

function applyTreatment(treatmentId) {
  const p = state.currentPatient;
  let correct = false;
  let scoreChange = 0;
  let repChange = 0;
  let resultTitle = '';
  let resultText = '';
  let resultClass = '';

  if (treatmentId === 'sendBack') {
    // Player thinks they're faking
    if (p.faking) {
      // Correct! Caught a faker
      correct = true;
      scoreChange = 150;
      repChange = 15;
      resultTitle = 'FAKER BUSTED!';
      resultText = p.name + ' was indeed faking! ' + p.fakeReason;
      resultClass = 'positive';
      state.dayFakersCaught++;
      state.totalFakersCaught++;
    } else {
      // Wrong! Sent a real sick kid back
      scoreChange = -100;
      repChange = -20;
      resultTitle = 'WRONG CALL!';
      resultText = p.name + ' was really sick with ' + p.condition.name.toLowerCase() + '! They needed ' + getTreatmentName(p.correctTreatment) + '.';
      if (p.condition.id === 'allergicReaction') {
        repChange = -30;
        resultText += ' This was an allergic reaction \u2014 a serious mistake!';
      }
      resultClass = 'negative';
      state.dayMistakes++;
    }
  } else {
    // Player is treating
    if (p.faking) {
      // Treated a faker (wasted resources)
      scoreChange = -50;
      repChange = -10;
      resultTitle = 'WASTED TREATMENT!';
      resultText = p.name + ' was faking! ' + p.fakeReason + ' You wasted supplies on them.';
      resultClass = 'negative';
      state.dayMistakes++;
    } else if (treatmentId === p.correctTreatment) {
      // Correct treatment!
      correct = true;
      scoreChange = 100;
      repChange = 10;
      resultTitle = 'CORRECT TREATMENT!';
      resultText = p.name + ' had ' + p.condition.name.toLowerCase() + ' and ' + getTreatmentName(treatmentId) + ' was exactly right!';
      resultClass = 'positive';
    } else {
      // Wrong treatment for real condition
      scoreChange = -25;
      repChange = -5;
      resultTitle = 'WRONG TREATMENT';
      resultText = p.name + ' really had ' + p.condition.name.toLowerCase() + ' but needed ' + getTreatmentName(p.correctTreatment) + ', not ' + getTreatmentName(treatmentId) + '.';
      if (p.condition.id === 'allergicReaction' && treatmentId !== 'allergyMed') {
        repChange = -25;
        resultText += ' Allergic reactions need allergy medicine \u2014 this was dangerous!';
      }
      resultClass = 'negative';
      state.dayMistakes++;
    }
  }

  if (correct) state.dayCorrect++;
  state.dayTotal++;
  state.totalPatients++;
  state.score = Math.max(0, state.score + scoreChange);
  state.reputation = Math.max(0, Math.min(100, state.reputation + repChange));

  // Check achievements
  if (state.totalPatients === 1) tryAch('sn_first_patient');
  if (correct && treatmentId === 'sendBack' && state.examsUsed === 0) tryAch('sn_gut_feeling');
  if (correct && p.condition.id === 'allergicReaction') tryAch('sn_allergy_alert');
  if (state.reputation >= 100) tryAch('sn_nurse_of_year');
  const stats = loadStats();
  if ((stats.totalFakersCaught || 0) + state.dayFakersCaught >= 10) tryAch('sn_faker_buster');
  if ((stats.totalFakersCaught || 0) + state.dayFakersCaught >= 25) tryAch('sn_no_fakers');
  if ((stats.totalPatients || 0) + state.dayTotal >= 50) tryAch('sn_veteran_nurse');

  // Render result
  showResultUI(resultTitle, resultText, scoreChange, repChange, resultClass);
  updateHUD();
}

function getTreatmentName(id) {
  const t = TREATMENTS.find(t => t.id === id);
  return t ? t.name : id;
}

function showResultUI(title, text, scoreChange, repChange, cls) {
  const panel = uiPanel();
  let html = '';

  html += '<div class="card">';
  html += '<h3 class="result-' + (cls === 'positive' ? 'correct' : 'wrong') + '">' + title + '</h3>';
  html += '<div class="result-text">' + text + '</div>';

  const sign = scoreChange >= 0 ? '+' : '';
  html += '<div class="result-score ' + cls + '">' + sign + scoreChange + ' points</div>';
  const repSign = repChange >= 0 ? '+' : '';
  html += '<div class="result-rep">Reputation ' + repSign + repChange + '%</div>';
  html += '</div>';

  // Next button
  if (state.patientIndex < state.patients.length - 1) {
    html += '<button class="btn" onclick="nextPatient()" style="width:100%">NEXT PATIENT \u2192</button>';
  } else {
    html += '<button class="btn" onclick="endDay()" style="width:100%">END OF DAY \u2192</button>';
  }

  panel.innerHTML = html;
  state.phase = 'result';

  // Check reputation
  if (state.reputation <= 0) {
    setTimeout(gameOver, 500);
  }
}

// GAME FLOW
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startGame() {
  studentMode = false;
  clearProgress();
  resetState();
  restoreNurseHUD();
  showDayScreen();
}

function showDayScreen() {
  state.patients = generateDayPatients(state.day);
  state.patientIndex = 0;
  state.dayCorrect = 0;
  state.dayTotal = 0;
  state.dayFakersCaught = 0;
  state.dayMistakes = 0;

  document.getElementById('day-title').textContent = 'DAY ' + state.day;
  const n = state.patients.length;
  document.getElementById('day-sub').textContent = n + ' patient' + (n !== 1 ? 's' : '') + ' on the way';
  showScreen('day-screen');
}

function beginDay() {
  showScreen('game-screen');
  if (studentMode) {
    showConditionPicker();
  } else {
    showPatient();
  }
}

function showPatient() {
  state.currentPatient = state.patients[state.patientIndex];
  updateHUD();
  renderPatientUI();
  drawOffice();
  drawSpeechBubble(state.currentPatient.complaint);
}

function nextPatient() {
  state.patientIndex++;
  showPatient();
}

function endDay() {
  saveStats();

  // Check clean sweep achievement (all correct in a day)
  if (state.dayMistakes === 0 && state.dayTotal > 0) tryAch('sn_clean_sweep');

  // Check week achievements
  state.weekCorrect += state.dayCorrect;
  state.weekMistakes += state.dayMistakes;
  if (state.day % 5 === 0) {
    tryAch('sn_week_survivor');
    if (state.weekMistakes === 0) tryAch('sn_perfect_week');
    state.weekCorrect = 0;
    state.weekMistakes = 0;
  }

  // Show summary
  document.getElementById('summary-title').textContent = 'END OF DAY ' + state.day;
  const fakers = state.patients.filter(p => p.faking).length;

  let html = '<table class="summary-table">';
  html += '<tr><td>Patients Seen</td><td>' + state.dayTotal + '</td></tr>';
  html += '<tr><td>Correct Diagnoses</td><td>' + state.dayCorrect + '/' + state.dayTotal + '</td></tr>';
  html += '<tr><td>Fakers Caught</td><td>' + state.dayFakersCaught + '/' + fakers + '</td></tr>';
  html += '<tr><td>Mistakes</td><td style="color:' + (state.dayMistakes > 0 ? '#e07070' : '#4caa64') + '">' + state.dayMistakes + '</td></tr>';
  html += '<tr><td>Total Score</td><td>' + state.score + '</td></tr>';
  html += '<tr><td>Reputation</td><td>' + state.reputation + '%</td></tr>';
  html += '</table>';

  if (state.dayMistakes === 0) {
    html += '<div style="color:#4caa64;font-size:0.9rem;margin-bottom:8px">Perfect day! No mistakes!</div>';
  }

  document.getElementById('summary-body').innerHTML = html;
  showScreen('summary-screen');
}

function nextDay() {
  if (studentMode) {
    stuState.day++;
    showStudentDayScreen();
    return;
  }
  if (state.reputation <= 0) {
    gameOver();
    return;
  }
  state.day++;
  showDayScreen();
}

function saveAndConfirm() {
  if (studentMode) saveStudentProgress(); else saveProgress();
  // Flash both save buttons if visible
  const btns = [document.getElementById('save-btn'), document.getElementById('hud-save-btn')];
  btns.forEach(btn => {
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = 'SAVED!';
    btn.disabled = true;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1500);
  });
}

function gameOver() {
  clearProgress();
  saveFinalStats();
  const stats = loadStats();

  document.getElementById('go-title').textContent = "YOU'VE BEEN FIRED!";
  document.getElementById('go-sub').textContent = 'Your reputation hit rock bottom...';
  document.getElementById('go-play-btn').textContent = 'TRY AGAIN';
  document.getElementById('go-play-btn').onclick = startGame;

  let html = '';
  html += 'Days Survived: <strong>' + state.day + '</strong><br>';
  html += 'Final Score: <strong>' + state.score + '</strong><br>';
  html += 'High Score: <strong>' + (stats.highScore || 0) + '</strong><br>';
  html += 'Patients Treated: <strong>' + state.totalPatients + '</strong><br>';
  html += 'Fakers Caught: <strong>' + state.totalFakersCaught + '</strong>';

  document.getElementById('final-stats').innerHTML = html;
  showScreen('gameover-screen');
}

function updateTitleStats() {
  const s = loadStats();
  const ss = loadStudentStats();
  const el = document.getElementById('title-stats');
  let txt = '';
  if (!s.gamesPlayed && !s.totalPatients && !ss.gamesPlayed && !ss.totalSkips) {

function getNurseReaction(susChange) {
  if (susChange <= -3) return pick([
    "Hmm... you do look unwell.", "Oh, that doesn't sound good...",
    "Poor thing...", "That must be tough..."
  ]);
  if (susChange <= 5) return pick([
    "I see... let me check something else.", "Alright, noted.",
    "Mm-hmm...", "Okay..."
  ]);
  if (susChange <= 10) return pick([
    "Hmm, interesting...", "Is that so?", "Really now...",
    "That's a bit unusual..."
  ]);
  return pick([
    "That seems a bit odd...", "Hmm, I'm not so sure about that...",
    "Something doesn't add up here...", "You sure about that?"
  ]);
}

// Canvas: draw nurse character
function drawNurse(cx, footY) {
  // Shoes
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 8, footY - 4, 7, 5);
  ctx.fillRect(cx + 1, footY - 4, 7, 5);
  // Legs
  ctx.fillStyle = '#37474F';
  ctx.fillRect(cx - 7, footY - 32, 6, 28);
  ctx.fillRect(cx + 1, footY - 32, 6, 28);
  // Body (scrubs)
  ctx.fillStyle = '#90CAF9';
  roundRect(cx - 11, footY - 60, 22, 30, 2);
  // White coat
  ctx.fillStyle = '#FAFAFA';
  ctx.fillRect(cx - 13, footY - 62, 6, 34);
  ctx.fillRect(cx + 7, footY - 62, 6, 34);
  ctx.fillRect(cx - 13, footY - 62, 26, 3);
  // Arms (coat sleeves)
  ctx.fillStyle = '#FAFAFA';
  ctx.fillRect(cx - 17, footY - 57, 5, 20);
  ctx.fillRect(cx + 12, footY - 57, 5, 20);
  // Hands
  ctx.fillStyle = '#E0AC69';
  ctx.fillRect(cx - 16, footY - 38, 4, 4);
  ctx.fillRect(cx + 13, footY - 38, 4, 4);
  // Clipboard
  ctx.fillStyle = '#8D6E63';
  ctx.fillRect(cx + 12, footY - 52, 9, 13);
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx + 13, footY - 50, 7, 9);
  // Head
  const headY = footY - 72;
  ctx.fillStyle = '#E0AC69';
  ctx.beginPath(); ctx.arc(cx, headY, 10, 0, Math.PI * 2); ctx.fill();
  // Hair (bun)
  ctx.fillStyle = '#5D4037';
  ctx.beginPath(); ctx.arc(cx, headY - 4, 10, Math.PI, 0); ctx.fill();
  ctx.beginPath(); ctx.arc(cx, headY - 12, 5, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - 3, headY, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, headY, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx - 3, headY, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3, headY, 1, 0, Math.PI * 2); ctx.fill();
  // Glasses
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(cx - 3, headY, 3, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx + 3, headY, 3, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 0.5, headY); ctx.lineTo(cx + 0.5, headY); ctx.stroke();
  // Mouth expression
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.beginPath();
  if (stuState.nurseExpression === 'suspicious') {
    ctx.arc(cx, headY + 6, 3, Math.PI + 0.3, -0.3);
    ctx.stroke();
    // Raised eyebrow
    ctx.beginPath();
    ctx.moveTo(cx - 6, headY - 5);
    ctx.lineTo(cx - 1, headY - 7);
  } else if (stuState.nurseExpression === 'sympathetic') {
    ctx.arc(cx, headY + 3, 3, 0.2, Math.PI - 0.2);
  } else {
    ctx.moveTo(cx - 3, headY + 4);
    ctx.lineTo(cx + 3, headY + 4);
  }
  ctx.stroke();
  // Stethoscope
  ctx.strokeStyle = '#78909C';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 4, footY - 62);
  ctx.quadraticCurveTo(cx, footY - 55, cx + 4, footY - 62);
  ctx.stroke();
  ctx.fillStyle = '#B0BEC5';
  ctx.beginPath(); ctx.arc(cx, footY - 53, 2, 0, Math.PI * 2); ctx.fill();
  // Name tag
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx + 7, footY - 50, 10, 5);
  ctx.fillStyle = '#E53935';
  ctx.fillRect(cx + 7, footY - 50, 10, 1.5);
}

function showConditionPicker() {
  setupStudentHUD();
  updateStudentHUD();

  // Build condition pool based on day difficulty
  let pool;
  if (stuState.day <= 2) pool = FAKEABLE_CONDITIONS.filter(c => c.difficulty === 'easy');
  else if (stuState.day <= 4) pool = FAKEABLE_CONDITIONS.filter(c => c.difficulty !== 'hard');
  else pool = [...FAKEABLE_CONDITIONS];
  if (pool.length < 3) pool = [...FAKEABLE_CONDITIONS];

  // Pick 3 unique
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const choices = shuffled.slice(0, 3);

  // 20% chance one is "actually sick"
  const sickSlot = Math.random() < 0.2 ? Math.floor(Math.random() * 3) : -1;

  stuState._currentChoices = choices;
  stuState._sickSlot = sickSlot;

  const panel = uiPanel();
  let html = '<div class="card"><h3>Time to Get Out of Class!</h3>';
  html += '<div style="color:#aaa;font-size:0.82rem;margin-bottom:12px">Pick your excuse. Harder conditions = more points!</div>';

  choices.forEach((c, i) => {
    const isSick = (i === sickSlot);
    const stars = c.difficulty === 'easy' ? '\u2b50' : c.difficulty === 'medium' ? '\u2b50\u2b50' : '\u2b50\u2b50\u2b50';
    if (isSick) {
      html += '<button class="cond-btn" onclick="pickCondition(' + i + ',true)" style="border-color:#4caa6466;margin-bottom:8px">';
      html += '<div style="font-size:1rem">' + c.icon + ' ' + c.name + ' <span style="color:#4caa64;font-size:0.72rem">[ACTUALLY SICK!]</span></div>';
      html += '<div style="font-size:0.72rem;color:#4caa64;margin-top:3px">You really DO feel sick! Easier to convince.</div>';
      html += '</button>';
    } else {
      html += '<button class="cond-btn" onclick="pickCondition(' + i + ',false)" style="margin-bottom:8px">';
      html += '<div style="font-size:1rem">' + c.icon + ' ' + c.name + ' <span style="font-size:0.72rem;color:#888">' + stars + '</span></div>';
      html += '<div style="font-size:0.72rem;color:#888;margin-top:3px">' + c.points + ' pts &bull; ' + c.difficulty + '</div>';
      html += '</button>';
    }
  });

  html += '</div>';
  panel.innerHTML = html;
  stuState.nurseExpression = 'neutral';
  drawStudentModeOffice('What seems to be the problem?');
}

function pickCondition(idx, isSick) {
  const cond = stuState._currentChoices[idx];
  stuState.chosenCondition = cond;
  stuState.actuallySick = isSick;

  // Base suspicion depends on difficulty
  let base = isSick ? 5 : (cond.difficulty === 'easy' ? 15 : cond.difficulty === 'medium' ? 25 : 35);
  // Day scaling: nurse gets smarter
  base += Math.floor((stuState.day - 1) / 2) * 5;
  stuState.suspicion = Math.max(0, Math.min(100, base));

  // Pick 2 random exam types
  const types = ['temperature', 'physical', 'observe', 'questions'];
  const shuffled = types.sort(() => Math.random() - 0.5);
  stuState.examsThisRound = [shuffled[0], shuffled[1]];
  stuState.examIndex = 0;
  stuState.nurseExpression = 'neutral';

  // Get complaint text
  const condData = CONDITIONS.find(c => c.id === cond.condId);
  if (isSick) {
    stuState._complaint = pick(condData.realComplaints);
  } else {
    const fakes = condData.fakeComplaints;
    stuState._complaint = fakes.length ? pick(fakes)[0] : pick(condData.realComplaints);
  }

  showStudentExamIntro();
}

function showStudentExamIntro() {
  const panel = uiPanel();
  const cond = stuState.chosenCondition;
  let html = '<div class="card"><h3>Nurse\'s Office</h3>';
  html += '<div style="color:#aaa;font-size:0.82rem">You walk in complaining about: <strong style="color:#fff">' + cond.name + '</strong></div>';
  html += '<div class="complaint-text" style="margin-top:6px">\u201c' + stuState._complaint + '\u201d</div>';
  html += '</div>';

  html += buildSuspicionCard();
  html += '<button class="btn" onclick="showStudentExam()" style="width:100%">THE NURSE EXAMINES YOU \u2192</button>';
  panel.innerHTML = html;
  drawStudentModeOffice(stuState._complaint);
}

function buildSuspicionCard() {
  const pct = Math.min(100, Math.max(0, stuState.suspicion));
  const color = pct < 30 ? '#4caa64' : pct < 55 ? '#aaaa4c' : '#e07070';
  return '<div class="card"><h3>Nurse\'s Suspicion</h3>' +
    '<div class="suspicion-wrap"><div class="suspicion-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
    '<div style="font-size:0.68rem;color:#666;text-align:center">' +
    (pct < 30 ? 'She seems to believe you...' : pct < 55 ? 'She\'s not sure yet...' : 'She looks suspicious!') +
    '</div></div>';
}

function showStudentExam() {
  if (stuState.examIndex >= stuState.examsThisRound.length) {
    showStudentVerdict();
    return;
  }
  const examType = stuState.examsThisRound[stuState.examIndex];
  const examData = STU_EXAM_TEXT[examType];
  let nurseText = examData.nurse;
  if (examType === 'physical') {
    nurseText = 'Let me ' + stuState.chosenCondition.physLabel.toLowerCase() + '...';
  }

  const panel = uiPanel();
  let html = buildSuspicionCard();

  html += '<div class="card">';
  html += '<h3>Exam ' + (stuState.examIndex + 1) + ' of ' + stuState.examsThisRound.length + '</h3>';
  html += '<div style="color:#fff;font-size:0.9rem;margin-bottom:10px">\ud83e\ude7a Nurse: \u201c' + nurseText + '\u201d</div>';
  html += '<div style="color:#aaa;font-size:0.78rem;margin-bottom:8px">How do you respond?</div>';
  examData.responses.forEach((r, i) => {
    html += '<button class="response-btn" onclick="pickStudentResponse(' + i + ')">' + r.icon + ' ' + r.text + '</button>';
  });
  html += '</div>';
  panel.innerHTML = html;

  stuState.nurseExpression = 'neutral';
  drawStudentModeOffice(nurseText);
}

function pickStudentResponse(responseIdx) {
  const examType = stuState.examsThisRound[stuState.examIndex];
  const condId = stuState.chosenCondition.condId;
  const scores = STU_SCORES[condId][examType];
  let susChange = scores[responseIdx];

  // If actually sick, halve suspicion gains
  if (stuState.actuallySick && susChange > 0) susChange = Math.floor(susChange / 2);

  // Each exam inherently adds a small amount
  susChange += 5;

  stuState.suspicion = Math.max(0, Math.min(100, stuState.suspicion + susChange));

  const reaction = getNurseReaction(susChange);
  stuState.nurseExpression = susChange <= -3 ? 'sympathetic' : susChange >= 8 ? 'suspicious' : 'neutral';

  const panel = uiPanel();
  let html = buildSuspicionCard();

  html += '<div class="card">';
  const rData = STU_EXAM_TEXT[examType].responses[responseIdx];
  html += '<div style="color:#888;font-size:0.78rem;margin-bottom:4px">You: ' + rData.icon + ' ' + rData.text + '</div>';
  html += '<div style="color:#fff;font-size:0.9rem;margin-top:8px">\ud83e\ude7a Nurse: \u201c' + reaction + '\u201d</div>';
  if (susChange <= -3) {
    html += '<div style="color:#4caa64;font-size:0.75rem;margin-top:6px">That seemed to work!</div>';
  } else if (susChange >= 8) {
    html += '<div style="color:#e07070;font-size:0.75rem;margin-top:6px">She looks suspicious...</div>';
  } else {
    html += '<div style="color:#aaaa4c;font-size:0.75rem;margin-top:6px">She doesn\'t seem sure.</div>';
  }
  html += '</div>';

  stuState.examIndex++;
  if (stuState.examIndex < stuState.examsThisRound.length) {
    html += '<button class="btn" onclick="showStudentExam()" style="width:100%">NEXT EXAM \u2192</button>';
  } else {
    html += '<button class="btn" onclick="showStudentVerdict()" style="width:100%">THE VERDICT \u2192</button>';
  }
  panel.innerHTML = html;
  drawStudentModeOffice(reaction);
}

function showStudentVerdict() {
  const caught = stuState.suspicion >= 50;
  let scoreChange = 0, strikeChange = 0, title, text, cls;

  if (caught) {
    if (stuState.actuallySick) {
      title = 'NURSE GOT IT WRONG!';
      text = 'She sent you back even though you were actually sick! Oh well...';
      cls = 'negative';
    } else {
      title = 'BUSTED!';
      text = pick([
        '"Nice try, kiddo. Back to class!"',
        '"I wasn\'t born yesterday. Back to class you go!"',
        '"You\'re not fooling me. Get back to class!"',
        '"I\'ve seen better acting in kindergarten plays. Back to class!"'
      ]);
      cls = 'negative';
      strikeChange = 1;
    }
    stuState.dayCaught++;
  } else {
    if (stuState.actuallySick) {
      title = 'SENT HOME!';
      text = '"You\'re definitely not feeling well. Let me call your parents."';
      cls = 'positive';
      scoreChange = 75;
    } else {
      title = 'GOING HOME!';
      text = pick([
        '"Oh you poor thing! Go home and rest. I\'ll call your parents."',
        '"You do look under the weather. I\'ll call home for you."',
        '"Better safe than sorry. Let\'s get you home!"'
      ]);
      cls = 'positive';
      scoreChange = stuState.chosenCondition.points;
      if (stuState.chosenCondition.difficulty === 'hard') scoreChange += 50;
      else if (stuState.chosenCondition.difficulty === 'medium') scoreChange += 25;
    }
    stuState.daySkips++;
    stuState.totalSkips++;
  }

  stuState.score += scoreChange;
  stuState.strikes += strikeChange;

  // Achievements
  if (!caught || stuState.actuallySick) {
    if (stuState.totalSkips >= 1) tryAch('sn_class_skipper');
    if (stuState.totalSkips >= 5) tryAch('sn_smooth_talker');
    if (stuState.totalSkips >= 15) tryAch('sn_oscar_winner');
    if (stuState.actuallySick && !caught) tryAch('sn_really_sick');
  }

  const panel = uiPanel();
  let html = '<div class="card">';
  html += '<h3 class="result-' + (cls === 'positive' ? 'correct' : 'wrong') + '">' + title + '</h3>';
  html += '<div class="result-text">' + text + '</div>';
  if (scoreChange > 0) {
    html += '<div class="result-score positive">+' + scoreChange + ' points</div>';
  }
  if (strikeChange > 0) {
    html += '<div class="result-score negative">Strike ' + stuState.strikes + ' of ' + stuState.maxStrikes + '!</div>';
  }
  html += '</div>';

  if (stuState.strikes >= stuState.maxStrikes) {
    html += '<button class="btn danger" onclick="studentGameOver()" style="width:100%">PARENTS CALLED... \u2192</button>';
  } else if (stuState.roundIndex < stuState.roundsPerDay - 1) {
    html += '<button class="btn" onclick="nextStudentRound()" style="width:100%">NEXT CLASS \u2192</button>';
  } else {
    html += '<button class="btn" onclick="endStudentDay()" style="width:100%">END OF DAY \u2192</button>';
  }

  panel.innerHTML = html;
  updateStudentHUD();
  stuState.nurseExpression = caught ? 'suspicious' : 'sympathetic';
  drawStudentModeOffice(caught ? 'Back to class!' : 'Feel better!');
}

function nextStudentRound() {
  stuState.roundIndex++;
  updateStudentHUD();
  showConditionPicker();
}

function endStudentDay() {
  saveStudentStats();
  if (stuState.daySkips === stuState.roundsPerDay) tryAch('sn_perfect_hooky');

  document.getElementById('summary-title').textContent = 'END OF DAY ' + stuState.day;
  let html = '<table class="summary-table">';
  html += '<tr><td>Classes Skipped</td><td>' + stuState.daySkips + '/' + stuState.roundsPerDay + '</td></tr>';
  html += '<tr><td>Times Caught</td><td style="color:' + (stuState.dayCaught > 0 ? '#e07070' : '#4caa64') + '">' + stuState.dayCaught + '</td></tr>';
  html += '<tr><td>Total Score</td><td>' + stuState.score + '</td></tr>';
  html += '<tr><td>Strikes</td><td>' + stuState.strikes + '/' + stuState.maxStrikes + '</td></tr>';
  html += '</table>';
  if (stuState.daySkips === stuState.roundsPerDay) {
    html += '<div style="color:#4caa64;font-size:0.9rem;margin-bottom:8px">Perfect hooky! Skipped every class!</div>';
  }
  document.getElementById('summary-body').innerHTML = html;
  showScreen('summary-screen');
}

function studentGameOver() {
  clearStudentProgress();
  saveStudentFinalStats();

  document.getElementById('go-title').textContent = 'PARENTS CALLED!';
  document.getElementById('go-sub').textContent = "You got caught faking too many times... Mom is NOT happy.";
  document.getElementById('go-play-btn').textContent = 'TRY AGAIN';
  document.getElementById('go-play-btn').onclick = startStudentMode;

  let html = '';
  html += 'Days Survived: <strong>' + stuState.day + '</strong><br>';
  html += 'Final Score: <strong>' + stuState.score + '</strong><br>';
  html += 'Classes Skipped: <strong>' + stuState.totalSkips + '</strong><br>';
  html += 'Times Caught: <strong>' + stuState.strikes + '</strong>';
  document.getElementById('final-stats').innerHTML = html;
  showScreen('gameover-screen');
}

function continueStudentGame() {
  const p = loadStudentProgress();
  if (!p) return;
  studentMode = true;
  resetStudentState();
  stuState.day = p.day;
  stuState.score = p.score;
  stuState.strikes = p.strikes;
  stuState.totalSkips = p.totalSkips;
  stuState.playerAppearance = p.playerAppearance;
  stuState.roundsPerDay = p.roundsPerDay || 2;
  stuState.daySkips = p.daySkips || 0;
  stuState.dayCaught = p.dayCaught || 0;

  if (p.screen === 'summary-screen') {
    stuState.roundIndex = p.roundIndex || 0;
    endStudentDay();
    return;
  }
  stuState.day++;
  showStudentDayScreen();
}

function goToMenu() {
  studentMode = false;
  restoreNurseHUD();
  updateTitleStats();
  showScreen('title-screen');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
function init() {
  canvas = document.getElementById('officeCanvas');
  ctx = canvas.getContext('2d');
  updateTitleStats();
  showScreen('title-screen');
}

window.onload = init;
</script>
