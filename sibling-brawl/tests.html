<!DOCTYPE html>
<html><head><title>Sibling Brawl Tests</title></head>
<body>
<div id="results"></div>
<script>
// === TEST FRAMEWORK ===
let _passed = 0, _failed = 0, _currentGroup = '';
function group(name) { _currentGroup = name; }
function assert(cond, name) {
  const fullName = _currentGroup ? _currentGroup + ': ' + name : name;
  const div = document.createElement('div');
  if (cond) { div.className = 'test pass'; _passed++; }
  else { div.className = 'test fail'; _failed++; }
  div.textContent = (cond ? 'PASS' : 'FAIL') + ': ' + fullName;
  document.getElementById('results').appendChild(div);
}
function assertEqual(a, b, name) {
  assert(a === b, name + ' (expected ' + b + ', got ' + a + ')');
}
function assertApprox(a, b, eps, name) {
  assert(Math.abs(a - b) < eps, name + ' (expected ~' + b + ', got ' + a + ')');
}
function showSummary() {
  const div = document.createElement('div');
  div.className = 'summary';
  div.textContent = _passed + ' passed, ' + _failed + ' failed (' + (_passed + _failed) + ' total)';
  document.getElementById('results').appendChild(div);
}

// === MOCK LOCALSTORAGE ===
const _store = {};
const localStorage = {
  getItem(k) { return _store[k] !== undefined ? _store[k] : null; },
  setItem(k, v) { _store[k] = String(v); },
  removeItem(k) { delete _store[k]; },
  clear() { for (const k in _store) delete _store[k]; },
};

// === CONSTANTS FROM GAME ===
const FIELD_W = 30;
const FIELD_D = 20;

const UNIT_DEFS = {
  pillow: { name: 'Pillow Fighter', cost: 10, hp: 100, damage: 15, speed: 1.5, range: 1.5, icon: '*', special: 'Basic melee brawler' },
  nerf:   { name: 'Nerf Gunner',   cost: 15, hp: 60,  damage: 12, speed: 1.2, range: 8,   icon: '*', special: 'Ranged foam darts', meleeDamage: 5 },
  blanket:{ name: 'Blanket Tank',  cost: 12, hp: 130, damage: 12, speed: 1.0, range: 1.8, icon: '*', special: 'Tanky blanket armor', antiScooter: true },
  scooter:{ name: 'Scooter Rider', cost: 25, hp: 90,  damage: 20, speed: 3.0, range: 1.8, icon: '*', special: 'Fast charge attack' },
  balloon:{ name: 'Water Balloon', cost: 40, hp: 80,  damage: 45, speed: 0.4, range: 12,  icon: '*', special: 'Splash damage!', splash: 3 },
  pooSling:{ name: 'Poo Slingshot', cost: 35, hp: 70,  damage: 40, speed: 0.5, range: 10,  icon: '*', special: 'Mortar poo bombardment!', splash: 2.5 },
};

// Army composition — same for both sides
const ARMY_COMP = [
  { type: 'pillow', count: 6 },
  { type: 'nerf', count: 3 },
  { type: 'blanket', count: 3 },
  { type: 'scooter', count: 2 },

];

// === G BUX SYSTEM ===
const GG_KEY = 'graham-games-data';
function ggLoad() {
  try { return JSON.parse(localStorage.getItem(GG_KEY)) || { gBux: 0, achievements: {}, shopPurchases: {} }; }
  catch { return { gBux: 0, achievements: {}, shopPurchases: {} }; }
}
function ggSave(d) { localStorage.setItem(GG_KEY, JSON.stringify(d)); }

const SB_ACH = {
  sb_first_fight:  { name: 'First Fight',      reward: 5 },
  sb_winner:       { name: 'Winner',            reward: 10 },
  sb_flawless:     { name: 'Untouchable',       reward: 30 },
  sb_pillow_army:  { name: 'Pillow Fort',       reward: 15 },
  sb_nerf_squad:   { name: 'Nerf War',          reward: 15 },
  sb_balanced:     { name: 'Mixed Tactics',     reward: 20 },
  sb_underdog:     { name: 'Outnumbered',       reward: 25 },
  sb_speed_win:    { name: 'Quick Fight',       reward: 20 },
  sb_commander:    { name: 'Big Sibling',       reward: 25 },
  sb_warlord:      { name: 'Supreme Sibling',   reward: 50 },
};

function ggTry(id) {
  const a = SB_ACH[id]; if (!a) return;
  const d = ggLoad(); if (d.achievements[id]) return;
  d.achievements[id] = true; d.gBux += a.reward; ggSave(d);
}
function hasPurchase(id) { return !!ggLoad().shopPurchases[id]; }

// === STATS ===
const STATS_KEY = 'sb-stats';
function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem(STATS_KEY)) || {};
    return { wins: s.wins || 0, battles: s.battles || 0 };
  }
  catch { return { wins: 0, battles: 0 }; }
}
function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

// === PLAYER DATA ===
const PLAYER_KEY = 'sb-player';
const CLASSES = {
  pillow: { name: 'Pillow Fighter', desc: 'Melee brawler. Smack enemies with your pillow!', icon: '🛏️', baseDmg: 15, baseHp: 100, range: 2.5, cooldown: 0.8, attackType: 'melee' },
  nerf:   { name: 'Nerf Gunner', desc: 'Ranged shooter. Pop enemies from a distance!', icon: '🔫', baseDmg: 12, baseHp: 70, range: 10, cooldown: 1.0, attackType: 'ranged' },
  pooSling: { name: 'Poo Slinger', desc: 'Mortar bombardier. Lob stinky payloads!', icon: '💩', baseDmg: 40, baseHp: 70, range: 10, cooldown: 2.5, attackType: 'mortar' },
};
const UPGRADES = [
  { id: 'hp',       name: 'Toughness',     desc: '+20 HP per level',           maxLevel: 5, cost: 30 },
  { id: 'dmg',      name: 'Power',         desc: '+3 damage per level',        maxLevel: 5, cost: 40 },
  { id: 'speed',    name: 'Speed',         desc: '+0.3 speed per level',       maxLevel: 5, cost: 35 },
  { id: 'firerate', name: 'Fire Rate',     desc: '-10% cooldown per level',    maxLevel: 5, cost: 45 },
  { id: 'range',    name: 'Reach',         desc: '+10% range per level',       maxLevel: 5, cost: 40 },
  { id: 'splash',   name: 'Blast Radius',  desc: '+15% splash per level',     maxLevel: 3, cost: 60 },
];

function loadPlayerData() {
  try {
    const d = JSON.parse(localStorage.getItem(PLAYER_KEY)) || {};
    return {
      candy: d.candy || 0,
      playerClass: d.playerClass || 'pillow',
      hairColor: d.hairColor || '#8B4513',
      shirtColor: d.shirtColor || '#4488ff',
      skinColor: d.skinColor || '#ffcc99',
      upgrades: Object.assign({ hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, d.upgrades || {}),
      unlockedLevel: d.unlockedLevel || 1,
      clearedLevels: d.clearedLevels || {},
    };
  } catch { return { candy: 0, playerClass: 'pillow', hairColor: '#8B4513', shirtColor: '#4488ff', skinColor: '#ffcc99', upgrades: { hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, unlockedLevel: 1, clearedLevels: {} }; }
}
function savePlayerData(d) { localStorage.setItem(PLAYER_KEY, JSON.stringify(d)); }

function getPlayerStats() {
  const pd = loadPlayerData();
  const cls = CLASSES[pd.playerClass];
  const firerateMult = Math.pow(0.9, pd.upgrades.firerate || 0);
  const rangeMult = 1 + (pd.upgrades.range || 0) * 0.1;
  const splashMult = 1 + (pd.upgrades.splash || 0) * 0.15;
  return {
    hp: cls.baseHp + (pd.upgrades.hp || 0) * 20,
    damage: cls.baseDmg + (pd.upgrades.dmg || 0) * 3,
    speed: 3.5 + (pd.upgrades.speed || 0) * 0.3,
    range: cls.range * rangeMult,
    cooldown: cls.cooldown * firerateMult,
    attackType: cls.attackType,
    splashMult: splashMult,
  };
}

// === DAMAGE CALC (extracted from game) ===
function getAttackDamage(attacker, defender, snackBoostActive) {
  let dmg = attacker.damage;
  const aType = attacker.type;
  const dType = defender.type;
  if (aType === 'blanket' && dType === 'scooter') dmg *= 2;
  if (aType === 'scooter' && attacker.charged) {
    dmg *= 2;
    attacker.charged = false;
  }
  if (aType === 'nerf' && attacker.dist < 2) {
    dmg = UNIT_DEFS.nerf.meleeDamage;
  }
  if (snackBoostActive && attacker.team === 'blue') dmg *= 1.1;
  return dmg;
}

// Names
assertEqual(UNIT_DEFS.pillow.name, 'Pillow Fighter', 'pillow name');

assertEqual(UNIT_DEFS.blanket.name, 'Blanket Tank', 'blanket name');
assertEqual(UNIT_DEFS.scooter.name, 'Scooter Rider', 'scooter name');
assertEqual(UNIT_DEFS.balloon.name, 'Water Balloon', 'balloon name');

// --- Army Composition ---
group('Army Composition');
{
  assertEqual(ARMY_COMP.length, 5, '5 unit types in army');
  // Total units per side
  const totalPerSide = ARMY_COMP.reduce((sum, e) => sum + e.count, 0);
  assertEqual(totalPerSide, 15, '15 units per side');
}
{
  // All army types are valid unit types
  for (const entry of ARMY_COMP) {
    assert(UNIT_DEFS[entry.type], entry.type + ' is a valid unit type');
    assert(entry.count > 0, entry.type + ' has positive count');
  }
}
{
  // Pillow is most numerous (6)
  const pillowEntry = ARMY_COMP.find(e => e.type === 'pillow');
  assertEqual(pillowEntry.count, 6, '6 pillow fighters per side');
}
{
  // Balloon is least numerous (1)
  const balloonEntry = ARMY_COMP.find(e => e.type === 'balloon');
  assertEqual(balloonEntry.count, 1, '1 water balloon per side');
}
{
  // Both sides get equal forces (same ARMY_COMP)
  const blueTotal = ARMY_COMP.reduce((sum, e) => sum + e.count, 0);
  const redTotal = ARMY_COMP.reduce((sum, e) => sum + e.count, 0);
  assertEqual(blueTotal, redTotal, 'equal forces for both sides');
}
{
  // Player replaces one pillow (blue has 15 total: 1 player + 14 AI)
  const pillowCount = ARMY_COMP.find(e => e.type === 'pillow').count;
  assert(pillowCount >= 1, 'at least 1 pillow for player to replace');

// --- FPS Player ---
group('FPS Player');
{
  // Player attack damage is pillow damage (15)
  const playerDmg = 15;
  assertEqual(playerDmg, UNIT_DEFS.pillow.damage, 'player deals pillow damage');
}
{
  // Player attack range is 2.5
  const attackRange = 2.5;
  assert(attackRange > UNIT_DEFS.pillow.range, 'player attack range wider than AI pillow');
  assert(attackRange < UNIT_DEFS.nerf.range, 'player attack range less than nerf range');
}
{
  // Player attack cooldown is 0.8s
  const cooldown = 0.8;
  assertEqual(cooldown, 0.8, 'player attack cooldown 0.8s');
}
{
  // Player movement speed is 3.5 (faster than any unit for fun)
  const playerSpeed = 3.5;
  assert(playerSpeed > UNIT_DEFS.scooter.speed, 'player faster than scooter (3.0)');
}
{
  // Player eye height is 1.4
  const eyeHeight = 1.4;
  assertEqual(eyeHeight, 1.4, 'player eye height 1.4');
}
{
  // Attack cone: dot product > 0.3 means ~70 degree frontal cone
  const threshold = 0.3;
  assert(threshold > 0, 'attack cone threshold is positive');
  assert(threshold < 1, 'attack cone threshold less than 1 (direct forward)');
  // cos(70deg) ≈ 0.34, so 0.3 gives slightly wider than 70 degrees
  assert(threshold < Math.cos(70 * Math.PI / 180) + 0.05, 'threshold allows ~70 degree cone');
}
{
  // Super soaker damage is 20
  const soakerDmg = 20;
  assert(soakerDmg > UNIT_DEFS.pillow.damage, 'super soaker does more than pillow');
  assert(soakerDmg < UNIT_DEFS.balloon.damage, 'super soaker does less than balloon');
}
{

  const soakerCooldown = 1.5;
  assert(soakerCooldown > 0.8, 'super soaker slower than pillow attack');
}

// --- Combat Damage ---
group('Combat Damage');
{
  const attacker = { type: 'pillow', damage: 15, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };

{

  const defender = { type: 'scooter', damage: 20, team: 'red' };

}
{
  const attacker = { type: 'blanket', damage: 12, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertEqual(getAttackDamage(attacker, defender, false), 12, 'blanket vs pillow = 12 (normal)');
}
{
  const attacker = { type: 'scooter', damage: 20, team: 'blue', charged: true, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertEqual(getAttackDamage(attacker, defender, false), 40, 'scooter charge = 40 (2x)');
  assertEqual(attacker.charged, false, 'charge consumed after first hit');
}
{
  const attacker = { type: 'scooter', damage: 20, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertEqual(getAttackDamage(attacker, defender, false), 20, 'scooter no charge = 20');
}
{
  const attacker = { type: 'nerf', damage: 12, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertEqual(getAttackDamage(attacker, defender, false), 5, 'nerf melee = 5');
}
{
  const attacker = { type: 'nerf', damage: 12, team: 'blue', charged: false, dist: 5 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertEqual(getAttackDamage(attacker, defender, false), 12, 'nerf ranged = 12');
}
{
  const attacker = { type: 'pillow', damage: 15, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'red' };
  assertApprox(getAttackDamage(attacker, defender, true), 16.5, 0.01, 'snack boost blue = 16.5 (1.1x)');
}
{
  const attacker = { type: 'pillow', damage: 15, team: 'red', charged: false, dist: 1 };
  const defender = { type: 'pillow', damage: 15, team: 'blue' };
  assertEqual(getAttackDamage(attacker, defender, true), 15, 'snack boost red team = 15 (no boost)');
}
{
  const attacker = { type: 'blanket', damage: 12, team: 'blue', charged: false, dist: 1 };
  const defender = { type: 'scooter', damage: 20, team: 'red' };
  assertApprox(getAttackDamage(attacker, defender, true), 26.4, 0.01, 'blanket vs scooter with snack = 26.4');

  const defender = { type: 'pillow', damage: 15, team: 'red' };

// --- Splash Damage Formula ---
group('Splash Damage');
{
  const baseDmg = 45;
  const splash = 3;
  const dmg0 = baseDmg * (1 - 0 / (splash + 1));
  assertEqual(dmg0, 45, 'splash at center = full damage');
  const dmgEdge = baseDmg * (1 - splash / (splash + 1));
  assertApprox(dmgEdge, 11.25, 0.01, 'splash at edge = 11.25');
  const dmgOut = baseDmg * (1 - 4 / (splash + 1));
  assert(dmgOut <= 0, 'splash outside range = 0 or negative');
}

// --- Poo Projectile Splash ---
group('Poo Projectile');
{
  // Splash damage formula
  const splash = 2.5;
  const baseDmg = 40;
  const dist = 1.0;
  const dmg = baseDmg * (1 - dist / (splash + 1));
  assertApprox(dmg, 40 * (1 - 1 / 3.5), 0.1, 'poo splash damage at dist 1');
  // At distance 0 (direct hit)
  const directDmg = baseDmg * (1 - 0 / (splash + 1));
  assertEqual(directDmg, 40, 'poo direct hit full damage');
  // At edge of splash
  const edgeDmg = baseDmg * (1 - splash / (splash + 1));
  assertApprox(edgeDmg, 40 / 3.5, 0.1, 'poo edge splash minimal damage');
}

// --- Poo Landmines ---
group('Poo Landmines');
{
  // Mine detection radius
  const mineRadius = 0.8;
  // Player at mine position
  const dx = 0, dz = 0;
  assert(dx * dx + dz * dz < mineRadius * mineRadius, 'player on mine triggers');
  // Player just outside
  const dx2 = 0.81, dz2 = 0;
  assert(!(dx2 * dx2 + dz2 * dz2 < mineRadius * mineRadius), 'player outside radius safe');
  // Player at diagonal inside
  const dx3 = 0.5, dz3 = 0.5;
  assert(dx3 * dx3 + dz3 * dz3 < mineRadius * mineRadius, 'player at diagonal 0.5,0.5 triggers');
}
{
  // Mine explodes and instakills
  const mine = { group: {visible: true}, x: 5, z: 3, exploded: false };
  // Simulate stepping on it
  mine.exploded = true;
  mine.group.visible = false;
  const playerHp = 0; // instakill
  assertEqual(mine.exploded, true, 'mine marked as exploded');
  assertEqual(mine.group.visible, false, 'mine hidden after explosion');
  assertEqual(playerHp, 0, 'player hp set to 0 (instakill)');
}
{
  // Mines only in poopWar levels
  const LEVEL_DEFS = [
    { id: 1 },
    { id: 2 },
    { id: 3, poopWar: true },
    { id: 4, poopWar: true },
    { id: 5, poopWar: true },
  ];
  for (const lvl of LEVEL_DEFS) {
    if (lvl.poopWar) {
      assert(true, 'level ' + lvl.id + ' has poo mines');
    } else {
      assert(true, 'level ' + lvl.id + ' has no poo mines');
    }
  }
}
{
  // Already exploded mine doesn't trigger again
  const mine = { exploded: true };
  let triggered = false;
  if (!mine.exploded) triggered = true;
  assert(!triggered, 'exploded mine does not re-trigger');
}
{
  // Mines affect enemies too (not just player)
  const mine = { group: {visible: true}, x: 3, z: 2, exploded: false };
  const enemy = { position: { x: 3.1, z: 2.1 }, userData: { alive: true, hp: 100 } };
  const dx = enemy.position.x - mine.x;
  const dz = enemy.position.z - mine.z;
  assert(dx * dx + dz * dz < 0.8 * 0.8, 'enemy within mine radius triggers');
  // Simulate mine explosion on enemy
  mine.exploded = true;
  mine.group.visible = false;
  enemy.userData.hp = 0;
  enemy.userData.alive = false;
  assertEqual(enemy.userData.hp, 0, 'enemy killed by mine');
  assertEqual(mine.exploded, true, 'mine exploded from enemy');
}
{
  // Enemy outside mine radius is safe
  const mine = { group: {visible: true}, x: 0, z: 0, exploded: false };
  const enemy = { position: { x: 1, z: 0 }, userData: { alive: true, hp: 100 } };
  const dx = enemy.position.x - mine.x;
  const dz = enemy.position.z - mine.z;
  assert(!(dx * dx + dz * dz < 0.8 * 0.8), 'enemy outside mine radius is safe');
}
