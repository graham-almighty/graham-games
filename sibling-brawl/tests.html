<!DOCTYPE html>
<html><head><title>Sibling Brawl Tests</title></head>
<body>
<div id="results"></div>
<script>
// === TEST FRAMEWORK ===
let _passed = 0, _failed = 0, _currentGroup = '';
function group(name) { _currentGroup = name; }
function assert(cond, name) {
  const fullName = _currentGroup ? _currentGroup + ': ' + name : name;
  const div = document.createElement('div');
  if (cond) { div.className = 'test pass'; _passed++; }
  else { div.className = 'test fail'; _failed++; }
  div.textContent = (cond ? 'PASS' : 'FAIL') + ': ' + fullName;
  document.getElementById('results').appendChild(div);
}
function assertEqual(a, b, name) {
  assert(a === b, name + ' (expected ' + b + ', got ' + a + ')');
}
function assertApprox(a, b, eps, name) {
  assert(Math.abs(a - b) < eps, name + ' (expected ~' + b + ', got ' + a + ')');
}
function showSummary() {
  const div = document.createElement('div');
  div.className = 'summary';
  div.textContent = _passed + ' passed, ' + _failed + ' failed (' + (_passed + _failed) + ' total)';
  document.getElementById('results').appendChild(div);
}

// === MOCK LOCALSTORAGE ===
const _store = {};
const localStorage = {
  getItem(k) { return _store[k] !== undefined ? _store[k] : null; },
  setItem(k, v) { _store[k] = String(v); },
  removeItem(k) { delete _store[k]; },
  clear() { for (const k in _store) delete _store[k]; },
};

// === CONSTANTS FROM GAME ===
const FIELD_W = 30;
const FIELD_D = 20;

const UNIT_DEFS = {
  pillow: { name: 'Pillow Fighter', cost: 10, hp: 100, damage: 15, speed: 1.5, range: 1.5, icon: '*', special: 'Basic melee brawler' },

  blanket:{ name: 'Blanket Tank',  cost: 12, hp: 130, damage: 12, speed: 1.0, range: 1.8, icon: '*', special: 'Tanky blanket armor', antiScooter: true },
  scooter:{ name: 'Scooter Rider', cost: 25, hp: 90,  damage: 20, speed: 3.0, range: 1.8, icon: '*', special: 'Fast charge attack' },
  balloon:{ name: 'Water Balloon', cost: 40, hp: 80,  damage: 45, speed: 0.4, range: 12,  icon: '*', special: 'Splash damage!', splash: 3 },

// === G BUX SYSTEM ===
const GG_KEY = 'graham-games-data';
function ggLoad() {
  try { return JSON.parse(localStorage.getItem(GG_KEY)) || { gBux: 0, achievements: {}, shopPurchases: {} }; }
  catch { return { gBux: 0, achievements: {}, shopPurchases: {} }; }
}
function ggSave(d) { localStorage.setItem(GG_KEY, JSON.stringify(d)); }

const SB_ACH = {
  sb_first_fight:  { name: 'First Fight',      reward: 5 },
  sb_winner:       { name: 'Winner',            reward: 10 },
  sb_flawless:     { name: 'Untouchable',       reward: 30 },
  sb_pillow_army:  { name: 'Pillow Fort',       reward: 15 },
  sb_nerf_squad:   { name: 'Nerf War',          reward: 15 },
  sb_balanced:     { name: 'Mixed Tactics',     reward: 20 },
  sb_underdog:     { name: 'Outnumbered',       reward: 25 },
  sb_speed_win:    { name: 'Quick Fight',       reward: 20 },
  sb_commander:    { name: 'Big Sibling',       reward: 25 },
  sb_warlord:      { name: 'Supreme Sibling',   reward: 50 },
};

function ggTry(id) {
  const a = SB_ACH[id]; if (!a) return;
  const d = ggLoad(); if (d.achievements[id]) return;
  d.achievements[id] = true; d.gBux += a.reward; ggSave(d);
}
function hasPurchase(id) { return !!ggLoad().shopPurchases[id]; }

// === STATS ===
const STATS_KEY = 'sb-stats';
function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem(STATS_KEY)) || {};
    return { wins: s.wins || 0, battles: s.battles || 0 };
  }
  catch { return { wins: 0, battles: 0 }; }
}
function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

// === PLAYER DATA ===

  nerf:   { name: 'Nerf Gunner', desc: 'Ranged shooter. Pop enemies from a distance!', icon: '🔫', baseDmg: 12, baseHp: 70, range: 10, cooldown: 1.0, attackType: 'ranged' },
  pooSling: { name: 'Poo Slinger', desc: 'Mortar bombardier. Lob stinky payloads!', icon: '💩', baseDmg: 40, baseHp: 70, range: 10, cooldown: 2.5, attackType: 'mortar' },
  cricket: { name: 'Cricket Launcher', desc: 'Launch live crickets at your enemies!', icon: '🦗', baseDmg: 18, baseHp: 75, range: 9, cooldown: 1.2, attackType: 'ranged' },
  soaker: { name: 'Super Soaker', desc: 'Rapid-fire water blaster! Soak them all!', icon: '💦', baseDmg: 10, baseHp: 75, range: 12, cooldown: 0.3, attackType: 'ranged', shopRequired: 'sb_super_soaker' },

  { id: 'dmg',      name: 'Power',         desc: '+3 damage per level',        maxLevel: 10, baseCost: 40 },
  { id: 'speed',    name: 'Speed',         desc: '+0.3 speed per level',       maxLevel: 10, baseCost: 35 },

function upgradeCost(up, lvl) { return Math.floor(up.baseCost * (1 + lvl * 0.4)); }

function loadPlayerData() {
  try {
    const d = JSON.parse(localStorage.getItem(PLAYER_KEY)) || {};

      candy: d.candy || 0,
      playerClass: d.playerClass || 'pillow',
      hairColor: d.hairColor || '#8B4513',
      shirtColor: d.shirtColor || '#4488ff',
      skinColor: d.skinColor || '#ffcc99',
      hairStyle: d.hairStyle || 'short',
      outfit: d.outfit || 'none',
      showHat: d.showHat !== false,
      upgrades: Object.assign({ hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, d.upgrades || {}),
      unlockedLevel: d.unlockedLevel || 1,
      clearedLevels: d.clearedLevels || {},
    };
  } catch { return { candy: 0, playerClass: 'pillow', hairColor: '#8B4513', shirtColor: '#4488ff', skinColor: '#ffcc99', hairStyle: 'short', outfit: 'none', showHat: true, upgrades: { hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, unlockedLevel: 1, clearedLevels: {} }; }
}
function savePlayerData(d) { localStorage.setItem(PLAYER_KEY, JSON.stringify(d)); }

const OUTFITS = [
  { id: 'none', name: 'None', desc: 'No outfit', unlockLevel: 0 },
  { id: 'roman', name: 'Roman', desc: 'Galea helmet, lorica armor, scutum shield', unlockLevel: 3 },
  { id: 'carthaginian', name: 'Carthaginian', desc: 'Bronze helmet, leather cuirass, round shield', unlockLevel: 3 },
  { id: 'union', name: 'Union', desc: 'Navy kepi, brass-buttoned coat', unlockLevel: 6 },
  { id: 'confederate', name: 'Confederate', desc: 'Slouch hat, butternut coat', unlockLevel: 6 },
  { id: 'greek', name: 'Greek', desc: 'Corinthian helmet, bronze cuirass, hoplon shield', unlockLevel: 8 },
];
function isOutfitUnlocked(outfitId, pd) {
  const outfit = OUTFITS.find(o => o.id === outfitId);
  if (!outfit || outfit.unlockLevel === 0) return true;
  return !!pd.clearedLevels[outfit.unlockLevel];
}

function getPlayerStats() {
  const pd = loadPlayerData();
  const cls = CLASSES[pd.playerClass];
  const firerateMult = Math.pow(0.9, pd.upgrades.firerate || 0);
  const rangeMult = 1 + (pd.upgrades.range || 0) * 0.1;
  const splashMult = 1 + (pd.upgrades.splash || 0) * 0.15;
  return {
    hp: cls.baseHp + (pd.upgrades.hp || 0) * 20,
    damage: cls.baseDmg + (pd.upgrades.dmg || 0) * 3,
    speed: 3.5 + (pd.upgrades.speed || 0) * 0.3,
    range: cls.range * rangeMult,
    cooldown: cls.cooldown * firerateMult,
    attackType: cls.attackType,
    splashMult: splashMult,
  };
}

// === DAMAGE CALC (extracted from game) ===
function getAttackDamage(attacker, defender, snackBoostActive) {
  let dmg = attacker.damage;
  const aType = attacker.type;
  const dType = defender.type;
  if (aType === 'blanket' && dType === 'scooter') dmg *= 2;
  if (aType === 'scooter' && attacker.charged) {
    dmg *= 2;
    attacker.charged = false;
  }
  if (aType === 'nerf' && attacker.dist < 2) {
    dmg = UNIT_DEFS.nerf.meleeDamage;
  }
  if (snackBoostActive && attacker.team === 'blue') dmg *= 1.1;
  return dmg;
}

// --- Army Composition ---
group('Army Composition');
{

// --- FPS Player ---
group('FPS Player');
{
  // Player attack damage is pillow damage (15)
  const playerDmg = 15;
  assertEqual(playerDmg, UNIT_DEFS.pillow.damage, 'player deals pillow damage');
}
{
  // Player attack range is 2.5
  const attackRange = 2.5;
  assert(attackRange > UNIT_DEFS.pillow.range, 'player attack range wider than AI pillow');
  assert(attackRange < UNIT_DEFS.nerf.range, 'player attack range less than nerf range');
}
{

}

  assert(playerSpeed > UNIT_DEFS.scooter.speed, 'player faster than scooter (3.0)');
}
{
  // Player eye height is 1.4
  const eyeHeight = 1.4;
  assertEqual(eyeHeight, 1.4, 'player eye height 1.4');
}
{
  // Attack cone: dot product > 0.3 means ~70 degree frontal cone
  const threshold = 0.3;
  assert(threshold > 0, 'attack cone threshold is positive');
  assert(threshold < 1, 'attack cone threshold less than 1 (direct forward)');
  // cos(70deg) ≈ 0.34, so 0.3 gives slightly wider than 70 degrees
  assert(threshold < Math.cos(70 * Math.PI / 180) + 0.05, 'threshold allows ~70 degree cone');
}

// --- Splash Damage Formula ---
group('Splash Damage');
{
  const baseDmg = 45;
  const splash = 3;
  const dmg0 = baseDmg * (1 - 0 / (splash + 1));
  assertEqual(dmg0, 45, 'splash at center = full damage');
  const dmgEdge = baseDmg * (1 - splash / (splash + 1));
  assertApprox(dmgEdge, 11.25, 0.01, 'splash at edge = 11.25');
  const dmgOut = baseDmg * (1 - 4 / (splash + 1));
  assert(dmgOut <= 0, 'splash outside range = 0 or negative');
}

// --- FPS Movement ---
group('FPS Movement');
{
  // Forward vector from yaw
  const yaw = 0;
  const fx = -Math.sin(yaw);
  const fz = -Math.cos(yaw);
  assertApprox(fx, 0, 0.01, 'yaw=0 forward x is 0');
  assertApprox(fz, -1, 0.01, 'yaw=0 forward z is -1');
}
{
  // Right vector perpendicular to forward
  const yaw = 0;
  const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
  const rx = fz, rz = -fx;
  assertApprox(rx, -1, 0.01, 'right vector x at yaw=0');
  assertApprox(rz, 0, 0.01, 'right vector z at yaw=0');
}
{
  // Pitch clamping
  const maxPitch = Math.PI / 3;
  const minPitch = -Math.PI / 3;
  assert(maxPitch < Math.PI / 2, 'max pitch less than 90 degrees');
  const clamped = Math.max(minPitch, Math.min(maxPitch, 2.0));
  assertApprox(clamped, maxPitch, 0.01, 'extreme pitch clamped to max');
}
{
  // Field clamping
  const px = 20, pz = 15;
  const cx = Math.max(-FIELD_W / 2 + 0.5, Math.min(FIELD_W / 2 - 0.5, px));
  const cz = Math.max(-FIELD_D / 2 + 0.5, Math.min(FIELD_D / 2 - 0.5, pz));
  assertEqual(cx, FIELD_W / 2 - 0.5, 'x clamped to right edge');
  assertEqual(cz, FIELD_D / 2 - 0.5, 'z clamped to far edge');
}

  assert(maxRocks > 500, 'mountain has 500+ rocks');

  // No units can spawn inside the mountain slope zone

  const minAllyDist = 1;
  assert(minAllyDist > 0, 'allies never at exact center');
  // Enemy minimum distance is topRadius + 4 (well past slope end at topRadius + 2)
  const minEnemyDist = topRadius + 4;
  assert(minEnemyDist > topRadius + 2, 'enemies spawn past slope zone');
  // getGroundY at enemy spawn distance returns 0 (flat ground)
  const FLAT_TOP_RADIUS = 8;
  const FLAT_TOP_Y = 2.7;
  function getGroundY(x, z) {
    const dist = Math.sqrt(x * x + z * z);
    if (dist <= FLAT_TOP_RADIUS) return FLAT_TOP_Y;
    if (dist >= FLAT_TOP_RADIUS + 2) return 0;
    const slopeFrac = (dist - FLAT_TOP_RADIUS) / 2;
    return FLAT_TOP_Y * (1 - slopeFrac);
  }
  assertEqual(getGroundY(minEnemyDist, 0), 0, 'enemy spawn position is on flat ground');
  assertEqual(getGroundY(3, 0), FLAT_TOP_Y, 'ally spawn is on hilltop');
}

  function checkWallCollision(x, z, walls) {
    for (const wall of walls) {
      if (!wall.alive) continue;
      const halfW = wall.width / 2 + 0.5;
      const halfD = wall.depth / 2 + 0.5;
      if (Math.abs(x - wall.x) < halfW && Math.abs(z - wall.z) < halfD) return wall;
    }
    return null;
  }
  const walls = [{ x: 3, z: 0, width: 1.2, depth: 2, alive: true }];
  assert(checkWallCollision(3, 0, walls), 'unit at wall position is blocked');
  assert(checkWallCollision(3.5, 0.5, walls), 'unit near wall is blocked');
  assert(!checkWallCollision(-5, 0, walls), 'unit far from wall is not blocked');
  assert(!checkWallCollision(3, 5, walls), 'unit past wall Z is not blocked');
  walls[0].alive = false;
  assert(!checkWallCollision(3, 0, walls), 'destroyed wall does not block');
}
{

  assertEqual(wall.hp, 550, 'wall HP after 200 damage');
  assert(wall.alive, 'wall alive after partial damage');
  const pct = wall.hp / wall.maxHp;
  assertApprox(pct, 0.733, 0.01, 'wall at ~73% health');
  wall.hp -= 550;
  if (wall.hp <= 0) { wall.hp = 0; wall.alive = false; }
  assert(!wall.alive, 'wall destroyed when HP reaches 0');
  assertEqual(wall.hp, 0, 'wall HP clamped to 0');
}
{
  // Visual damage shows cracks progressively (5 crack lines per segment)
  const crackCount = 5;
  const wall = { hp: 750, maxHp: 750, height: 2.5 };
  // Full HP — no cracks visible
  const pctFull = wall.hp / wall.maxHp;
  const cracksShownFull = Math.floor((1 - pctFull) * crackCount);
  assertEqual(cracksShownFull, 0, 'no cracks at full HP');
  // 50% HP — some cracks
  wall.hp = 375;
  const pctHalf = wall.hp / wall.maxHp;
  const cracksShownHalf = Math.floor((1 - pctHalf) * crackCount);
  assertEqual(cracksShownHalf, 2, '2 cracks at 50% HP');
  // 20% HP — most cracks
  wall.hp = 150;
  const pctLow = wall.hp / wall.maxHp;
  const cracksShownLow = Math.floor((1 - pctLow) * crackCount);
  assertEqual(cracksShownLow, 4, '4 cracks at 20% HP');
  // 0% HP — all cracks then rubble
  wall.hp = 0;
  const pctZero = Math.max(0, wall.hp / wall.maxHp);
  const cracksShownZero = Math.floor((1 - pctZero) * crackCount);
  assertEqual(cracksShownZero, 5, 'all 5 cracks at 0% HP');
}
{

{

{
  // Wall blocks path detection
  function wallBlocksPath(fromX, toX, fromZ, walls) {
    for (const wall of walls) {
      if (!wall.alive) continue;
      const minX = Math.min(fromX, toX);
      const maxX = Math.max(fromX, toX);
      if (wall.x >= minX && wall.x <= maxX && Math.abs(fromZ - wall.z) < wall.depth / 2 + 0.8) return true;
    }
    return false;
  }
  const walls = [{ x: 3, z: 0, width: 1.2, depth: 2, alive: true }];
  assert(wallBlocksPath(-5, 10, 0, walls), 'wall blocks path across it');
  assert(!wallBlocksPath(-5, 2, 0, walls), 'no block when path does not cross wall');
  assert(!wallBlocksPath(-5, 10, 8, walls), 'no block when path is far from wall Z');
  walls[0].alive = false;
  assert(!wallBlocksPath(-5, 10, 0, walls), 'destroyed wall does not block path');
