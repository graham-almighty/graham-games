<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sibling Brawl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Cinzel&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1020; font-family: 'Cinzel', serif; overflow: hidden; color: #fff; }

/* === TOOLBAR === */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 42px; z-index: 90;
  background: linear-gradient(180deg, #2a1a3a, #1a1020);
  border-bottom: 2px solid #ff66aa;
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
#toolbar .gg-logo { width: 28px; height: 28px; }
#toolbar .title { font-family: 'Bangers', cursive; font-size: 18px; color: #ff66aa; letter-spacing: 2px; }
#toolbar .exit-btn {
  margin-left: auto; background: none; border: 1px solid #ff66aa44;
  color: #ff66aa; padding: 4px 14px; font-family: 'Cinzel'; font-size: 11px;
  cursor: pointer; border-radius: 4px;
}
#toolbar .exit-btn:hover { background: #ff66aa22; }

/* === SCREENS === */
.screen { position: fixed; top: 42px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
.hidden { display: none !important; }

/* === TITLE === */
#title-screen { background: radial-gradient(circle at 50% 40%, #3a1a4a 0%, #1a1020 70%); }
#title-screen h1 { font-family: 'Bangers', cursive; font-size: 72px; color: #ff66aa; text-shadow: 3px 3px 0 #aa2266, 0 0 30px #ff66aa44; }
#title-screen .subtitle { color: #ffaa44; font-size: 16px; margin: 8px 0 30px; font-style: italic; }
.punk-btn {
  background: linear-gradient(135deg, #ff66aa22, #ff66aa11); border: 2px solid #ff66aa;
  color: #ff66aa; padding: 14px 40px; font-family: 'Bangers', cursive; font-size: 22px;
  cursor: pointer; border-radius: 8px; letter-spacing: 2px; transition: all 0.2s;
}
.punk-btn:hover { background: #ff66aa33; transform: translateY(-2px); box-shadow: 0 4px 20px #ff66aa44; }

/* === BATTLE HUD === */
#battle-canvas { flex: 1; width: 100%; }
#battle-hud {
  position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 15;
  background: #00000088; backdrop-filter: blur(4px); border-radius: 0 0 8px 8px;
  padding: 6px 20px; display: flex; gap: 20px; font-size: 14px;
}
.hud-blue { color: #4488ff; font-weight: bold; }
.hud-red { color: #ff4444; font-weight: bold; }
.hud-time { color: #aaa; }

/* === FPS HUD === */
#crosshair {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 15; pointer-events: none; width: 24px; height: 24px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.7);
}
#crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
#crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

#player-hud {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: 15; display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#health-bar {
  width: 220px; height: 18px; background: #33333399; border: 1px solid #666;
  border-radius: 3px; overflow: hidden; backdrop-filter: blur(4px);
}
#health-fill { height: 100%; background: linear-gradient(90deg, #44ff44, #88ff88); transition: width 0.15s; width: 100%; }
#health-text { color: #fff; font-size: 12px; text-shadow: 1px 1px 2px #000; font-family: 'Bangers', cursive; }

#kill-counter {
  position: fixed; bottom: 60px; left: 20px; z-index: 15;
  color: #ff66aa; font-family: 'Bangers', cursive; font-size: 18px;
  text-shadow: 1px 1px 2px #000;
}

#click-start {
  position: fixed; top: 42px; left: 0; right: 0; bottom: 0; z-index: 20;
  background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
}
#click-start .start-title {
  font-family: 'Bangers', cursive; font-size: 42px; color: #ff66aa;
  text-shadow: 0 0 20px #ff66aa66; margin-bottom: 10px;
}
#click-start .start-hint {
  font-size: 14px; color: #aaa; font-family: 'Cinzel', serif;
}

#damage-flash {
  position: fixed; inset: 0; z-index: 14; pointer-events: none;
  background: radial-gradient(ellipse, transparent 50%, rgba(255,0,0,0.3));
  opacity: 0; transition: opacity 0.1s;
}

/* === LOADOUT SCREEN === */
#loadout-screen {
  background: radial-gradient(circle at 50% 40%, #2a1040 0%, #1a1020 70%);
  overflow-y: auto; justify-content: flex-start; padding: 20px;
}
.loadout-wrap {
  display: flex; flex-wrap: wrap; gap: 24px; justify-content: center;
  max-width: 800px; width: 100%;
}
.loadout-panel {
  background: #00000066; border: 1px solid #ff66aa44; border-radius: 8px;
  padding: 16px; min-width: 220px; flex: 1;
}
.loadout-panel h3 {
  font-family: 'Bangers', cursive; color: #ff66aa; font-size: 20px;
  margin-bottom: 12px; letter-spacing: 1px;
}
.loadout-title {
  font-family: 'Bangers', cursive; font-size: 36px; color: #ff66aa;
  text-shadow: 2px 2px 0 #aa2266; margin-bottom: 6px;
}
.loadout-candy {
  color: #ffaa44; font-size: 14px; margin-bottom: 16px;
  font-family: 'Bangers', cursive; letter-spacing: 1px;
}
.class-option {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  border: 2px solid #ffffff22; border-radius: 6px; cursor: pointer;
  margin-bottom: 8px; transition: all 0.2s;
}
.class-option:hover { border-color: #ff66aa66; background: #ff66aa11; }
.class-option.selected { border-color: #ff66aa; background: #ff66aa22; }
.class-icon { font-size: 28px; width: 40px; text-align: center; }
.class-info { flex: 1; }
.class-name { font-family: 'Bangers', cursive; font-size: 16px; color: #fff; }
.class-desc { font-size: 11px; color: #aaa; }
.color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.color-row label { color: #ccc; font-size: 12px; width: 60px; }
.color-row input[type=color] {
  width: 36px; height: 24px; border: 1px solid #ff66aa44; border-radius: 4px;
  background: none; cursor: pointer; padding: 0;
}
.upgrade-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  padding: 6px; border: 1px solid #ffffff11; border-radius: 4px;
}
.upgrade-name { color: #ccc; font-size: 13px; flex: 1; }
.upgrade-level { color: #ff66aa; font-size: 13px; font-family: 'Bangers', cursive; width: 50px; }
.upgrade-btn {
  background: #ff66aa22; border: 1px solid #ff66aa; color: #ff66aa;
  padding: 3px 10px; font-family: 'Bangers', cursive; font-size: 12px;
  cursor: pointer; border-radius: 4px; transition: all 0.15s;
}
.upgrade-btn:hover { background: #ff66aa44; }
.upgrade-btn:disabled { opacity: 0.3; cursor: default; }
.loadout-go {
  margin-top: 16px; width: 100%; text-align: center;
}

/* === LEVEL SELECT === */
#level-screen {
  background: radial-gradient(circle at 50% 40%, #2a1040 0%, #1a1020 70%);
  overflow-y: auto; padding: 20px;
}
.level-title {
  font-family: 'Bangers', cursive; font-size: 36px; color: #ff66aa;
  text-shadow: 2px 2px 0 #aa2266; margin-bottom: 20px;
}
.level-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.level-card {
  background: #00000066; border: 2px solid #ff66aa44; border-radius: 10px;
  padding: 20px; width: 260px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.level-card:hover:not(.locked) { border-color: #ff66aa; background: #ff66aa11; transform: translateY(-3px); }
.level-card.locked { opacity: 0.4; cursor: default; }
.level-card .level-num { font-family: 'Bangers', cursive; font-size: 14px; color: #aaa; letter-spacing: 2px; }
.level-card .level-name { font-family: 'Bangers', cursive; font-size: 28px; color: #ff66aa; margin: 6px 0; }
.level-card .level-desc { font-size: 12px; color: #ccc; line-height: 1.5; }
.level-card .level-lock { font-size: 24px; margin-top: 8px; }
.level-card .level-badge {
  display: inline-block; margin-top: 8px; padding: 2px 10px; border-radius: 4px;
  font-family: 'Bangers', cursive; font-size: 12px;
}
.level-card .badge-clear { background: #44ff4433; color: #44ff44; border: 1px solid #44ff4466; }
.level-card .badge-new { background: #ff66aa22; color: #ff66aa; border: 1px solid #ff66aa44; }

/* === END SCREEN === */
#end-screen { background: #000000cc; backdrop-filter: blur(8px); }
#end-screen h2 { font-family: 'Bangers', cursive; font-size: 56px; margin-bottom: 10px; }
#end-screen .end-subtitle { font-size: 18px; margin-bottom: 20px; color: #aaa; }
#end-screen .end-stats { font-size: 14px; color: #ccc; line-height: 2; margin-bottom: 20px; }
#end-screen .end-stats span { font-weight: bold; color: #ff66aa; }
.end-btns { display: flex; gap: 12px; }

/* === INTRO CINEMATIC === */
#intro-screen { background: #000; justify-content: flex-start; padding: 0; }
.intro-container {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative; overflow: hidden;
}
.intro-letterbox-top, .intro-letterbox-bot {
  position: absolute; left: 0; right: 0; height: 12%; background: #000; z-index: 2;
}
.intro-letterbox-top { top: 0; }
.intro-letterbox-bot { bottom: 0; }
.intro-text {
  position: absolute; width: 80%; max-width: 700px; text-align: center;
  font-family: 'Bangers', cursive; color: #fff; opacity: 0;
  transition: opacity 1s, transform 1s; transform: translateY(30px); z-index: 3;
}
.intro-text.visible { opacity: 1; transform: translateY(0); }
.intro-text.exit { opacity: 0; transform: translateY(-30px); }
.intro-text .line { margin: 10px 0; line-height: 1.4; }
.intro-text .dramatic { font-size: 36px; color: #ff66aa; text-shadow: 0 0 20px #ff66aa66; }
.intro-text .narration { font-size: 22px; color: #ddd; }
.intro-text .small { font-size: 16px; color: #aaa; font-family: 'Cinzel', serif; font-style: italic; }
.intro-text .candy { color: #ffaa44; }
.intro-text .villain { color: #ff4444; }
.intro-text .hero { color: #4488ff; }
.intro-scene { position: absolute; inset: 0; z-index: 1; }
.intro-scene-bg { position: absolute; inset: 12% 0; overflow: hidden; }
@keyframes introGlow {
  0% { box-shadow: inset 0 0 80px #ff66aa11; }
  50% { box-shadow: inset 0 0 120px #ff66aa22; }
  100% { box-shadow: inset 0 0 80px #ff66aa11; }
}
.intro-scene-bg { animation: introGlow 3s ease-in-out infinite; }
.intro-skip {
  position: absolute; bottom: 15%; right: 5%; z-index: 10;
  background: none; border: 1px solid #ffffff44; color: #888;
  padding: 6px 16px; font-family: 'Cinzel', serif; font-size: 11px;
  cursor: pointer; border-radius: 4px; transition: all 0.2s;
}
.intro-skip:hover { color: #fff; border-color: #fff; }

/* === TOAST === */
#gg-toast {
  position: fixed; top: 50px; right: -300px; z-index: 100;
  background: linear-gradient(135deg, #2a1a3a, #1a1020); border: 1px solid #ff66aa;
  border-radius: 8px; padding: 12px 20px; color: #ff66aa; font-size: 13px;
  transition: right 0.4s;
}
#gg-toast.visible { right: 10px; }

@media (max-width: 600px) {
  #title-screen h1 { font-size: 42px; }
  #health-bar { width: 160px; }
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <svg class="gg-logo" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="#ff66aa" stroke-width="2"/><text x="20" y="26" text-anchor="middle" fill="#ff66aa" font-size="16" font-family="Bangers">SB</text></svg>
  <span class="title">SIBLING BRAWL</span>
  <button class="exit-btn" onclick="window.location.href='../index.html'">EXIT TO LAUNCHER</button>
</div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen">
  <h1>SIBLING BRAWL</h1>
  <div class="subtitle">Stop the Evil Younger Sibling Empire!</div>
  <button class="punk-btn" onclick="showLevelSelect()">BATTLE!</button>
</div>

<!-- INTRO CINEMATIC -->
<div id="intro-screen" class="screen hidden">
  <div class="intro-container">
    <div class="intro-letterbox-top"></div>
    <div class="intro-letterbox-bot"></div>
    <div class="intro-scene">
      <div class="intro-scene-bg" id="intro-scene-bg"></div>
      <canvas id="intro-canvas" style="position:absolute;inset:12% 0;width:100%;height:76%;z-index:1;"></canvas>
    </div>
    <div class="intro-text" id="intro-text"></div>
    <button class="intro-skip" onclick="skipIntro()">SKIP ></button>
  </div>
</div>

<!-- LEVEL SELECT -->
<div id="level-screen" class="screen hidden">
  <div class="level-title">SELECT MISSION</div>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- LOADOUT SCREEN -->
<div id="loadout-screen" class="screen hidden">
  <div class="loadout-title">LOADOUT</div>
  <div class="loadout-candy" id="loadout-candy">Candy: 0</div>
  <div class="loadout-wrap">
    <div class="loadout-panel">
      <h3>CLASS</h3>
      <div id="class-picker"></div>
      <h3 style="margin-top:16px">LOOK</h3>
      <div class="color-row"><label>Hair</label><input type="color" id="color-hair" value="#8B4513"></div>
      <div class="color-row"><label>Shirt</label><input type="color" id="color-shirt" value="#4488ff"></div>
      <div class="color-row"><label>Skin</label><input type="color" id="color-skin" value="#ffcc99"></div>
    </div>
    <div class="loadout-panel">
      <h3>UPGRADES</h3>
      <div id="upgrade-list"></div>
    </div>
  </div>
  <div class="loadout-go">
    <button class="punk-btn" onclick="confirmLoadout()">FIGHT!</button>
  </div>
</div>

<!-- BATTLE SCREEN -->
<div id="battle-screen" class="screen hidden">
  <div id="battle-hud">
    <span class="hud-blue" id="hud-blue">Allies: 0</span>
    <span class="hud-time" id="hud-time">0:00</span>
    <span class="hud-red" id="hud-red">Enemy: 0</span>
  </div>
  <div id="battle-canvas"></div>
  <div id="crosshair"></div>
  <div id="player-hud">
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="health-text">100 HP</div>
  </div>
  <div id="kill-counter">Kills: 0</div>
  <div id="damage-flash"></div>
  <div id="click-start" class="hidden">
    <div class="start-title">CLICK TO START</div>
    <div class="start-hint">WASD to move | Mouse to look | Left click to attack</div>
  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen" class="screen hidden">
  <h2 id="end-title"></h2>
  <div class="end-subtitle" id="end-subtitle"></div>
  <div class="end-stats" id="end-stats"></div>
  <div class="end-btns">
    <button class="punk-btn" onclick="showLoadout()">PLAY AGAIN</button>
    <button class="punk-btn" onclick="showLevelSelect()" style="border-color:#aaa;color:#aaa">MISSIONS</button>
  </div>
</div>

<div id="gg-toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =============================================
// G BUX INTEGRATION
// =============================================
const GG_KEY = 'graham-games-data';
function ggLoad() {
  try { return JSON.parse(localStorage.getItem(GG_KEY)) || { gBux: 0, achievements: {}, shopPurchases: {} }; }
  catch { return { gBux: 0, achievements: {}, shopPurchases: {} }; }
}
function ggSave(d) { localStorage.setItem(GG_KEY, JSON.stringify(d)); }

const toastQueue = [];
let toastShowing = false;
function showToast(msg) { toastQueue.push(msg); if (!toastShowing) drainToast(); }
function drainToast() {
  if (!toastQueue.length) { toastShowing = false; return; }
  toastShowing = true;
  const el = document.getElementById('gg-toast');
  el.textContent = toastQueue.shift();
  el.classList.add('visible');
  setTimeout(() => { el.classList.remove('visible'); setTimeout(drainToast, 400); }, 2500);
}

const SB_ACH = {
  sb_first_fight:  { name: 'First Fight',      reward: 5 },
  sb_winner:       { name: 'Winner',            reward: 10 },
  sb_flawless:     { name: 'Untouchable',       reward: 30 },
  sb_pillow_army:  { name: 'Pillow Fort',       reward: 15 },
  sb_nerf_squad:   { name: 'Nerf War',          reward: 15 },
  sb_balanced:     { name: 'Mixed Tactics',     reward: 20 },
  sb_underdog:     { name: 'Outnumbered',       reward: 25 },
  sb_speed_win:    { name: 'Quick Fight',       reward: 20 },
  sb_commander:    { name: 'Big Sibling',       reward: 25 },
  sb_warlord:      { name: 'Supreme Sibling',   reward: 50 },
};
function ggTry(id) {
  const a = SB_ACH[id]; if (!a) return;
  const d = ggLoad(); if (d.achievements[id]) return;
  d.achievements[id] = true; d.gBux += a.reward; ggSave(d);
  showToast('* ' + a.name + ' +' + a.reward + 'G');
}
function hasPurchase(id) { return !!ggLoad().shopPurchases[id]; }

// =============================================
// STATS
// =============================================
const STATS_KEY = 'sb-stats';
function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem(STATS_KEY)) || {};
    return { wins: s.wins || 0, battles: s.battles || 0 };
  }
  catch { return { wins: 0, battles: 0 }; }
}
function saveStats(s) { localStorage.setItem(STATS_KEY, JSON.stringify(s)); }

// =============================================
// PLAYER DATA (persistent across sessions)
// =============================================
const PLAYER_KEY = 'sb-player';
const CLASSES = {
  pillow: { name: 'Pillow Fighter', desc: 'Melee brawler. Smack enemies with your pillow!', icon: '🛏️', baseDmg: 15, baseHp: 100, range: 2.5, cooldown: 0.8, attackType: 'melee' },
  nerf:   { name: 'Nerf Gunner', desc: 'Ranged shooter. Pop enemies from a distance!', icon: '🔫', baseDmg: 12, baseHp: 70, range: 10, cooldown: 1.0, attackType: 'ranged' },
  pooSling: { name: 'Poo Slinger', desc: 'Mortar bombardier. Lob stinky payloads!', icon: '💩', baseDmg: 40, baseHp: 70, range: 10, cooldown: 2.5, attackType: 'mortar' },
};
const UPGRADES = [
  { id: 'hp',       name: 'Toughness',     desc: '+20 HP per level',           maxLevel: 5, cost: 30 },
  { id: 'dmg',      name: 'Power',         desc: '+3 damage per level',        maxLevel: 5, cost: 40 },
  { id: 'speed',    name: 'Speed',         desc: '+0.3 speed per level',       maxLevel: 5, cost: 35 },
  { id: 'firerate', name: 'Fire Rate',     desc: '-10% cooldown per level',    maxLevel: 5, cost: 45 },
  { id: 'range',    name: 'Reach',         desc: '+10% range per level',       maxLevel: 5, cost: 40 },
  { id: 'splash',   name: 'Blast Radius',  desc: '+15% splash per level',     maxLevel: 3, cost: 60 },
];

function loadPlayerData() {
  try {
    const d = JSON.parse(localStorage.getItem(PLAYER_KEY)) || {};
    return {
      candy: d.candy || 0,
      playerClass: d.playerClass || 'pillow',
      hairColor: d.hairColor || '#8B4513',
      shirtColor: d.shirtColor || '#4488ff',
      skinColor: d.skinColor || '#ffcc99',
      upgrades: Object.assign({ hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, d.upgrades || {}),
      unlockedLevel: d.unlockedLevel || 1,
      clearedLevels: d.clearedLevels || {},
    };
  } catch { return { candy: 0, playerClass: 'pillow', hairColor: '#8B4513', shirtColor: '#4488ff', skinColor: '#ffcc99', upgrades: { hp: 0, dmg: 0, speed: 0, firerate: 0, range: 0, splash: 0 }, unlockedLevel: 1, clearedLevels: {} }; }
}
function savePlayerData(d) { localStorage.setItem(PLAYER_KEY, JSON.stringify(d)); }

function getPlayerStats() {
  const pd = loadPlayerData();
  const cls = CLASSES[pd.playerClass];
  const firerateMult = Math.pow(0.9, pd.upgrades.firerate || 0); // -10% per level
  const rangeMult = 1 + (pd.upgrades.range || 0) * 0.1; // +10% per level
  const splashMult = 1 + (pd.upgrades.splash || 0) * 0.15; // +15% per level
  return {
    hp: cls.baseHp + (pd.upgrades.hp || 0) * 20,
    damage: cls.baseDmg + (pd.upgrades.dmg || 0) * 3,
    speed: 3.5 + (pd.upgrades.speed || 0) * 0.3,
    range: cls.range * rangeMult,
    cooldown: cls.cooldown * firerateMult,
    attackType: cls.attackType,
    splashMult: splashMult,
  };
}

// =============================================
// LEVEL DEFINITIONS
// =============================================
let currentLevel = 1;

const LEVEL_DEFS = [
  { id: 1, name: 'THE LIVING ROOM', desc: 'Take back the living room from the younger sibling empire!', boatPhase: false, partyHats: false },
  { id: 2, name: 'B-DAY', desc: 'Storm the birthday party! Operation B-Day is a GO!', boatPhase: true, partyHats: true },
  { id: 3, name: 'DOG POOPIC WAR I', desc: 'The dog left landmines in the backyard. Time to weaponize them!', poopWar: true },
  { id: 4, name: 'DOG POOPIC WAR II', desc: 'The Great Poo Offensive! They have slingshots now too!', poopWar: true },
  { id: 5, name: 'DOG POOPIC WAR III', desc: 'The Final Flush. Winner takes the yard FOREVER.', poopWar: true },
];

function showLevelSelect() {
  hideAllScreens();
  document.getElementById('level-screen').classList.remove('hidden');
  renderLevelSelect();
}

function renderLevelSelect() {
  const pd = loadPlayerData();
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  for (const lvl of LEVEL_DEFS) {
    const unlocked = lvl.id <= pd.unlockedLevel;
    const cleared = !!pd.clearedLevels[lvl.id];
    const card = document.createElement('div');
    card.className = 'level-card' + (unlocked ? '' : ' locked');
    card.innerHTML =
      '<div class="level-num">MISSION ' + lvl.id + '</div>' +
      '<div class="level-name">' + lvl.name + '</div>' +
      '<div class="level-desc">' + lvl.desc + '</div>' +
      (unlocked
        ? '<div class="level-badge ' + (cleared ? 'badge-clear' : 'badge-new') + '">' + (cleared ? 'CLEARED' : 'READY') + '</div>'
        : '<div class="level-lock">🔒</div>');
    if (unlocked) {
      card.onclick = () => { currentLevel = lvl.id; showIntro(); };
    }
    grid.appendChild(card);
  }
}

// SOUND EFFECTS
// =============================================
const SFX = (() => {
  let ctx;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function play(fn) { try { fn(getCtx()); } catch {} }

  return {
    pillowHit() { play(c => {
      const n = c.createBufferSource(); const buf = c.createBuffer(1, c.sampleRate * 0.1, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
      n.buffer = buf; const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      n.connect(f); f.connect(c.destination); n.start();
    }); },
    nerfShot() { play(c => {
      const o = c.createOscillator(); const g = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(1200, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(400, c.currentTime + 0.1);
      g.gain.setValueAtTime(0.15, c.currentTime); g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.1);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + 0.1);
    }); },
    splash() { play(c => {
      const n = c.createBufferSource(); const buf = c.createBuffer(1, c.sampleRate * 0.25, c.sampleRate);
      const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4;
      n.buffer = buf; const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
      n.connect(f); f.connect(c.destination); n.start();
    }); },
    scooterZoom() { play(c => {
      const o = c.createOscillator(); const g = c.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(150, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(300, c.currentTime + 0.15);
      g.gain.setValueAtTime(0.1, c.currentTime); g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + 0.15);
    }); },
    victory() { play(c => {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = c.createOscillator(); const g = c.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.1, c.currentTime + i * 0.15);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i * 0.15 + 0.3);
        o.connect(g); g.connect(c.destination); o.start(c.currentTime + i * 0.15); o.stop(c.currentTime + i * 0.15 + 0.3);
      });
    }); },
    defeat() { play(c => {
      [200, 180, 150, 120].forEach((f, i) => {
        const o = c.createOscillator(); const g = c.createGain();
        o.type = 'sawtooth'; o.frequency.value = f;
        g.gain.setValueAtTime(0.08, c.currentTime + i * 0.2);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i * 0.2 + 0.3);
        o.connect(g); g.connect(c.destination); o.start(c.currentTime + i * 0.2); o.stop(c.currentTime + i * 0.2 + 0.3);
      });
    }); },
    waterGun() { play(c => {
      const n = c.createBufferSource(); const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3 * (1 - i / d.length);
      n.buffer = buf;
      const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1500;
      const g = c.createGain(); g.gain.value = 0.3;
      n.connect(f); f.connect(g); g.connect(c.destination); n.start();
    }); },
    pooLaunch() { play(c => {
      // Wet stretchy slingshot snap + splat
      const o = c.createOscillator(); const g = c.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(80, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.05);
      o.frequency.exponentialRampToValueAtTime(60, c.currentTime + 0.15);
      g.gain.setValueAtTime(0.15, c.currentTime); g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
      o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + 0.15);
    }); },
    pooSplat() { play(c => {
      const n = c.createBufferSource(); const buf = c.createBuffer(1, c.sampleRate * 0.2, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.5 * (1 - i / d.length);
      n.buffer = buf;
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
      const g = c.createGain(); g.gain.value = 0.3;
      n.connect(f); f.connect(g); g.connect(c.destination); n.start();
    }); },
  };
})();

let renderer, scene, camera, clock;

function initThree(container) {
  if (!renderer) {
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  }
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffe8cc);
  scene.fog = new THREE.Fog(0xffe8cc, 20, 45);

  camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 100);

  clock = new THREE.Clock();

  // Lights - warm indoor
  const ambient = new THREE.AmbientLight(0xffeedd, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 8);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -20; dirLight.shadow.camera.right = 20;
  dirLight.shadow.camera.top = 15; dirLight.shadow.camera.bottom = -15;
  scene.add(dirLight);

  const hemi = new THREE.HemisphereLight(0xffeebb, 0x886644, 0.4);
  scene.add(hemi);

  // Add camera to scene so weapon mesh children render
  scene.add(camera);
}

let fieldGroup;

function buildBattlefield() {
  const lvl = LEVEL_DEFS.find(l => l.id === currentLevel);
  const outdoor = lvl && lvl.poopWar;

  fieldGroup = new THREE.Group();
  scene.add(fieldGroup);

  if (outdoor) {
    // Grass floor for outdoor levels
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_W + 10, FIELD_D + 10),
      new THREE.MeshStandardMaterial({ color: 0x55aa44, roughness: 0.95 }));
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    floor.name = 'ground';
    fieldGroup.add(floor);
    return; // No walls, couch, carpet, etc.
  }

  // Carpet floor
  const floorGeo = new THREE.PlaneGeometry(FIELD_W, FIELD_D);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0xc4956a, roughness: 0.9 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  floor.name = 'ground';
  fieldGroup.add(floor);

  // Carpet pattern - subtle stripes
  for (let i = -FIELD_D / 2 + 2; i < FIELD_D / 2; i += 2) {
    const stripe = new THREE.Mesh(
      new THREE.PlaneGeometry(FIELD_W, 0.3),
      new THREE.MeshStandardMaterial({ color: 0xb8875e, roughness: 0.9 })
    );
    stripe.rotation.x = -Math.PI / 2;
    stripe.position.set(0, 0.01, i);
    fieldGroup.add(stripe);
  }

  // Center dividing line
  const center = new THREE.Mesh(
    new THREE.PlaneGeometry(0.1, FIELD_D),
    new THREE.MeshStandardMaterial({ color: 0xffffff, opacity: 0.3, transparent: true })
  );
  center.rotation.x = -Math.PI / 2;
  center.position.y = 0.02;
  fieldGroup.add(center);

  // Toy blocks (obstacles/decoration)
  const blockColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];
  for (let i = 0; i < 8; i++) {
    const size = 0.4 + Math.random() * 0.4;
    const block = new THREE.Mesh(
      new THREE.BoxGeometry(size, size, size),
      new THREE.MeshStandardMaterial({ color: blockColors[i % blockColors.length] })

    block.position.set(
      (Math.random() - 0.5) * FIELD_W * 0.8,
      size / 2,
      (Math.random() - 0.5) * FIELD_D * 0.8
    );
    block.rotation.y = Math.random() * Math.PI;
    block.castShadow = true;
    fieldGroup.add(block);
  }

  // Couch (back wall decoration)
  const couchBody = new THREE.Mesh(
    new THREE.BoxGeometry(8, 2, 2),
    new THREE.MeshStandardMaterial({ color: 0x6644aa })
  );
  couchBody.position.set(0, 1, -FIELD_D / 2 - 1.5);
  couchBody.castShadow = true;
  fieldGroup.add(couchBody);
  const couchBack = new THREE.Mesh(
    new THREE.BoxGeometry(8, 2.5, 0.5),
    new THREE.MeshStandardMaterial({ color: 0x5533aa })
  );
  couchBack.position.set(0, 2.25, -FIELD_D / 2 - 2.5);
  couchBack.castShadow = true;
  fieldGroup.add(couchBack);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xeeddcc });
  const wallH = 8;
  const wallY = wallH / 2;

  // Back wall
  const backWall = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_W + 4, wallH), wallMat);
  backWall.position.set(0, wallY, -FIELD_D / 2 - 2);
  fieldGroup.add(backWall);

  // Front wall
  const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_W + 4, wallH), wallMat);
  frontWall.position.set(0, wallY, FIELD_D / 2 + 2);
  frontWall.rotation.y = Math.PI;
  fieldGroup.add(frontWall);

  // Left wall
  const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_D + 4, wallH), wallMat);
  leftWall.position.set(-FIELD_W / 2 - 2, wallY, 0);
  leftWall.rotation.y = Math.PI / 2;
  fieldGroup.add(leftWall);

  // Right wall
  const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_D + 4, wallH), wallMat);
  rightWall.position.set(FIELD_W / 2 + 2, wallY, 0);
  rightWall.rotation.y = -Math.PI / 2;
  fieldGroup.add(rightWall);

  // Baseboard trim
  const trimMat = new THREE.MeshStandardMaterial({ color: 0xccbbaa });
  const trimH = 0.4;
  const backTrim = new THREE.Mesh(new THREE.BoxGeometry(FIELD_W + 4, trimH, 0.15), trimMat);
  backTrim.position.set(0, trimH / 2, -FIELD_D / 2 - 1.9);
  fieldGroup.add(backTrim);
  const leftTrim = new THREE.Mesh(new THREE.BoxGeometry(0.15, trimH, FIELD_D + 4), trimMat);
  leftTrim.position.set(-FIELD_W / 2 - 1.9, trimH / 2, 0);
  fieldGroup.add(leftTrim);

}

let boatPhase = false;
let boatGroup = null;
let allyBoats = [];
let landingCutscene = false;
let landingTime = 0;
const LANDING_DURATION = 6;
const BOAT_SPEED = 1.8;

function buildBoat(variation) {
  const boat = new THREE.Group();
  const v = variation || 0;
  const cardboard = new THREE.MeshStandardMaterial({ color: 0xa07040 });

  // Bottom
  const bottom = new THREE.Mesh(new THREE.BoxGeometry(2, 0.08, 1.6), cardboard);
  bottom.position.y = 0.04;
  boat.add(bottom);

  // Left wall
  const leftW = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.08), cardboard);
  leftW.position.set(0, 0.5, -0.8);
  boat.add(leftW);

  // Right wall
  const rightW = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.08), cardboard);
  rightW.position.set(0, 0.5, 0.8);
  boat.add(rightW);

  // Back wall
  const backW = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1, 1.7), cardboard);
  backW.position.set(-1, 0.5, 0);
  boat.add(backW);

  // Flames painted on sides (different colors per boat)
  const flameColors = [0xff6600, 0xff2200, 0x00ccff, 0x44ff44, 0xffaa00];
  const flameColor = flameColors[v % flameColors.length];
  const flameMat = new THREE.MeshStandardMaterial({ color: flameColor, emissive: flameColor, emissiveIntensity: 0.3 });
  for (const zs of [-0.78, 0.78]) {
    for (let i = 0; i < 3; i++) {
      const flame = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 4), flameMat);
      flame.position.set(-0.3 + i * 0.4, 0.3, zs);
      flame.rotation.z = zs < 0 ? 0.1 : -0.1;
      boat.add(flame);
    }
  }

  // Flag pole + flag
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.5),
    new THREE.MeshStandardMaterial({ color: 0xcccccc }));
  pole.position.set(-0.8, 1.2, 0);
  boat.add(pole);
  const flagColors = [0x4488ff, 0x44ddff, 0x88ff44, 0xffaa44, 0xff66aa];
  const flag = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.3, 0.02),
    new THREE.MeshStandardMaterial({ color: flagColors[v % flagColors.length] }));
  flag.position.set(-0.8, 1.8, 0.15);
  boat.add(flag);

  // Wheels underneath (it's on carpet!)
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  for (const wx of [-0.7, 0.7]) {
    for (const wz of [-0.5, 0.5]) {
      const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.04, 8), wheelMat);
      wheel.rotation.z = Math.PI / 2;
      wheel.position.set(wx, 0.08, wz);
      boat.add(wheel);
    }
  }

  return boat;
}

function startLandingCutscene() {
  landingCutscene = true;
  landingTime = 0;
  allyBoats = [];

  // Hide weapon during cutscene
  if (weaponGroup) weaponGroup.visible = false;

  // Player boat (lead boat, center)
  boatGroup = buildBoat(0);
  const startX = -FIELD_W / 2 - 6;
  boatGroup.position.set(startX, 0, 0);
  scene.add(boatGroup);
  playerUnit.position.set(startX, 0, 0);

  // Make player model visible during cutscene (rider in lead boat)
  playerUnit.visible = true;

  // Place ally units into boats behind/beside the player
  const allyUnits = deployedUnits.filter(u => !u.userData.isPlayer);
  const boatCount = Math.ceil(allyUnits.length / 3);
  const boatPositions = [];
  for (let i = 0; i < boatCount; i++) {
    const row = Math.floor(i / 3);
    const col = (i % 3) - 1;
    boatPositions.push({
      x: startX - 3 - row * 3.5,
      z: col * 3.5 + (row % 2 ? 1.5 : 0),
    });
  }

  let unitIdx = 0;
  for (let b = 0; b < boatCount; b++) {
    const ab = buildBoat(b + 1);
    ab.position.set(boatPositions[b].x, 0, boatPositions[b].z);
    scene.add(ab);

    const riders = [];
    for (let r = 0; r < 3 && unitIdx < allyUnits.length; r++, unitIdx++) {
      const u = allyUnits[unitIdx];
      u.position.set(boatPositions[b].x + (r - 1) * 0.5, 0, boatPositions[b].z);
      u.visible = true;
      riders.push(u);
    }

    allyBoats.push({ mesh: ab, startX: boatPositions[b].x, z: boatPositions[b].z, riders });
  }

  // Hide HUD during cutscene
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('player-hud').style.display = 'none';
  document.getElementById('kill-counter').style.display = 'none';
  document.getElementById('click-start').classList.add('hidden');

  // Set camera rotation order for cinematic (prevents sideways snap)
  camera.rotation.order = 'YXZ';

  startBattleMusic();
  clock.getDelta();
  landingLoop();
}

function landingLoop() {
  if (!battleRunning) return;
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05);
  landingTime += dt;

  const progress = Math.min(landingTime / LANDING_DURATION, 1);
  const dest = -FIELD_W / 4;
  const fleetStart = -FIELD_W / 2 - 6;

  // Move player boat
  const playerBoatX = fleetStart + progress * (dest - fleetStart);
  boatGroup.position.x = playerBoatX;
  playerUnit.position.set(playerBoatX, 0, 0);

  // Move ally boats (staggered — they catch up)
  for (const ab of allyBoats) {
    const delay = (fleetStart - ab.startX) / 18;
    const boatProgress = Math.min(Math.max((landingTime - delay) / LANDING_DURATION, 0), 1);
    const abDest = -2 - Math.random() * 0.01;
    const bx = ab.startX + boatProgress * (abDest - ab.startX);
    ab.mesh.position.x = bx;
    for (const r of ab.riders) {
      r.position.x = bx + (Math.random() - 0.5) * 0.3;
    }
  }

  // Camera: cinematic behind-view, slowly tracking forward and lowering
  const camDist = 8 - progress * 3;
  const camHeight = 4 + (1 - progress) * 2;
  const camX = playerBoatX - camDist;
  camera.position.set(camX, camHeight, 0.5);
  camera.lookAt(new THREE.Vector3(playerBoatX + 4, 1, 0));

  billboardHealthBars();
  renderer.render(scene, camera);

  if (progress >= 1) {
    beginCameraTransition();
    return;
  }

  requestAnimationFrame(landingLoop);
}

// Smooth transition from cinematic camera to FPS camera
let camTransTime = 0;
const CAM_TRANS_DURATION = 1.5;
let camTransStart = {};

function beginCameraTransition() {
  // Remove all boats
  if (boatGroup) { scene.remove(boatGroup); boatGroup = null; }
  for (const ab of allyBoats) { scene.remove(ab.mesh); }
  allyBoats = [];

  // Scatter ally units to their fighting positions
  const allyUnits = deployedUnits.filter(u => !u.userData.isPlayer);
  for (const u of allyUnits) {
    u.position.set(-2 - Math.random() * (FIELD_W / 2 - 3), 0, (Math.random() - 0.5) * (FIELD_D - 2));
    u.rotation.y = -Math.PI / 2;
    u.visible = true;
  }

  // Put player at landing spot
  playerUnit.position.set(-FIELD_W / 4, 0, 0);

  // Record where the cinematic camera currently is
  camTransStart = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z,
  };

  camTransTime = 0;
  clock.getDelta();
  camTransLoop();
}

function camTransLoop() {
  if (!battleRunning) return;
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05);
  camTransTime += dt;

  const t = Math.min(camTransTime / CAM_TRANS_DURATION, 1);
  // Smooth ease-in-out
  const ease = t < 0.5 ? 2 * t * t : 1 - 2 * (1 - t) * (1 - t);

  // FPS target position
  const fpsX = playerUnit.position.x;
  const fpsY = 1.4;
  const fpsZ = playerUnit.position.z;

  // Interpolate position
  camera.position.set(
    camTransStart.x + (fpsX - camTransStart.x) * ease,
    camTransStart.y + (fpsY - camTransStart.y) * ease,
    camTransStart.z + (fpsZ - camTransStart.z) * ease
  );

  // Gradually rotate to face forward (rightward toward enemies)
  const lookTarget = new THREE.Vector3(
    camera.position.x + 5 * (1 - ease) + ease * (-Math.sin(-Math.PI / 2)) * 5,
    1 + (1 - ease) * 0.5,
    ease * (-Math.cos(-Math.PI / 2)) * 5
  );
  camera.lookAt(lookTarget);

  billboardHealthBars();
  renderer.render(scene, camera);

  if (t >= 1) {
    endLandingCutscene();
    return;
  }

  requestAnimationFrame(camTransLoop);
}

function endLandingCutscene() {
  landingCutscene = false;

  // Hide player model again (back to FPS), show weapon
  playerUnit.visible = false;
  if (weaponGroup) weaponGroup.visible = true;

  // Set FPS camera properly
  playerYaw = -Math.PI / 2;
  playerPitch = 0;
  camera.rotation.order = 'YXZ';

  // Start idle render loop so scene doesn't appear frozen
  preBattleIdle = true;
  preBattleIdleLoop();

  // Show click to start
  const pd = loadPlayerData();
  const attackHint = pd.playerClass === 'nerf' ? 'Left click to shoot' : pd.playerClass === 'pooSling' ? 'Left click to launch' : 'Left click to swing';
  document.getElementById('click-start').classList.remove('hidden');
  document.querySelector('#click-start .start-hint').textContent = 'WASD to move | Mouse to look | ' + attackHint;

  const startOverlay = document.getElementById('click-start');
  startOverlay.addEventListener('click', function startClick() {
    startOverlay.removeEventListener('click', startClick);
    preBattleIdle = false;
    renderer.domElement.requestPointerLock();
    startOverlay.classList.add('hidden');
    document.getElementById('crosshair').style.display = '';
    document.getElementById('player-hud').style.display = '';
    document.getElementById('kill-counter').style.display = '';

    clock.getDelta();
    battleLoop();
  });
}

let preBattleIdle = false;
function preBattleIdleLoop() {
  if (!preBattleIdle) return;
  updatePlayerCamera();
  billboardHealthBars();
  renderer.render(scene, camera);
  requestAnimationFrame(preBattleIdleLoop);
}

  return group;
}

// ARMY GENERATION (Equal forces, fair battle)
// =============================================
let deployedUnits = [];
let enemyUnits = [];
let playerUnit = null;

function generateArmies() {
  deployedUnits = [];
  enemyUnits = [];

  const pd = loadPlayerData();
  const pStats = getPlayerStats();

  // Create player unit (invisible — we're in first person) with custom colors
  playerUnit = buildUnitModel(pd.playerClass, true, {
    shirt: pd.shirtColor, skin: pd.skinColor, hair: pd.hairColor
  });
  playerUnit.visible = false;
  playerUnit.position.set(-FIELD_W / 4, 0, 0);
  scene.add(playerUnit);
  deployedUnits.push(playerUnit);
  playerUnit.userData.isPlayer = true;
  playerUnit.userData.shootCooldown = 0;
  playerUnit.userData.hp = pStats.hp;
  playerUnit.userData.maxHp = pStats.hp;
  playerUnit.userData.damage = pStats.damage;
  playerUnit.userData.playerSpeed = pStats.speed;
  playerUnit.userData.playerStats = pStats;

  // Use level-specific army or default
  const armyComp = LEVEL_ARMIES[currentLevel] || ARMY_COMP;

  // Player replaces one unit of their class type (or pillow if class not in army)
  const replaceType = armyComp.find(e => e.type === pd.playerClass) ? pd.playerClass : 'pillow';
  let skipOne = true;

  for (const entry of armyComp) {
    for (let i = 0; i < entry.count; i++) {
      if (entry.type === replaceType && skipOne) {
        skipOne = false;
        // Still create the red counterpart
        const red = buildUnitModel(entry.type, false);
        red.position.set(2 + Math.random() * (FIELD_W / 2 - 3), 0, (Math.random() - 0.5) * (FIELD_D - 2));
        red.rotation.y = Math.PI / 2;
        scene.add(red); enemyUnits.push(red);
        continue;
      }

      // Blue AI unit
      const blue = buildUnitModel(entry.type, true);
      blue.position.set(-2 - Math.random() * (FIELD_W / 2 - 3), 0, (Math.random() - 0.5) * (FIELD_D - 2));
      blue.rotation.y = -Math.PI / 2;
      scene.add(blue); deployedUnits.push(blue);

      // Red unit (mirror)
      const red = buildUnitModel(entry.type, false);
      red.position.set(2 + Math.random() * (FIELD_W / 2 - 3), 0, (Math.random() - 0.5) * (FIELD_D - 2));
      red.rotation.y = Math.PI / 2;
      scene.add(red); enemyUnits.push(red);
    }
  }

  // Add party hats to enemies in level 2
  const lvl = LEVEL_DEFS.find(l => l.id === currentLevel);
  if (lvl && lvl.partyHats) {
    for (const e of enemyUnits) addPartyHat(e);
  }
}

// PROJECTILE SYSTEM
// =============================================
let projectiles = [];

function spawnDart(from, to, damage, team) {
  const geo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(from.position).add(new THREE.Vector3(0, 1, 0));
  const start = mesh.position.clone();
  const end = to.position.clone().add(new THREE.Vector3(0, 0.8, 0));
  mesh.lookAt(end);
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 15, damage, team, type: 'dart' });
  SFX.nerfShot();
}

function spawnBalloon(from, to, damage, team, splash) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0x4488ff, opacity: 0.8, transparent: true })
  );
  mesh.position.copy(from.position).add(new THREE.Vector3(0, 1, 0));
  const start = mesh.position.clone();
  const end = to.position.clone();
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 8, damage, team, type: 'balloon', splash });
}

function spawnWaterShot(from, dir, damage, team) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0x44aaff, opacity: 0.8, transparent: true })
  );
  mesh.position.copy(from).add(new THREE.Vector3(0, 1.2, 0));
  const start = mesh.position.clone();
  const end = start.clone().add(dir.clone().multiplyScalar(12));
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 18, damage, team, type: 'dart' });
  SFX.waterGun();
}

function spawnPoo(from, to, damage, team, splash) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0x6b4226 })
  );
  mesh.position.copy(from.position).add(new THREE.Vector3(0, 1.3, 0));
  const start = mesh.position.clone();
  const end = to.position.clone();
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 7, damage, team, type: 'poo', splash });
  SFX.pooLaunch();
}

function spawnPlayerPoo(fromPos, dir, damage, team, range, splash) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshStandardMaterial({ color: 0x6b4226 })
  );
  mesh.position.copy(fromPos).add(new THREE.Vector3(0, 1.2, 0));
  const start = mesh.position.clone();
  const end = start.clone().add(dir.clone().multiplyScalar(range || 10));
  end.y = 0;
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 7, damage, team, type: 'poo', splash: splash || 2.5, isPlayerShot: true });
  SFX.pooLaunch();
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    const totalDist = p.start.distanceTo(p.end);
    p.progress += (p.speed * dt) / totalDist;
    p.mesh.position.lerpVectors(p.start, p.end, Math.min(p.progress, 1));

    if (p.type === 'balloon' || p.type === 'poo') {
      p.mesh.position.y += Math.sin(p.progress * Math.PI) * totalDist * 0.3;
    }

    // Check for in-flight hits on darts (not just at end)
    let hit = false;
    if (p.type === 'dart' && !p.splash && p.progress < 1) {
      const allUnits = [...deployedUnits, ...enemyUnits];
      for (const u of allUnits) {
        if (!u.userData.alive) continue;
        if (u.userData.team === p.team) continue;
        if (u.userData.isPlayer) continue;
        // Use XZ distance only (darts fly at y=1.2 but units are at y=0)
        const ddx = u.position.x - p.mesh.position.x;
        const ddz = u.position.z - p.mesh.position.z;
        if (Math.sqrt(ddx * ddx + ddz * ddz) < 1.0) {
          const wasAlive = u.userData.alive;
          applyDamage(u, p.damage);
          if (p.isPlayerShot && wasAlive && !u.userData.alive) playerKillCount++;
          scene.remove(p.mesh);
          projectiles.splice(i, 1);
          hit = true;
          break;
        }
      }
    }
    if (hit) continue;

    if (p.progress >= 1) {
      scene.remove(p.mesh);
      const allUnits = [...deployedUnits, ...enemyUnits];
      if (p.splash) {
        for (const u of allUnits) {
          if (!u.userData.alive) continue;
          if (u.userData.team === p.team) continue;
          const dist = u.position.distanceTo(p.end);
          if (dist < p.splash) {
            const wasAlive = u.userData.alive;
            applyDamage(u, p.damage * (1 - dist / (p.splash + 1)));
            if (p.isPlayerShot && wasAlive && !u.userData.alive) playerKillCount++;
          }
        }
        if (p.type === 'poo') SFX.pooSplat(); else SFX.splash();
      } else {
        for (const u of allUnits) {
          if (!u.userData.alive) continue;
          if (u.userData.team === p.team) continue;
          if (u.position.distanceTo(p.mesh.position) < 2) {
            const wasAlive = u.userData.alive;
            applyDamage(u, p.damage);
            if (p.isPlayerShot && wasAlive && !u.userData.alive) playerKillCount++;
            break;
          }
        }
      }
      projectiles.splice(i, 1);
    }
  }
}

// =============================================
// CONFETTI SYSTEM
// =============================================
let confettiParticles = [];
const CONFETTI_COLORS = [0xff66aa, 0x44ddff, 0xffaa44, 0x44ff44, 0xff4444, 0xaa44ff, 0xffff44];

function spawnConfetti(pos) {
  const count = 15 + Math.floor(Math.random() * 15);
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.08, 0.08, 0.02);
    const mat = new THREE.MeshBasicMaterial({ color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)] });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(
      pos.x + (Math.random() - 0.5) * 0.5,
      pos.y + 0.5 + Math.random() * 0.5,
      pos.z + (Math.random() - 0.5) * 0.5
    );
    p.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    scene.add(p);
    confettiParticles.push({
      mesh: p,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 3,
      vz: (Math.random() - 0.5) * 4,
      spin: (Math.random() - 0.5) * 10,
      life: 2 + Math.random(),
      age: 0,
    });
  }
}

function updateConfetti(dt) {
  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const cp = confettiParticles[i];
    cp.age += dt;
    if (cp.age > cp.life) {
      scene.remove(cp.mesh);
      confettiParticles.splice(i, 1);
      continue;
    }
    cp.vy -= 6 * dt;
    cp.mesh.position.x += cp.vx * dt;
    cp.mesh.position.y += cp.vy * dt;
    cp.mesh.position.z += cp.vz * dt;
    cp.mesh.rotation.x += cp.spin * dt;
    cp.mesh.rotation.z += cp.spin * 0.7 * dt;
    cp.vx += (Math.random() - 0.5) * 2 * dt;
    cp.vz += (Math.random() - 0.5) * 2 * dt;
    if (cp.mesh.position.y < 0.02) {
      cp.mesh.position.y = 0.02;
      cp.vy = 0; cp.vx *= 0.5; cp.vz *= 0.5;
    }
    cp.mesh.material.opacity = Math.max(0, 1 - cp.age / cp.life);
    cp.mesh.material.transparent = true;
  }
}

function clearConfetti() {
  for (const cp of confettiParticles) scene.remove(cp.mesh);
  confettiParticles = [];
}

function explodePooMine(mine) {
  mine.exploded = true;
  // Hide the poo pile
  mine.group.visible = false;
  // Brown explosion particles
  const pos = new THREE.Vector3(mine.x, 0.2, mine.z);
  const brownColors = [0x6b4226, 0x8b5a2b, 0x5c3317, 0x4a2a0a, 0x3d1c02, 0x88aa44];
  for (let i = 0; i < 25; i++) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: brownColors[Math.floor(Math.random() * brownColors.length)], transparent: true });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(
      pos.x + (Math.random() - 0.5) * 0.3,
      pos.y + Math.random() * 0.3,
      pos.z + (Math.random() - 0.5) * 0.3
    );
    scene.add(p);
    confettiParticles.push({
      mesh: p, age: 0, life: 1.0 + Math.random() * 0.5,
      vx: (Math.random() - 0.5) * 6,
      vy: 3 + Math.random() * 4,
      vz: (Math.random() - 0.5) * 6,
      spin: (Math.random() - 0.5) * 10,
    });
  }
  SFX.pooSplat();
}

function checkPooMines() {
  for (const mine of pooMines) {
    if (mine.exploded) continue;
    // Check player
    if (playerUnit && playerUnit.userData.alive) {
      const dx = playerUnit.position.x - mine.x;
      const dz = playerUnit.position.z - mine.z;
      if (dx * dx + dz * dz < 0.8 * 0.8) {
        explodePooMine(mine);
        applyDamage(playerUnit, 99999);
        continue;
      }
    }
    // Check all units (allies + enemies)
    const allUnits = deployedUnits.concat(enemyUnits);
    for (const u of allUnits) {
      if (!u.userData.alive) continue;
      if (u.userData.isPlayer) continue; // player checked above
      const dx = u.position.x - mine.x;
      const dz = u.position.z - mine.z;
      if (dx * dx + dz * dz < 0.8 * 0.8) {
        explodePooMine(mine);
        applyDamage(u, 99999);
        break;
      }
    }
  }
}

// =============================================
// COMBAT CORE
// =============================================
let battleRunning = false;
let battleTime = 0;
let snackBoostActive = false;
let snackBoostTimer = 0;
let playerKillCount = 0;
let lastPlayerHp = 100;

function applyDamage(unit, amount) {
  unit.userData.hp -= amount;
  if (unit.userData.hp <= 0) {
    unit.userData.hp = 0;
    unit.userData.alive = false;
    unit.visible = false;
    spawnConfetti(unit.position);
  }
  updateHealthBar(unit);

  // Damage flash when player is hit
  if (unit.userData.isPlayer && unit.userData.hp > 0) {
    const flash = document.getElementById('damage-flash');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 150);
  }
}

function updateHealthBar(unit) {
  const pct = Math.max(0, unit.userData.hp / unit.userData.maxHp);
  unit.userData.hbFill.scale.x = pct;
  unit.userData.hbFill.position.x = -(1 - pct) * 0.3;
}

function findNearest(unit, enemies) {
  let best = null, bestDist = Infinity;
  for (const e of enemies) {
    if (!e.userData.alive) continue;
    const d = unit.position.distanceTo(e.position);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  return best;
}

function moveToward(unit, target, dt) {
  const dir = new THREE.Vector3().subVectors(target.position, unit.position);
  dir.y = 0;
  const dist = dir.length();
  if (dist < 0.1) return;
  dir.normalize();
  unit.position.add(dir.multiplyScalar(unit.userData.speed * dt));
  unit.position.y = 0;
  unit.rotation.y = Math.atan2(dir.x, dir.z);
}

function clampToField(unit) {
  unit.position.x = Math.max(-FIELD_W / 2 + 0.5, Math.min(FIELD_W / 2 - 0.5, unit.position.x));
  unit.position.z = Math.max(-FIELD_D / 2 + 0.5, Math.min(FIELD_D / 2 - 0.5, unit.position.z));
}

function getAttackDamage(attacker, defender) {
  let dmg = attacker.userData.damage;
  const aType = attacker.userData.type;
  const dType = defender.userData.type;

  if (aType === 'blanket' && dType === 'scooter') dmg *= 2;
  if (aType === 'scooter' && attacker.userData.charged) {
    dmg *= 2;
    attacker.userData.charged = false;
  }
  if (aType === 'nerf' && attacker.position.distanceTo(defender.position) < 2) {
    dmg = UNIT_DEFS.nerf.meleeDamage;
  }
  if (snackBoostActive && attacker.userData.team === 'blue') dmg *= 1.1;

  return dmg;
}

function updateCombatAI(dt) {
  const allBlue = deployedUnits.filter(u => u.userData.alive);
  const allRed = enemyUnits.filter(u => u.userData.alive);

  function processUnit(unit, enemies) {
    if (!unit.userData.alive) return;
    if (unit.userData.isPlayer) return; // Player is controlled by FPS input
    unit.userData.attackCooldown -= dt;

    const target = findNearest(unit, enemies);
    if (!target) return;

    const dist = unit.position.distanceTo(target.position);
    const range = unit.userData.range;
    const type = unit.userData.type;

    if (type === 'nerf') {
      if (dist < 3) {
        const away = new THREE.Vector3().subVectors(unit.position, target.position).normalize();
        unit.position.add(away.multiplyScalar(unit.userData.speed * dt));
        clampToField(unit);
      } else if (dist <= range && unit.userData.attackCooldown <= 0) {
        spawnDart(unit, target, getAttackDamage(unit, target), unit.userData.team);
        unit.userData.attackCooldown = 1.0;
      } else if (dist > range) {
        moveToward(unit, target, dt);
      }
    } else if (type === 'balloon') {
      if (dist <= range && unit.userData.attackCooldown <= 0) {
        spawnBalloon(unit, target, getAttackDamage(unit, target), unit.userData.team, UNIT_DEFS.balloon.splash);
        unit.userData.attackCooldown = 3.0;
      } else if (dist > range) {
        moveToward(unit, target, dt * 0.3);
      }
    } else if (type === 'pooSling') {
      if (dist <= range && unit.userData.attackCooldown <= 0) {
        spawnPoo(unit, target, getAttackDamage(unit, target), unit.userData.team, UNIT_DEFS.pooSling.splash);
        unit.userData.attackCooldown = 2.5;
      } else if (dist > range) {
        moveToward(unit, target, dt * 0.4);
      }
    } else {
      if (dist <= range) {
        if (unit.userData.attackCooldown <= 0) {
          applyDamage(target, getAttackDamage(unit, target));
          unit.userData.attackCooldown = 0.8;
          if (type === 'pillow') SFX.pillowHit();
          else if (type === 'scooter') SFX.scooterZoom();
        }
        const dir = new THREE.Vector3().subVectors(target.position, unit.position);
        unit.rotation.y = Math.atan2(dir.x, dir.z);
      } else {
        moveToward(unit, target, dt);
      }
    }
    clampToField(unit);
  }

  for (const u of deployedUnits) processUnit(u, allRed);
  for (const u of enemyUnits) processUnit(u, allBlue);
}

function billboardHealthBars() {
  const all = [...deployedUnits, ...enemyUnits];
  for (const u of all) {
    if (!u.userData.alive) continue;
    if (u.userData.isPlayer) continue; // Player HB is on HUD
    // Face camera on Y axis only (ignore pitch so bars stay upright)
    const hb = u.userData.hbGroup;
    const dx = camera.position.x - u.position.x;
    const dz = camera.position.z - u.position.z;
    hb.rotation.set(0, Math.atan2(dx, dz), 0);
  }
}

// =============================================
// FPS PLAYER SYSTEM
// =============================================
let playerYaw = 0;
let playerPitch = 0;
const moveKeys = { w: false, a: false, s: false, d: false };
let weaponGroup = null;
let swingTime = 0;
let isSwinging = false;

function setupWeapon() {

    );

    weaponGroup.add(hand);

    const fork1 = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2), stickMat);
    fork1.position.set(0.26, -0.1, -0.5); fork1.rotation.z = 0.4;
    weaponGroup.add(fork1);
    const fork2 = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.2), stickMat);
    fork2.position.set(0.34, -0.1, -0.5); fork2.rotation.z = -0.4;
    weaponGroup.add(fork2);

    band.position.set(0.3, -0.02, -0.5);
    weaponGroup.add(band);
    // Poo ammo
    const poo = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x6b4226 }));
    poo.position.set(0.3, -0.04, -0.5);
    weaponGroup.add(poo);
    // Hand
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.08),
      new THREE.MeshStandardMaterial({ color: skinColor }));
    hand.position.set(0.3, -0.42, -0.48);

    );

    pillow.rotation.z = -0.15;
    weaponGroup.add(pillow);
    const stripe = new THREE.Mesh(
      new THREE.BoxGeometry(0.43, 0.06, 0.13),
      new THREE.MeshStandardMaterial({ color: 0xddddff })
    );

    stripe.rotation.z = -0.15;

    const hand = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.12, 0.08),
      new THREE.MeshStandardMaterial({ color: skinColor })
    );

    weaponGroup.add(hand);
  }

  camera.add(weaponGroup);
}

function updatePlayerMovement(dt) {
  if (!playerUnit || !playerUnit.userData.alive) return;

  const speed = playerUnit.userData.playerSpeed || 3.5;
  const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);

  const move = new THREE.Vector3();
  if (moveKeys.w) move.add(forward);
  if (moveKeys.s) move.sub(forward);
  if (moveKeys.a) move.sub(right);
  if (moveKeys.d) move.add(right);

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(speed * dt);
    playerUnit.position.add(move);
    clampToField(playerUnit);
  }
}

function updatePlayerCamera() {
  if (!playerUnit) return;
  camera.position.set(playerUnit.position.x, 1.4, playerUnit.position.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = playerYaw;
  camera.rotation.x = playerPitch;
}

function updatePlayerCooldowns(dt) {
  if (!playerUnit || !playerUnit.userData.alive) return;
  if (playerUnit.userData.attackCooldown > 0) playerUnit.userData.attackCooldown -= dt;
  if (playerUnit.userData.shootCooldown > 0) playerUnit.userData.shootCooldown -= dt;
}

function playerAttack() {
  if (!playerUnit || !playerUnit.userData.alive) return;
  if (playerUnit.userData.attackCooldown > 0) return;

  const pStats = playerUnit.userData.playerStats;
  playerUnit.userData.attackCooldown = pStats.cooldown;
  isSwinging = true;
  swingTime = 0;

  if (pStats.attackType === 'ranged') {
    // Nerf: shoot a dart forward
    const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
    let dmg = pStats.damage;
    if (snackBoostActive) dmg *= 1.1;
    spawnPlayerDart(playerUnit.position, forward, dmg, 'blue', pStats.range);
    SFX.nerfShot();
  } else if (pStats.attackType === 'mortar') {
    // Poo Slingshot: lob a poo bomb forward
    const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
    let dmg = pStats.damage;
    if (snackBoostActive) dmg *= 1.1;
    spawnPlayerPoo(playerUnit.position, forward, dmg, 'blue', pStats.range, 2.5 * (pStats.splashMult || 1));
  } else {
    // Pillow: melee swing
    SFX.pillowHit();
    const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));

    for (const enemy of enemyUnits) {
      if (!enemy.userData.alive) continue;
      const toEnemy = new THREE.Vector3().subVectors(enemy.position, playerUnit.position);
      toEnemy.y = 0;
      const dist = toEnemy.length();
      if (dist > pStats.range) continue;

      toEnemy.normalize();
      if (forward.dot(toEnemy) > 0.3) {
        let dmg = pStats.damage;
        if (snackBoostActive) dmg *= 1.1;
        const wasAlive = enemy.userData.alive;
        applyDamage(enemy, dmg);
        if (wasAlive && !enemy.userData.alive) playerKillCount++;
        break;
      }
    }
  }
}

function spawnPlayerDart(fromPos, dir, damage, team, range) {
  const geo = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(fromPos).add(new THREE.Vector3(0, 1.2, 0));
  const start = mesh.position.clone();
  const end = start.clone().add(dir.clone().multiplyScalar(range || 12));
  mesh.lookAt(end);
  scene.add(mesh);
  projectiles.push({ mesh, start, end, progress: 0, speed: 15, damage, team, type: 'dart', isPlayerShot: true });
}

function playerShoot() {
  if (!playerUnit || !playerUnit.userData.alive) return;
  if (!hasPurchase('sb_super_soaker')) return;
  if (playerUnit.userData.shootCooldown > 0) return;

  playerUnit.userData.shootCooldown = 1.5;
  const forward = new THREE.Vector3(-Math.sin(playerYaw), 0, -Math.cos(playerYaw));
  spawnWaterShot(playerUnit.position, forward, 20, 'blue');
}

function updateWeaponSwing(dt) {
  if (!weaponGroup) return;
  if (isSwinging) {
    swingTime += dt * 10;
    if (swingTime > Math.PI) {
      isSwinging = false;
      swingTime = 0;
      weaponGroup.rotation.set(0, 0, 0);
    } else {
      weaponGroup.rotation.z = -Math.sin(swingTime) * 0.8;
      weaponGroup.rotation.x = -Math.sin(swingTime) * 0.3;
    }
  }
}

// =============================================
// BATTLE MUSIC (same march as intro, looped)
// =============================================
let battleAudioCtx = null;
let battleMusicLoop = null;

function playMarch(volume) {
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)();
    const master = c.createGain();
    master.gain.value = volume || 0.08;
    master.connect(c.destination);

    function snare(time) {
      const n = c.createBufferSource();
      const buf = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
      n.buffer = buf;
      const hp = c.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 2000;
      const g = c.createGain();
      g.gain.setValueAtTime(0.8, time);
      g.gain.exponentialRampToValueAtTime(0.01, time + 0.08);
      n.connect(hp); hp.connect(g); g.connect(master);
      n.start(time);
    }

    function kick(time) {
      const o = c.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(150, time);
      o.frequency.exponentialRampToValueAtTime(40, time + 0.15);
      const g = c.createGain();
      g.gain.setValueAtTime(1, time);
      g.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
      o.connect(g); g.connect(master);
      o.start(time); o.stop(time + 0.2);
    }

    function brass(time, freq, dur) {
      const o = c.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = freq;
      const f = c.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 800;
      const g = c.createGain();
      g.gain.setValueAtTime(0, time);
      g.gain.linearRampToValueAtTime(0.35, time + 0.3);
      g.gain.setValueAtTime(0.35, time + dur - 0.5);
      g.gain.linearRampToValueAtTime(0, time + dur);
      o.connect(f); f.connect(g); g.connect(master);
      o.start(time); o.stop(time + dur);
    }

    function timpani(time, freq) {
      const o = c.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, time);
      o.frequency.exponentialRampToValueAtTime(freq * 0.7, time + 0.4);
      const g = c.createGain();
      g.gain.setValueAtTime(0.6, time);
      g.gain.exponentialRampToValueAtTime(0.01, time + 0.5);
      o.connect(g); g.connect(master);
      o.start(time); o.stop(time + 0.5);
    }

    const now = c.currentTime + 0.1;
    const bpm = 80;
    const beat = 60 / bpm;

    for (let i = 0; i < 32; i++) {
      const t = now + i * beat;
      if (i % 4 === 0 || i % 4 === 2) kick(t);
      if (i % 4 === 1 || i % 4 === 3) snare(t);
      if (i % 16 === 15) { snare(t + beat * 0.25); snare(t + beat * 0.5); snare(t + beat * 0.75); }
    }

    brass(now, 65, beat * 8);
    brass(now + beat * 8, 58, beat * 8);
    brass(now + beat * 16, 55, beat * 8);
    brass(now + beat * 24, 73, beat * 8);

    brass(now + beat * 2, 98, beat * 6);
    brass(now + beat * 10, 87, beat * 6);
    brass(now + beat * 18, 82, beat * 6);
    brass(now + beat * 26, 110, beat * 6);

    timpani(now, 65);
    timpani(now + beat * 4, 55);
    timpani(now + beat * 8, 58);
    timpani(now + beat * 12, 49);
    timpani(now + beat * 16, 55);
    timpani(now + beat * 20, 65);
    timpani(now + beat * 24, 73);
    timpani(now + beat * 28, 82);

    timpani(now + beat * 31, 65);
    kick(now + beat * 31);
    kick(now + beat * 31.5);

    return c;
  } catch (e) { return null; }
}

function startBattleMusic() {
  stopBattleMusic();
  battleAudioCtx = playMarch(0.08);
  // Loop every ~24 seconds (32 beats at 80 BPM)
  battleMusicLoop = setInterval(() => {
    if (battleAudioCtx) try { battleAudioCtx.close(); } catch (e) {}
    battleAudioCtx = playMarch(0.08);
  }, 24000);
}

function stopBattleMusic() {
  if (battleMusicLoop) { clearInterval(battleMusicLoop); battleMusicLoop = null; }
  if (battleAudioCtx) { try { battleAudioCtx.close(); } catch (e) {} battleAudioCtx = null; }
}

// =============================================
// LOADOUT SCREEN
// =============================================
function showLoadout() {
  hideAllScreens();
  document.getElementById('loadout-screen').classList.remove('hidden');
  renderLoadout();
}

function renderLoadout() {
  const pd = loadPlayerData();

  document.getElementById('loadout-candy').textContent = 'Candy: ' + pd.candy;

  // Class picker
  const picker = document.getElementById('class-picker');
  picker.innerHTML = '';
  for (const [id, cls] of Object.entries(CLASSES)) {
    const div = document.createElement('div');
    div.className = 'class-option' + (pd.playerClass === id ? ' selected' : '');
    div.innerHTML = '<div class="class-icon">' + cls.icon + '</div><div class="class-info"><div class="class-name">' + cls.name + '</div><div class="class-desc">' + cls.desc + '</div></div>';
    div.onclick = () => { pd.playerClass = id; savePlayerData(pd); renderLoadout(); };
    picker.appendChild(div);
  }

  // Colors
  document.getElementById('color-hair').value = pd.hairColor;
  document.getElementById('color-shirt').value = pd.shirtColor;
  document.getElementById('color-skin').value = pd.skinColor;

  // Color change handlers
  document.getElementById('color-hair').onchange = (e) => { pd.hairColor = e.target.value; savePlayerData(pd); };
  document.getElementById('color-shirt').onchange = (e) => { pd.shirtColor = e.target.value; savePlayerData(pd); };
  document.getElementById('color-skin').onchange = (e) => { pd.skinColor = e.target.value; savePlayerData(pd); };

  // Upgrades
  const list = document.getElementById('upgrade-list');
  list.innerHTML = '';
  for (const up of UPGRADES) {
    const lvl = pd.upgrades[up.id] || 0;
    const canBuy = lvl < up.maxLevel && pd.candy >= up.cost;
    const maxed = lvl >= up.maxLevel;
    const div = document.createElement('div');
    div.className = 'upgrade-row';
    div.innerHTML =
      '<div class="upgrade-name">' + up.name + '<br><span style="font-size:10px;color:#888">' + up.desc + '</span></div>' +
      '<div class="upgrade-level">Lv ' + lvl + '/' + up.maxLevel + '</div>' +
      '<button class="upgrade-btn" ' + (canBuy ? '' : 'disabled') + '>' + (maxed ? 'MAX' : up.cost + ' candy') + '</button>';
    if (canBuy) {
      div.querySelector('button').onclick = () => {
        pd.candy -= up.cost;
        pd.upgrades[up.id] = lvl + 1;
        savePlayerData(pd);
        renderLoadout();
      };
    }
    list.appendChild(div);
  }
}

function confirmLoadout() {
  startBattle();
}

// =============================================
// BATTLE PHASE (First Person)
// =============================================
function startBattle() {
  hideAllScreens();
  document.getElementById('battle-screen').classList.remove('hidden');

  const container = document.getElementById('battle-canvas');
  container.innerHTML = '';
  initThree(container);
  buildBattlefield();

  // Add level-specific decorations
  const lvl = LEVEL_DEFS.find(l => l.id === currentLevel);
  if (lvl && lvl.partyHats) addPartyDecorations();
  if (lvl && lvl.poopWar) {
    // Outdoor backyard setting
    scene.background = new THREE.Color(0x88ccff);
    scene.fog = new THREE.Fog(0x88ccff, 25, 50);
    addPoopWarDecorations();
  }

  generateArmies();
  setupWeapon();

  // Reset state
  projectiles = [];
  clearConfetti();
  battleRunning = true;
  battleTime = 0;
  playerKillCount = 0;
  lastPlayerHp = playerUnit.userData.maxHp;
  playerYaw = -Math.PI / 2; // Face right toward enemies
  playerPitch = 0;
  isSwinging = false;
  swingTime = 0;
  boatPhase = false;
  Object.keys(moveKeys).forEach(k => moveKeys[k] = false);

  snackBoostActive = hasPurchase('sb_snack_boost');
  snackBoostTimer = snackBoostActive ? 10 : 0;

  // Level 2: landing cutscene with fleet of boats
  if (lvl && lvl.boatPhase) {
    // Hide ally units initially (they ride in on boats)
    for (const u of deployedUnits) {
      if (!u.userData.isPlayer) u.visible = false;
    }
    renderer.render(scene, camera);
    startLandingCutscene();
    return;
  }

  // Start idle render loop so scene doesn't appear frozen
  preBattleIdle = true;
  preBattleIdleLoop();

  // Show "click to start"
  const pd = loadPlayerData();
  const attackHint = pd.playerClass === 'nerf' ? 'Left click to shoot' : pd.playerClass === 'pooSling' ? 'Left click to launch' : 'Left click to swing';
  document.getElementById('click-start').classList.remove('hidden');
  document.querySelector('#click-start .start-hint').textContent = 'WASD to move | Mouse to look | ' + attackHint;
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('player-hud').style.display = 'none';
  document.getElementById('kill-counter').style.display = 'none';

  const startOverlay = document.getElementById('click-start');
  startOverlay.addEventListener('click', function startClick() {
    startOverlay.removeEventListener('click', startClick);
    preBattleIdle = false;
    renderer.domElement.requestPointerLock();
    startOverlay.classList.add('hidden');
    document.getElementById('crosshair').style.display = '';
    document.getElementById('player-hud').style.display = '';
    document.getElementById('kill-counter').style.display = '';

    startBattleMusic();
    clock.getDelta(); // Reset delta
    battleLoop();
  });
}

function battleLoop() {
  if (!battleRunning) return;
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05);

  battleTime += dt;

  // Snack boost
  if (snackBoostActive) {
    snackBoostTimer -= dt;
    if (snackBoostTimer <= 0) snackBoostActive = false;
  }

  // Player
  updatePlayerMovement(dt);
  updatePlayerCooldowns(dt);
  updateWeaponSwing(dt);

  // AI + projectiles + confetti + mines
  updateCombatAI(dt);
  updateProjectiles(dt);
  updateConfetti(dt);
  checkPooMines();

  // Camera + render
  updatePlayerCamera();
  billboardHealthBars();
  renderer.render(scene, camera);

  // HUD updates
  const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
  const redAlive = enemyUnits.filter(u => u.userData.alive).length;
  document.getElementById('hud-blue').textContent = 'Allies: ' + (blueAlive - (playerUnit.userData.alive ? 1 : 0));
  document.getElementById('hud-red').textContent = 'Enemy: ' + redAlive;
  const m = Math.floor(battleTime / 60), s = Math.floor(battleTime % 60);
  document.getElementById('hud-time').textContent = m + ':' + (s < 10 ? '0' : '') + s;

  // Player health HUD
  const hpPct = Math.max(0, playerUnit.userData.hp / playerUnit.userData.maxHp);
  document.getElementById('health-fill').style.width = (hpPct * 100) + '%';
  if (hpPct < 0.3) document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #ff4444, #ff6644)';
  else if (hpPct < 0.6) document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #ffaa44, #ffcc44)';
  else document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #44ff44, #88ff88)';
  document.getElementById('health-text').textContent = Math.ceil(playerUnit.userData.hp) + ' / ' + playerUnit.userData.maxHp + ' HP';

  document.getElementById('kill-counter').textContent = 'Kills: ' + playerKillCount;

  // Win/loss check
  if (!playerUnit.userData.alive) {
    document.exitPointerLock();
    endBattle(false);
    return;
  }
  if (redAlive === 0) {
    document.exitPointerLock();
    endBattle(true);
    return;
  }

  requestAnimationFrame(battleLoop);
}

// =============================================
// END BATTLE
// =============================================
function endBattle(victory) {
  battleRunning = false;
  stopBattleMusic();
  document.exitPointerLock();

  // Clean up boats if still present
  if (boatGroup) { scene.remove(boatGroup); boatGroup = null; }
  for (const ab of allyBoats) { if (ab.mesh.parent) scene.remove(ab.mesh); }
  allyBoats = [];
  boatPhase = false;
  landingCutscene = false;

  // Stats
  const stats = loadStats();
  stats.battles++;
  if (victory) stats.wins++;
  saveStats(stats);

  // Level progression
  if (victory) {
    const pd = loadPlayerData();
    pd.clearedLevels[currentLevel] = true;
    if (currentLevel < LEVEL_DEFS.length && currentLevel + 1 > pd.unlockedLevel) {
      pd.unlockedLevel = currentLevel + 1;
    }
    savePlayerData(pd);
  }

  // Achievements
  ggTry('sb_first_fight');
  if (victory) {
    ggTry('sb_winner');

    if (playerUnit.userData.hp === playerUnit.userData.maxHp) ggTry('sb_flawless');
    if (playerKillCount >= 5) ggTry('sb_pillow_army');
    if (playerKillCount >= 10) ggTry('sb_nerf_squad');

    const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
    if (playerUnit.userData.hp >= playerUnit.userData.maxHp * 0.5) ggTry('sb_balanced');
    if (blueAlive <= 3) ggTry('sb_underdog');
    if (battleTime < 30) ggTry('sb_speed_win');
    if (stats.wins >= 5) ggTry('sb_commander');
    if (stats.wins >= 10) ggTry('sb_warlord');
  }

  // Candy rewards
  const pd = loadPlayerData();
  const killCandy = playerKillCount * 5;
  const victoryBonus = victory ? 50 : 0;
  const candyEarned = killCandy + victoryBonus;
  pd.candy += candyEarned;
  savePlayerData(pd);

  // Sound
  if (victory) SFX.victory(); else SFX.defeat();

  // Show end screen
  hideAllScreens();
  document.getElementById('end-screen').classList.remove('hidden');

  document.getElementById('end-title').textContent = victory ? 'MOM! THEY STARTED IT!' : 'You got TATTLED on!';
  document.getElementById('end-title').style.color = victory ? '#44ddff' : '#ff4444';
  document.getElementById('end-subtitle').textContent = victory ? 'The younger sibling empire has been defeated!' : 'The younger siblings win this round...';

  const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
  const redKilled = enemyUnits.filter(u => !u.userData.alive).length;
  const damageTaken = playerUnit.userData.maxHp - Math.max(0, playerUnit.userData.hp);
  const mEnd = Math.floor(battleTime / 60), sEnd = Math.floor(battleTime % 60);
  document.getElementById('end-stats').innerHTML =
    'Your kills: <span>' + playerKillCount + '</span><br>' +
    'Damage taken: <span>' + Math.round(damageTaken) + '</span><br>' +
    'Allies surviving: <span>' + (blueAlive - (playerUnit.userData.alive ? 1 : 0)) + ' / ' + (deployedUnits.length - 1) + '</span><br>' +
    'Enemies defeated: <span>' + redKilled + ' / ' + enemyUnits.length + '</span><br>' +
    'Battle time: <span>' + mEnd + ':' + (sEnd < 10 ? '0' : '') + sEnd + '</span><br>' +
    'Candy earned: <span>+' + candyEarned + '</span>' + (victory ? ' (+50 victory bonus!)' : '') + '<br>' +
    'Total candy: <span>' + pd.candy + '</span><br>' +
    'Total wins: <span>' + stats.wins + '</span>';
}

// =============================================
// INTRO CINEMATIC
