function showLoadout() {
  hideAllScreens();
  document.getElementById('loadout-screen').classList.remove('hidden');
  renderLoadout();
}

function renderLoadout() {
  const pd = loadPlayerData();

  document.getElementById('loadout-candy').textContent = 'Candy: ' + pd.candy;

  // Class picker
  const picker = document.getElementById('class-picker');
  picker.innerHTML = '';
  for (const [id, cls] of Object.entries(CLASSES)) {
    // Skip shop-locked classes if not purchased
    if (cls.shopRequired && !hasPurchase(cls.shopRequired)) continue;
    const div = document.createElement('div');
    div.className = 'class-option' + (pd.playerClass === id ? ' selected' : '');
    div.innerHTML = '<div class="class-icon">' + cls.icon + '</div><div class="class-info"><div class="class-name">' + cls.name + '</div><div class="class-desc">' + cls.desc + '</div></div>';
    div.onclick = () => { pd.playerClass = id; savePlayerData(pd); renderLoadout(); };
    picker.appendChild(div);
  }

  // Colors with reset buttons
  const colorDefaults = { hair: '#8B4513', shirt: '#4488ff', skin: '#ffcc99' };
  const colorKeys = { hair: 'hairColor', shirt: 'shirtColor', skin: 'skinColor' };
  for (const [key, defaultVal] of Object.entries(colorDefaults)) {
    const input = document.getElementById('color-' + key);
    input.value = pd[colorKeys[key]];
    input.onchange = (e) => { pd[colorKeys[key]] = e.target.value; savePlayerData(pd); updateMirror(); };
    // Add reset button if not already present
    const row = input.parentElement;
    let resetBtn = row.querySelector('.color-reset');
    if (!resetBtn) {
      resetBtn = document.createElement('button');
      resetBtn.className = 'color-reset';
      resetBtn.textContent = '↺';
      resetBtn.title = 'Reset to default';
      row.appendChild(resetBtn);
    }
    resetBtn.onclick = () => { pd[colorKeys[key]] = defaultVal; savePlayerData(pd); renderLoadout(); };
  }

  // Hair style toggle
  const hairToggle = document.getElementById('hair-toggle');
  hairToggle.innerHTML = '';
  for (const style of ['short', 'long']) {
    const btn = document.createElement('button');
    btn.className = 'hair-btn' + (pd.hairStyle === style ? ' selected' : '');
    btn.textContent = style.charAt(0).toUpperCase() + style.slice(1) + ' Hair';
    btn.onclick = () => { pd.hairStyle = style; savePlayerData(pd); renderLoadout(); };
    hairToggle.appendChild(btn);
  }

  // Outfit picker
  const outfitPicker = document.getElementById('outfit-picker');
  outfitPicker.innerHTML = '';
  for (const outfit of OUTFITS) {
    const unlocked = isOutfitUnlocked(outfit.id, pd);
    const div = document.createElement('div');
    div.className = 'outfit-option' + (pd.outfit === outfit.id ? ' selected' : '') + (unlocked ? '' : ' locked');
    let inner = '<div><div class="outfit-name">' + outfit.name + '</div><div class="outfit-desc">' + outfit.desc + '</div></div>';
    if (!unlocked) {
      const lvl = OUTFITS.find(o => o.id === outfit.id).unlockLevel;
      inner += '<div class="outfit-lock">Beat Lv ' + lvl + '</div>';
    }
    div.innerHTML = inner;
    if (unlocked) {
      div.onclick = () => { pd.outfit = outfit.id; savePlayerData(pd); renderLoadout(); };
    }
    outfitPicker.appendChild(div);
  }

  // Hat toggle (only shown when wearing an outfit)
  let hatToggle = document.getElementById('hat-toggle');
  if (!hatToggle) {
    hatToggle = document.createElement('div');
    hatToggle.id = 'hat-toggle';
    hatToggle.className = 'hair-toggle';
    outfitPicker.parentNode.insertBefore(hatToggle, outfitPicker.nextSibling);
  }
  hatToggle.innerHTML = '';
  if (pd.outfit !== 'none') {
    for (const opt of [{ val: true, label: 'Show Hat' }, { val: false, label: 'Show Hair' }]) {
      const btn = document.createElement('button');
      btn.className = 'hair-btn' + (pd.showHat === opt.val ? ' selected' : '');
      btn.textContent = opt.label;
      btn.onclick = () => { pd.showHat = opt.val; savePlayerData(pd); renderLoadout(); };
      hatToggle.appendChild(btn);
    }
  }

  // Mirror preview
  updateMirror();

  // Upgrades
  const list = document.getElementById('upgrade-list');
  list.innerHTML = '';
  for (const up of UPGRADES) {
    const lvl = pd.upgrades[up.id] || 0;
    const canBuy = lvl < up.maxLevel && pd.candy >= up.cost;
    const maxed = lvl >= up.maxLevel;
    const div = document.createElement('div');
    div.className = 'upgrade-row';
    div.innerHTML =
      '<div class="upgrade-name">' + up.name + '<br><span style="font-size:10px;color:#888">' + up.desc + '</span></div>' +
      '<div class="upgrade-level">Lv ' + lvl + '/' + up.maxLevel + '</div>' +
      '<button class="upgrade-btn" ' + (canBuy ? '' : 'disabled') + '>' + (maxed ? 'MAX' : up.cost + ' candy') + '</button>';
    if (canBuy) {
      div.querySelector('button').onclick = () => {
        pd.candy -= up.cost;
        pd.upgrades[up.id] = lvl + 1;
        savePlayerData(pd);
        renderLoadout();
      };
    }
    list.appendChild(div);
  }
}

let mirrorRenderer = null, mirrorScene = null, mirrorCamera = null, mirrorModel = null, mirrorAnimFrame = null;

function updateMirror() {
  const canvas = document.getElementById('mirror-canvas');
  if (!canvas) return;
  const pd = loadPlayerData();

  // Init renderer on first call
  if (!mirrorRenderer) {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
    mirrorRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    mirrorRenderer.setSize(canvas.clientWidth, canvas.clientHeight);
    mirrorScene = new THREE.Scene();
    mirrorScene.background = new THREE.Color(0x0a0a1a);
    mirrorCamera = new THREE.PerspectiveCamera(40, canvas.clientWidth / canvas.clientHeight, 0.1, 10);
    mirrorCamera.position.set(0, 1.1, 2.5);
    mirrorCamera.lookAt(0, 0.9, 0);
    // Lights
    mirrorScene.add(new THREE.AmbientLight(0x666666));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(2, 3, 2);
    mirrorScene.add(dirLight);
    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(3, 3),
      new THREE.MeshStandardMaterial({ color: 0x222233 }));
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    mirrorScene.add(floor);
  }

  // Remove old model
  if (mirrorModel) mirrorScene.remove(mirrorModel);

  // Build new model
  mirrorModel = buildUnitModel(pd.playerClass, true, {
    shirt: pd.shirtColor, skin: pd.skinColor, hair: pd.hairColor, hairStyle: pd.hairStyle,
    outfit: pd.outfit, showHat: pd.showHat
  });
  // Apply outfit
  if (pd.outfit === 'roman') addRomanOutfit(mirrorModel, pd.showHat);
  else if (pd.outfit === 'carthaginian') addCarthaginianOutfit(mirrorModel, pd.showHat);
  else if (pd.outfit === 'union') addUnionOutfit(mirrorModel, pd.showHat);
  else if (pd.outfit === 'confederate') addConfederateOutfit(mirrorModel, pd.showHat);
  // Hide health bar in mirror
  if (mirrorModel.userData.hbGroup) mirrorModel.userData.hbGroup.visible = false;
  mirrorScene.add(mirrorModel);

  // Start spin animation if not already running
  if (!mirrorAnimFrame) spinMirror();
}

function spinMirror() {
  if (!mirrorRenderer || !mirrorScene || !mirrorCamera) { mirrorAnimFrame = null; return; }
  // Check if loadout screen is still visible
  const loadoutEl = document.getElementById('loadout-screen');
  if (!loadoutEl || loadoutEl.classList.contains('hidden')) {
    mirrorAnimFrame = null;
    return;
  }
  if (mirrorModel) mirrorModel.rotation.y += 0.01;
  mirrorRenderer.render(mirrorScene, mirrorCamera);
  mirrorAnimFrame = requestAnimationFrame(spinMirror);
}

function cleanupMirror() {
  if (mirrorAnimFrame) { cancelAnimationFrame(mirrorAnimFrame); mirrorAnimFrame = null; }
  if (mirrorRenderer) { mirrorRenderer.dispose(); mirrorRenderer = null; }
  mirrorScene = null; mirrorCamera = null; mirrorModel = null;
}

function confirmLoadout() {
  cleanupMirror();
  startBattle();
}

// =============================================
// BATTLE PHASE (First Person)
// =============================================
function startBattle() {
  hideAllScreens();
  document.getElementById('battle-screen').classList.remove('hidden');

  const container = document.getElementById('battle-canvas');
  container.innerHTML = '';
  initThree(container);
  buildBattlefield();

  // Add level-specific decorations
  const lvl = LEVEL_DEFS.find(l => l.id === currentLevel);
  if (lvl && lvl.partyHats) addPartyDecorations();
  if (lvl && lvl.poopWar) {
    // Outdoor backyard setting
    scene.background = new THREE.Color(0x88ccff);
    scene.fog = new THREE.Fog(0x88ccff, 25, 50);
    addPoopWarDecorations();
  }
  if (lvl && lvl.cricketCharge) {
    // Open field — hazy afternoon
    scene.background = new THREE.Color(0x99bbdd);
    scene.fog = new THREE.Fog(0x99bbdd, 20, 45);
    addCricketChargeDecorations();
  }
  if (lvl && lvl.flatTop) {
    // Overcast mountain sky
    scene.background = new THREE.Color(0x8899aa);
    scene.fog = new THREE.Fog(0x8899aa, 25, 55);
    addFlatTopDecorations();
  }
  if (lvl && lvl.siegeOfToys) {
    // Bright cheerful sky for toy battle
    scene.background = new THREE.Color(0x88ddff);
    scene.fog = new THREE.Fog(0x88ddff, 25, 55);
    addSiegeOfToysDecorations();
  }

  generateArmies();
  setupWeapon();

  // Reset state
  projectiles = [];
  if (!lvl || !lvl.siegeOfToys) toyWalls = [];
  clearConfetti();
  battleRunning = true;
  battleTime = 0;
  playerKillCount = 0;
  lastPlayerHp = playerUnit.userData.maxHp;
  playerYaw = -Math.PI / 2; // Face right toward enemies
  playerPitch = 0;
  isSwinging = false;
  swingTime = 0;
  boatPhase = false;
  playerVelY = 0;
  playerIsOnFlatTop = !!(lvl && lvl.flatTop);
  Object.keys(moveKeys).forEach(k => moveKeys[k] = false);

  snackBoostActive = hasPurchase('sb_snack_boost');
  snackBoostTimer = snackBoostActive ? 10 : 0;

  // Level 2: landing cutscene with fleet of boats
  if (lvl && lvl.boatPhase) {
    // Hide ally units initially (they ride in on boats)
    for (const u of deployedUnits) {
      if (!u.userData.isPlayer) u.visible = false;
    }
    renderer.render(scene, camera);
    startLandingCutscene();
    return;
  }

  // Start idle render loop so scene doesn't appear frozen
  preBattleIdle = true;
  preBattleIdleLoop();

  // Show "click to start"
  const pd = loadPlayerData();
  const attackHint = pd.playerClass === 'nerf' || pd.playerClass === 'soaker' ? 'Left click to shoot' : pd.playerClass === 'pooSling' ? 'Left click to launch' : pd.playerClass === 'cricket' ? 'Left click to launch' : 'Left click to swing';
  document.getElementById('click-start').classList.remove('hidden');
  document.querySelector('#click-start .start-hint').textContent = 'WASD to move | Space to jump | Mouse to look | ' + attackHint;
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('player-hud').style.display = 'none';
  document.getElementById('kill-counter').style.display = 'none';

  const startOverlay = document.getElementById('click-start');
  startOverlay.addEventListener('click', function startClick() {
    startOverlay.removeEventListener('click', startClick);
    preBattleIdle = false;
    renderer.domElement.requestPointerLock();
    startOverlay.classList.add('hidden');
    document.getElementById('crosshair').style.display = '';
    document.getElementById('player-hud').style.display = '';
    document.getElementById('kill-counter').style.display = '';

    startBattleMusic();
    clock.getDelta(); // Reset delta
    battleLoop();
  });
}

function battleLoop() {
  if (!battleRunning) return;
  const rawDt = clock.getDelta();
  const dt = Math.min(rawDt, 0.05);

  battleTime += dt;

  // Snack boost
  if (snackBoostActive) {
    snackBoostTimer -= dt;
    if (snackBoostTimer <= 0) snackBoostActive = false;
  }

  // Player
  updatePlayerMovement(dt);
  updatePlayerCooldowns(dt);
  updateWeaponSwing(dt);

  // AI + projectiles + confetti + mines
  updateCombatAI(dt);
  updateProjectiles(dt);
  updateConfetti(dt);
  checkPooMines();

  // Camera + render
  updatePlayerCamera();
  billboardHealthBars();
  renderer.render(scene, camera);

  // HUD updates
  const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
  const redAlive = enemyUnits.filter(u => u.userData.alive).length;
  document.getElementById('hud-blue').textContent = 'Allies: ' + (blueAlive - (playerUnit.userData.alive ? 1 : 0));
  document.getElementById('hud-red').textContent = 'Enemy: ' + redAlive;
  const m = Math.floor(battleTime / 60), s = Math.floor(battleTime % 60);
  document.getElementById('hud-time').textContent = m + ':' + (s < 10 ? '0' : '') + s;

  // Player health HUD
  const hpPct = Math.max(0, playerUnit.userData.hp / playerUnit.userData.maxHp);
  document.getElementById('health-fill').style.width = (hpPct * 100) + '%';
  if (hpPct < 0.3) document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #ff4444, #ff6644)';
  else if (hpPct < 0.6) document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #ffaa44, #ffcc44)';
  else document.getElementById('health-fill').style.background = 'linear-gradient(90deg, #44ff44, #88ff88)';
  document.getElementById('health-text').textContent = Math.ceil(playerUnit.userData.hp) + ' / ' + playerUnit.userData.maxHp + ' HP';

  document.getElementById('kill-counter').textContent = 'Kills: ' + playerKillCount;

  // Win/loss check
  if (!playerUnit.userData.alive) {
    document.exitPointerLock();
    endBattle(false);
    return;
  }
  if (redAlive === 0) {
    document.exitPointerLock();
    endBattle(true);
    return;
  }

  requestAnimationFrame(battleLoop);
}

// =============================================
// END BATTLE
// =============================================
function endBattle(victory) {
  battleRunning = false;
  stopBattleMusic();
  document.exitPointerLock();

  // Clean up boats if still present
  if (boatGroup) { scene.remove(boatGroup); boatGroup = null; }
  for (const ab of allyBoats) { if (ab.mesh.parent) scene.remove(ab.mesh); }
  allyBoats = [];
  boatPhase = false;
  landingCutscene = false;

  // Stats
  const stats = loadStats();
  stats.battles++;
  if (victory) stats.wins++;
  saveStats(stats);

  // Level progression
  if (victory) {
    const pd = loadPlayerData();
    pd.clearedLevels[currentLevel] = true;
    if (currentLevel < LEVEL_DEFS.length && currentLevel + 1 > pd.unlockedLevel) {
      pd.unlockedLevel = currentLevel + 1;
    }
    savePlayerData(pd);
  }

  // Achievements
  ggTry('sb_first_fight');
  if (victory) {
    ggTry('sb_winner');

    if (playerUnit.userData.hp === playerUnit.userData.maxHp) ggTry('sb_flawless');
    if (playerKillCount >= 5) ggTry('sb_pillow_army');
    if (playerKillCount >= 10) ggTry('sb_nerf_squad');

    const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
    if (playerUnit.userData.hp >= playerUnit.userData.maxHp * 0.5) ggTry('sb_balanced');
    if (blueAlive <= 3) ggTry('sb_underdog');
    if (battleTime < 30) ggTry('sb_speed_win');
    if (stats.wins >= 5) ggTry('sb_commander');
    if (stats.wins >= 10) ggTry('sb_warlord');
  }

  // Candy rewards
  const pd = loadPlayerData();
  const killCandy = playerKillCount * 5;
  const victoryBonus = victory ? 50 : 0;
  const candyEarned = killCandy + victoryBonus;
  pd.candy += candyEarned;
  savePlayerData(pd);

  // Sound
  if (victory) SFX.victory(); else SFX.defeat();

  // Show end screen
  hideAllScreens();
  document.getElementById('end-screen').classList.remove('hidden');

  document.getElementById('end-title').textContent = victory ? 'MOM! THEY STARTED IT!' : 'You got TATTLED on!';
  document.getElementById('end-title').style.color = victory ? '#44ddff' : '#ff4444';
  document.getElementById('end-subtitle').textContent = victory ? 'The younger sibling empire has been defeated!' : 'The younger siblings win this round...';

  const blueAlive = deployedUnits.filter(u => u.userData.alive).length;
  const redKilled = enemyUnits.filter(u => !u.userData.alive).length;
  const damageTaken = playerUnit.userData.maxHp - Math.max(0, playerUnit.userData.hp);
  const mEnd = Math.floor(battleTime / 60), sEnd = Math.floor(battleTime % 60);
  document.getElementById('end-stats').innerHTML =
    'Your kills: <span>' + playerKillCount + '</span><br>' +
    'Damage taken: <span>' + Math.round(damageTaken) + '</span><br>' +
    'Allies surviving: <span>' + (blueAlive - (playerUnit.userData.alive ? 1 : 0)) + ' / ' + (deployedUnits.length - 1) + '</span><br>' +
    'Enemies defeated: <span>' + redKilled + ' / ' + enemyUnits.length + '</span><br>' +
    'Battle time: <span>' + mEnd + ':' + (sEnd < 10 ? '0' : '') + sEnd + '</span><br>' +
    'Candy earned: <span>+' + candyEarned + '</span>' + (victory ? ' (+50 victory bonus!)' : '') + '<br>' +
    'Total candy: <span>' + pd.candy + '</span><br>' +
    'Total wins: <span>' + stats.wins + '</span>';
}

// --- Intro scene animations (canvas-drawn) ---
function drawIntroScene(ctx, w, h, slideIndex, t) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;

  if (slideIndex === 0) {
    ctx.save();
    ctx.strokeStyle = '#ffffff22';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy - 30, 40, 0, Math.PI * 2);
    ctx.stroke();
    const sec = t * 2;
    ctx.strokeStyle = '#ffffff44';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 30);
    ctx.lineTo(cx + Math.sin(sec) * 30, cy - 30 - Math.cos(sec) * 30);
    ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 30);
    ctx.lineTo(cx + Math.sin(sec * 0.08) * 22, cy - 30 - Math.cos(sec * 0.08) * 22);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,170,68,' + (0.1 + Math.sin(t * 2) * 0.05) + ')';
    ctx.font = '14px Bangers';
    ctx.textAlign = 'center';
    ctx.fillText('TUESDAY', cx, cy + 40);
    ctx.restore();
  } else if (slideIndex === 1) {
    const jarX = cx, jarY = cy + 20;
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(jarX - 80, jarY + 40, 160, 10);
    ctx.fillStyle = 'rgba(200,220,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(jarX - 25, jarY + 40);
    ctx.quadraticCurveTo(jarX - 30, jarY - 10, jarX - 20, jarY - 30);
    ctx.lineTo(jarX + 20, jarY - 30);
    ctx.quadraticCurveTo(jarX + 30, jarY - 10, jarX + 25, jarY + 40);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,220,255,0.25)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = 'rgba(180,160,140,0.3)';
    ctx.fillRect(jarX - 22, jarY - 36, 44, 8);
    ctx.beginPath();
    ctx.arc(jarX, jarY - 36, 6, Math.PI, 0);
    ctx.fill();
    const candyColors = ['#ff4444', '#44ff44', '#ffaa00', '#ff66aa', '#4488ff', '#ffff44'];
    for (let i = 0; i < 12; i++) {
      const cx2 = jarX - 15 + (i % 4) * 10;
      const cy2 = jarY + 25 - Math.floor(i / 4) * 14;
      ctx.fillStyle = candyColors[i % candyColors.length];
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.ellipse(cx2, cy2, 5, 3.5, (i * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    const glow = ctx.createRadialGradient(jarX, jarY, 10, jarX, jarY, 70);
    glow.addColorStop(0, 'rgba(255,170,68,0.08)');
    glow.addColorStop(1, 'rgba(255,170,68,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(jarX - 80, jarY - 60, 160, 120);
  } else if (slideIndex === 2) {
    const flash = Math.max(0, 1 - t * 0.8);
    ctx.fillStyle = 'rgba(255,0,0,' + (flash * 0.15) + ')';
    ctx.fillRect(0, 0, w, h);
    if (t < 1.5) {
      ctx.strokeStyle = 'rgba(255,68,68,' + (0.4 * (1 - t / 1.5)) + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 20, cy - 60);
      ctx.lineTo(cx + 5, cy - 15);
      ctx.lineTo(cx - 8, cy - 10);
      ctx.lineTo(cx + 15, cy + 40);
      ctx.stroke();
    }
  } else if (slideIndex === 3) {
    const jarX = cx, jarY = cy + 20;
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(jarX - 80, jarY + 40, 160, 10);
    ctx.fillStyle = 'rgba(200,220,255,0.12)';
    ctx.beginPath();
    ctx.moveTo(jarX - 25, jarY + 40);
    ctx.quadraticCurveTo(jarX - 30, jarY - 10, jarX - 20, jarY - 30);
    ctx.lineTo(jarX + 20, jarY - 30);
    ctx.quadraticCurveTo(jarX + 30, jarY - 10, jarX + 25, jarY + 40);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,220,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    const handProgress = Math.min(1, t * 0.4);
    const handX = cx + 80 - handProgress * 70;
    const handY = jarY - 20 + Math.sin(t * 3) * 3;
    ctx.fillStyle = 'rgba(230,180,140,0.5)';
    ctx.fillRect(handX + 10, handY - 5, 80, 14);
    ctx.beginPath();
    ctx.ellipse(handX, handY, 12, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    for (let f = 0; f < 4; f++) {
      ctx.beginPath();
      const fy = handY - 8 + f * 5;
      ctx.ellipse(handX - 10 - (f === 1 || f === 2 ? 4 : 0), fy, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (handProgress > 0.5) {
      const candyColors = ['#ff4444', '#44ff44', '#ffaa00'];
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = candyColors[i];
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.ellipse(handX - 5 + i * 6, handY - 12, 4, 3, 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  } else if (slideIndex === 4) {
    const fortX = cx, fortY = cy + 30;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (let i = 0; i < 5; i++) {
      const px = fortX - 40 + i * 20;
      const py = fortY + 5;
      ctx.beginPath();
      ctx.ellipse(px, py, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    for (let i = 0; i < 4; i++) {
      const px = fortX - 30 + i * 20;
      const py = fortY - 10;
      ctx.beginPath();
      ctx.ellipse(px, py, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = 'rgba(100,68,170,0.2)';
    ctx.beginPath();
    ctx.moveTo(fortX - 55, fortY + 15);
    ctx.quadraticCurveTo(fortX, fortY - 40, fortX + 55, fortY + 15);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,136,0,0.5)';
    const gunBob = Math.sin(t * 4) * 2;
    ctx.fillRect(fortX + 25, fortY - 20 + gunBob, 25, 5);
    ctx.fillRect(fortX - 50, fortY - 15 + gunBob, 25, 5);
    ctx.fillStyle = '#fff';
    for (const ex of [-15, 15]) {
      ctx.beginPath();
      ctx.arc(fortX + ex, fortY - 25, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(fortX + ex, fortY - 25, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
    }
  } else if (slideIndex === 5) {
    const flagX = cx, flagY = cy;
    ctx.strokeStyle = 'rgba(200,200,200,0.4)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(flagX, flagY + 50);
    ctx.lineTo(flagX, flagY - 40);
    ctx.stroke();
    const wave = Math.sin(t * 3) * 5;
    ctx.fillStyle = 'rgba(255,68,68,0.35)';
    ctx.beginPath();
    ctx.moveTo(flagX, flagY - 40);
    ctx.quadraticCurveTo(flagX + 30, flagY - 35 + wave, flagX + 55, flagY - 30);
    ctx.lineTo(flagX + 50, flagY - 10);
    ctx.quadraticCurveTo(flagX + 25, flagY - 15 + wave, flagX, flagY - 10);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(flagX + 27, flagY - 25, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,68,68,0.5)';
    ctx.beginPath();
    ctx.arc(flagX + 25, flagY - 26, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(flagX + 29, flagY - 26, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (slideIndex === 6) {
    const hx = cx, hy = cy + 30;
    const glow = ctx.createRadialGradient(hx, hy - 20, 5, hx, hy - 20, 60);
    glow.addColorStop(0, 'rgba(68,136,255,0.15)');
    glow.addColorStop(1, 'rgba(68,136,255,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(hx - 70, hy - 80, 140, 120);
    ctx.fillStyle = 'rgba(68,136,255,0.4)';
    ctx.beginPath();
    ctx.arc(hx, hy - 55, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(hx - 8, hy - 45, 16, 25);
    ctx.fillRect(hx - 25, hy - 40, 50, 6);
    ctx.fillRect(hx - 7, hy - 20, 6, 22);
    ctx.fillRect(hx + 1, hy - 20, 6, 22);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(hx + 25, hy - 37, 12, 6, 0.3, 0, Math.PI * 2);
    ctx.fill();
  } else if (slideIndex === 7) {
    const candyColors = ['#ff4444', '#44ff44', '#ffaa00', '#ff66aa', '#4488ff', '#ffff44', '#aa44ff'];
    for (let i = 0; i < 20; i++) {
      const seed = i * 137.5;
      const cx2 = (seed * 7.3) % w;
      const cy2 = ((t * 40 + seed * 3.1) % (h + 20)) - 10;
      const rot = t * 2 + seed;
      ctx.save();
      ctx.translate(cx2, cy2);
      ctx.rotate(rot);
      ctx.fillStyle = candyColors[i % candyColors.length];
      ctx.globalAlpha = 0.4;
      ctx.fillRect(-4, -3, 8, 6);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

// --- Intro music (one-shot for cinematic) ---
let introAudioCtx = null;

function startIntroMusic() {
  introAudioCtx = playMarch(0.12);

// Shared poo drawing helpers
function drawPooPile(ctx, x, y, t, offset) {
  ctx.fillStyle = 'rgba(107,66,38,0.5)';
  ctx.beginPath();
  ctx.arc(x, y, 5 + Math.sin(t + offset) * 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(136,170,68,0.3)';
  ctx.lineWidth = 1;
  for (let s = 0; s < 2; s++) {
    ctx.beginPath();
    ctx.moveTo(x + (s - 0.5) * 4, y - 6);
    ctx.quadraticCurveTo(x + (s - 0.5) * 6, y - 14 + Math.sin(t * 3 + s) * 2, x + (s - 0.5) * 3, y - 18);
    ctx.stroke();
  }
}

function drawSlingshot(ctx, cx, cy, t, scale) {
  const s = scale || 1;
  ctx.strokeStyle = 'rgba(136,85,34,0.5)';
  ctx.lineWidth = 4 * s;
  ctx.beginPath(); ctx.moveTo(cx, cy + 30 * s); ctx.lineTo(cx, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx - 15 * s, cy - 25 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + 15 * s, cy - 25 * s); ctx.stroke();
  const pull = Math.sin(t * 2) * 5 * s;
  ctx.strokeStyle = 'rgba(204,136,68,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 15 * s, cy - 25 * s);
  ctx.quadraticCurveTo(cx, cy - 10 * s + pull, cx + 15 * s, cy - 25 * s);
  ctx.stroke();
  ctx.fillStyle = 'rgba(107,66,38,0.6)';
  ctx.beginPath();
  ctx.arc(cx, cy - 12 * s + pull * 0.5, 6 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawPoopTitle(ctx, cx, cy, t, title) {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.min(ctx.canvas.width * 0.07, 38) + 'px Bangers, Impact, sans-serif';
  ctx.fillStyle = 'rgba(107,66,38,' + (0.6 + Math.sin(t * 2) * 0.1) + ')';
  ctx.fillText(title, cx, cy);
  ctx.strokeStyle = 'rgba(60,30,10,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeText(title, cx, cy);
  ctx.font = '20px serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('\ud83d\udca9', cx - 100 + Math.sin(t * 3) * 5, cy);
  ctx.fillText('\ud83d\udca9', cx + 95 + Math.sin(t * 3 + 1) * 5, cy);
  ctx.restore();
}

// WAR I — The Discovery: backyard, dog, slingshot found
function drawPoopWar1Intro(ctx, w, h, slideIndex, t) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;

  if (slideIndex === 0) {
    // Backyard fence
    ctx.strokeStyle = 'rgba(200,180,140,0.3)';
    ctx.lineWidth = 3;
    for (let i = 0; i < 9; i++) ctx.strokeRect(cx - 100 + i * 25, cy - 10, 8, 40);
    ctx.strokeStyle = 'rgba(200,180,140,0.2)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - 100, cy); ctx.lineTo(cx + 100, cy);
    ctx.moveTo(cx - 100, cy + 20); ctx.lineTo(cx + 100, cy + 20); ctx.stroke();
    ctx.fillStyle = 'rgba(80,160,60,0.15)';
    ctx.fillRect(cx - 120, cy + 30, 240, 40);
  } else if (slideIndex === 1) {
    // Dog and poo piles
    ctx.fillStyle = 'rgba(180,140,80,0.35)';
    ctx.beginPath(); ctx.ellipse(cx, cy - 5, 18, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 18, cy - 12, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 22, cy - 20, 4, 7, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx - 18, cy - 10);
    ctx.quadraticCurveTo(cx - 28, cy - 30 + Math.sin(t * 5) * 5, cx - 22, cy - 25);
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(180,140,80,0.35)'; ctx.stroke();
    const pooPos = [[-40, 25], [-10, 35], [30, 20], [50, 30], [-55, 15], [20, 40]];
    for (const [px, py] of pooPos) drawPooPile(ctx, cx + px, cy + py, t, px);
  } else if (slideIndex === 2) {
    drawSlingshot(ctx, cx, cy, t, 1);
  } else if (slideIndex === 3) {
    drawPoopTitle(ctx, cx, cy - 55, t, 'DOG POOPIC WARS');
    // Two sides facing off
    for (const side of [{ x: cx - 50, c: 'rgba(68,136,255,0.3)' }, { x: cx + 50, c: 'rgba(255,68,68,0.3)' }]) {
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = side.c;
        const sx = side.x + (i - 1.5) * 15;
        ctx.beginPath(); ctx.arc(sx, cy + 5, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(sx - 3, cy + 10, 6, 12);
      }
    }
    ctx.fillStyle = 'rgba(107,66,38,0.5)';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.arc(cx - 20 + i * 20, cy - 15 + Math.sin(t * 4 + i * 2) * 15, 4, 0, Math.PI * 2); ctx.fill();
    }
  } else if (slideIndex === 4) {
    // Slingshot ready to fire (dramatic)
    drawSlingshot(ctx, cx, cy, t, 1.3);
    ctx.strokeStyle = 'rgba(136,170,68,0.3)'; ctx.lineWidth = 1;
    for (let s = 0; s < 3; s++) {
      ctx.beginPath(); ctx.moveTo(cx + (s - 1) * 6, cy - 25);
      ctx.quadraticCurveTo(cx + (s - 1) * 8, cy - 40 + Math.sin(t * 4 + s) * 3, cx + (s - 1) * 5, cy - 50);
      ctx.stroke();
    }
  }
}

// WAR II — The Escalation: enemy slingshots, more poo, arms race
function drawPoopWar2Intro(ctx, w, h, slideIndex, t) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;

  if (slideIndex === 0) {
    // Broken fence, scorch marks
    ctx.strokeStyle = 'rgba(200,180,140,0.25)';
    ctx.lineWidth = 3;
    for (let i = 0; i < 9; i++) {
      ctx.save();
      ctx.translate(cx - 100 + i * 25, cy - 10);
      if (i === 3 || i === 6) ctx.rotate(0.2 + Math.sin(t + i) * 0.05);
      ctx.strokeRect(0, 0, 8, i === 3 ? 25 : 40);
      ctx.restore();
    }
    // Brown splat marks on ground
    ctx.fillStyle = 'rgba(107,66,38,0.2)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); ctx.arc(cx - 60 + i * 30, cy + 35, 8 + Math.sin(t + i) * 2, 0, Math.PI * 2); ctx.fill();
    }
  } else if (slideIndex === 1) {
    // Enemy kids with slingshots
    const redKids = [cx - 30, cx, cx + 30];
    for (const kx of redKids) {
      ctx.fillStyle = 'rgba(255,68,68,0.3)';
      ctx.beginPath(); ctx.arc(kx, cy - 10, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(kx - 3, cy - 4, 6, 14);
      // Mini slingshot in hand
      ctx.strokeStyle = 'rgba(136,85,34,0.4)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(kx + 8, cy - 2); ctx.lineTo(kx + 14, cy - 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(kx + 8, cy - 2); ctx.lineTo(kx + 14, cy - 6); ctx.stroke();
    }
    // Menacing eyes
    for (const kx of redKids) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(kx - 2, cy - 12, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(kx + 2, cy - 12, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  } else if (slideIndex === 2) {
    // Dog eating from giant bowl, looking guilty
    ctx.fillStyle = 'rgba(180,140,80,0.35)';
    ctx.beginPath(); ctx.ellipse(cx + 20, cy, 18, 12, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 38, cy - 8, 8, 0, Math.PI * 2); ctx.fill();
    // Food bowl
    ctx.fillStyle = 'rgba(180,180,180,0.3)';
    ctx.beginPath(); ctx.ellipse(cx - 15, cy + 5, 15, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(139,90,43,0.4)';
    ctx.beginPath(); ctx.ellipse(cx - 15, cy + 3, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
    // Extra poo everywhere
    const pooPos = [[-60, 25], [-30, 30], [0, 35], [30, 25], [60, 30], [-45, 40], [45, 40], [-15, 45], [15, 20]];
    for (const [px, py] of pooPos) drawPooPile(ctx, cx + px, cy + py, t, px);
  } else if (slideIndex === 3) {
    drawPoopTitle(ctx, cx, cy - 50, t, 'DOG POOPIC WAR II');
    // Subtitle
    ctx.save(); ctx.textAlign = 'center';
    ctx.font = Math.min(w * 0.035, 18) + 'px Bangers, Impact, sans-serif';
    ctx.fillStyle = 'rgba(200,150,80,0.5)';
    ctx.fillText('The Great Poo Offensive', cx, cy - 30);
    ctx.restore();
    // Slingshots on both sides firing at each other
    drawSlingshot(ctx, cx - 50, cy + 15, t, 0.7);
    drawSlingshot(ctx, cx + 50, cy + 15, t + 1, 0.7);
    // Poo flying between them
    ctx.fillStyle = 'rgba(107,66,38,0.5)';
    for (let i = 0; i < 4; i++) {
      const px = cx - 30 + i * 20;
      const py = cy - 5 + Math.sin(t * 5 + i * 1.5) * 20;
      ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI * 2); ctx.fill();
    }
  } else if (slideIndex === 4) {
    // Two armies charging at each other
    for (let i = 0; i < 6; i++) {
      const bx = cx - 80 + i * 12 + Math.sin(t * 3) * 3;
      ctx.fillStyle = 'rgba(68,136,255,0.35)';
      ctx.beginPath(); ctx.arc(bx, cy, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(bx - 2, cy + 4, 4, 8);
    }
    for (let i = 0; i < 6; i++) {
      const rx = cx + 30 + i * 12 - Math.sin(t * 3) * 3;
      ctx.fillStyle = 'rgba(255,68,68,0.35)';
      ctx.beginPath(); ctx.arc(rx, cy, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(rx - 2, cy + 4, 4, 8);
    }
    // Explosion in middle
    ctx.fillStyle = 'rgba(107,66,38,' + (0.2 + Math.sin(t * 4) * 0.1) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, 15 + Math.sin(t * 6) * 5, 0, Math.PI * 2); ctx.fill();
  }
}

// WAR III — The Final Flush: apocalyptic poo wasteland
function drawPoopWar3Intro(ctx, w, h, slideIndex, t) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;

  if (slideIndex === 0) {
    // Dramatic lightning
    ctx.fillStyle = 'rgba(20,10,0,0.3)';
    ctx.fillRect(0, 0, w, h);
    if (Math.sin(t * 8) > 0.9) {
      ctx.strokeStyle = 'rgba(255,220,100,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 20, cy - 60);
      ctx.lineTo(cx + 10, cy - 30);
      ctx.lineTo(cx + 25, cy - 25);
      ctx.lineTo(cx + 5, cy + 10);
      ctx.stroke();
    }
    // Silhouette of yard covered in poo
    ctx.fillStyle = 'rgba(107,66,38,0.3)';
    ctx.fillRect(cx - 100, cy + 20, 200, 30);
    // Tiny poo bumps on horizon
    for (let i = 0; i < 12; i++) {
      ctx.beginPath();
      ctx.arc(cx - 90 + i * 16, cy + 18, 4 + Math.sin(i) * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (slideIndex === 1) {
    // Massive army formation
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 8; col++) {
        const x = cx - 60 + col * 17;
        const y = cy - 15 + row * 18;
        ctx.fillStyle = row < 2 ? 'rgba(68,136,255,0.25)' : 'rgba(255,68,68,0.25)';
        ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(x - 1.5, y + 3, 3, 6);
      }
    }
    // Slingshots everywhere
    for (let i = 0; i < 4; i++) {
      const sx = cx - 50 + i * 35;
      ctx.strokeStyle = 'rgba(136,85,34,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(sx, cy + 40); ctx.lineTo(sx, cy + 25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, cy + 25); ctx.lineTo(sx - 5, cy + 15); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, cy + 25); ctx.lineTo(sx + 5, cy + 15); ctx.stroke();
    }
  } else if (slideIndex === 2) {
    // Ground is more poo than grass
    ctx.fillStyle = 'rgba(80,160,60,0.1)';
    ctx.fillRect(cx - 100, cy + 10, 200, 40);
    ctx.fillStyle = 'rgba(107,66,38,0.35)';
    for (let i = 0; i < 20; i++) {
      const px = cx - 90 + (i * 137.5 % 180);
      const py = cy + 15 + (i * 73.1 % 30);
      ctx.beginPath(); ctx.arc(px, py, 4 + Math.sin(t + i) * 1, 0, Math.PI * 2); ctx.fill();
    }
    // Skull and crossbones (made of poo)
    ctx.fillStyle = 'rgba(107,66,38,0.4)';
    ctx.beginPath(); ctx.arc(cx, cy - 15, 12, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx - 5, cy - 18, 3, 0, Math.PI * 2);
    ctx.arc(cx + 5, cy - 18, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.arc(cx - 5, cy - 18, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, cy - 18, 2, 0, Math.PI * 2); ctx.fill();
    // Warning sign
    ctx.strokeStyle = 'rgba(255,200,0,0.4)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 15, cy + 5); ctx.lineTo(cx, cy - 30); ctx.lineTo(cx + 15, cy + 5); ctx.closePath();

      ctx.fillRect(cx - 17 + i * 15, cy + 34, 4, 8);
    }
    // Money on counter
    ctx.fillStyle = 'rgba(100,180,80,0.3)';
    ctx.fillRect(cx + 20, cy + 32, 12, 6);
  } else if (slideIndex === 2) {
    // Building the launchers — cardboard tubes + loading crickets
    // Table
    ctx.fillStyle = 'rgba(140,110,70,0.2)';
    ctx.fillRect(cx - 60, cy + 10, 120, 6);
    // Cardboard tubes being assembled
    const tubeColor = 'rgba(153,119,85,0.45)';
    for (let i = 0; i < 3; i++) {
      const tx = cx - 35 + i * 35;
      ctx.fillStyle = tubeColor;
      ctx.fillRect(tx - 4, cy - 15, 8, 25);
      ctx.fillStyle = 'rgba(100,80,60,0.25)';
      ctx.beginPath(); ctx.ellipse(tx, cy - 15, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Open cricket box dumping bugs into tube
    ctx.fillStyle = 'rgba(68,136,51,0.35)';
    ctx.fillRect(cx + 25, cy - 25, 20, 15);
    // Crickets falling into tube
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = 'rgba(58,90,42,' + (0.4 + Math.sin(t * 4 + i) * 0.1) + ')';
      const fallY = cy - 10 + ((t * 40 + i * 30) % 25);
      const fallX = cx + 35 + Math.sin(t * 3 + i) * 3;
      ctx.beginPath(); ctx.ellipse(fallX, fallY, 2.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
    }
    // Red kid hands working
    ctx.fillStyle = 'rgba(255,200,170,0.25)';
    ctx.beginPath(); ctx.arc(cx - 35, cy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 35, cy - 5, 4, 0, Math.PI * 2); ctx.fill();
  } else if (slideIndex === 3) {
    // Defenders behind wall with water balloons
    // Stone wall
    ctx.fillStyle = 'rgba(120,120,110,0.35)';
    for (let i = 0; i < 8; i++) {
      ctx.fillRect(cx - 80 + i * 22, cy + 5, 18, 12);
    }
    // Blue defenders behind wall
    for (let i = 0; i < 6; i++) {
      const bx = cx - 70 + i * 25;
      ctx.fillStyle = 'rgba(68,136,255,0.35)';
      ctx.beginPath(); ctx.arc(bx, cy - 5, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(bx - 2, cy - 1, 4, 8);
    }
    // Water balloons being lobbed
    ctx.fillStyle = 'rgba(68,136,255,' + (0.4 + Math.sin(t * 3) * 0.1) + ')';
    for (let i = 0; i < 4; i++) {
      const bx = cx - 30 + i * 25;
      const by = cy - 20 - Math.abs(Math.sin(t * 3 + i * 1.5)) * 25;
      ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI * 2); ctx.fill();
    }
  } else if (slideIndex === 4) {
    // Title card — dramatic
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold ' + Math.min(w * 0.07, 38) + 'px Bangers, Impact, sans-serif';
    ctx.fillStyle = 'rgba(26,39,68,' + (0.7 + Math.sin(t * 2) * 0.1) + ')';
    ctx.fillText("CRICKET'S CHARGE", cx, cy - 25);
    ctx.strokeStyle = 'rgba(100,100,120,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeText("CRICKET'S CHARGE", cx, cy - 25);
    ctx.font = Math.min(w * 0.035, 18) + 'px Bangers, Impact, sans-serif';
    ctx.fillStyle = 'rgba(200,200,220,0.5)';
    ctx.fillText('Hold the line.', cx, cy);
    ctx.restore();
    // Charging silhouettes
    for (let i = 0; i < 8; i++) {
      const rx = cx + 30 + (i % 4) * 15 - Math.sin(t * 3) * 5;
      const ry = cy + 15 + Math.floor(i / 4) * 14;
      ctx.fillStyle = 'rgba(255,68,68,0.25)';
      ctx.beginPath(); ctx.arc(rx, ry, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(rx - 1.5, ry + 3, 3, 6);
    }
    // Defenders
    for (let i = 0; i < 4; i++) {
      const bx = cx - 50 + i * 15;
      ctx.fillStyle = 'rgba(68,136,255,0.25)';
      ctx.beginPath(); ctx.arc(bx, cy + 18, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(bx - 1.5, cy + 21, 3, 6);
    }
  }
}

// --- B-Day intro canvas drawings ---
function drawBDayIntroScene(ctx, w, h, slideIndex, t) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;

  if (slideIndex === 0) {
    // Calendar showing SATURDAY
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(cx - 50, cy - 50, 100, 80);
    ctx.fillStyle = 'rgba(255,68,68,0.3)';
    ctx.fillRect(cx - 50, cy - 50, 100, 20);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '10px Bangers';
    ctx.textAlign = 'center';
    ctx.fillText('SATURDAY', cx, cy - 35);
    ctx.font = '40px Bangers';
    ctx.fillText('🎂', cx, cy + 15);
    // Party streamers
    const colors = ['#ff4444','#44ff44','#ffaa00','#ff66aa','#4488ff'];
    for (let i = 0; i < 5; i++) {
      ctx.strokeStyle = colors[i];
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 2;
      ctx.beginPath();
      const sx = cx - 80 + i * 40;
      ctx.moveTo(sx, cy - 70);
      for (let j = 0; j < 6; j++) {
        ctx.lineTo(sx + Math.sin(t * 3 + j + i) * 10, cy - 70 + j * 15);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  } else if (slideIndex === 1) {
    // Birthday cake with candles
    ctx.fillStyle = 'rgba(139,69,19,0.3)';
    ctx.fillRect(cx - 40, cy, 80, 40);
    ctx.fillStyle = 'rgba(255,182,193,0.3)';
    ctx.fillRect(cx - 45, cy - 5, 90, 15);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(cx - 42, cy + 5, 84, 3);
    // Candles
    for (let i = 0; i < 5; i++) {
      const candleX = cx - 30 + i * 15;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(candleX - 2, cy - 20, 4, 20);
      // Flame
      const flicker = Math.sin(t * 8 + i * 2) * 2;
      ctx.fillStyle = 'rgba(255,200,0,' + (0.4 + Math.sin(t * 5 + i) * 0.1) + ')';
      ctx.beginPath();
      ctx.ellipse(candleX, cy - 24 + flicker, 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Candy around cake
    const candyColors = ['#ff4444', '#44ff44', '#ffaa00', '#ff66aa'];
    for (let i = 0; i < 8; i++) {
      ctx.fillStyle = candyColors[i % candyColors.length];
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.ellipse(cx - 60 + i * 18, cy + 50, 4, 3, i * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (slideIndex === 2) {
    // "NOT INVITED" stamp
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(-0.2);
    ctx.strokeStyle = 'rgba(255,0,0,' + (0.3 + Math.sin(t * 2) * 0.1) + ')';
    ctx.lineWidth = 4;
    ctx.strokeRect(-80, -25, 160, 50);
    ctx.fillStyle = 'rgba(255,0,0,' + (0.3 + Math.sin(t * 2) * 0.1) + ')';
    ctx.font = '28px Bangers';
    ctx.textAlign = 'center';
    ctx.fillText('NOT INVITED', 0, 10);
    ctx.restore();
  } else if (slideIndex === 3) {
    // Pillow fort with party hats peeking over
    const fortY = cy + 20;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.ellipse(cx - 40 + i * 20, fortY + 5, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    // Heads with party hats poking over fort
    for (let i = 0; i < 3; i++) {
      const hx = cx - 20 + i * 20;
      const hy = fortY - 15;
      ctx.fillStyle = 'rgba(255,200,160,0.35)';
      ctx.beginPath();
      ctx.arc(hx, hy, 6, 0, Math.PI * 2);
      ctx.fill();
      // Party hat
      const hatColors = ['#ff4444', '#44ff44', '#ffaa00'];
      ctx.fillStyle = hatColors[i];
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(hx - 5, hy - 4);
      ctx.lineTo(hx, hy - 18);
      ctx.lineTo(hx + 5, hy - 4);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(hx - 2, hy - 1, 1, 0, Math.PI * 2);
      ctx.arc(hx + 2, hy - 1, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (slideIndex === 4) {
    // Cardboard boat with flames
    const bx = cx, by = cy + 20;
    ctx.fillStyle = 'rgba(160,120,60,0.35)';
    ctx.beginPath();
    ctx.moveTo(bx - 50, by + 15);
    ctx.lineTo(bx - 40, by - 15);
    ctx.lineTo(bx + 40, by - 15);
    ctx.lineTo(bx + 50, by + 15);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(160,120,60,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Flames drawn on side
    ctx.fillStyle = 'rgba(255,100,0,0.4)';
    for (let i = 0; i < 4; i++) {
      const fx = bx - 30 + i * 18;
      const flicker = Math.sin(t * 5 + i) * 3;
      ctx.beginPath();
      ctx.moveTo(fx - 6, by + 5);
      ctx.quadraticCurveTo(fx, by - 12 + flicker, fx + 6, by + 5);
      ctx.fill();
    }
    // Flag
    ctx.strokeStyle = 'rgba(200,200,200,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, by - 15);
    ctx.lineTo(bx, by - 45);
    ctx.stroke();
    const flagWave = Math.sin(t * 3) * 3;
    ctx.fillStyle = 'rgba(68,136,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(bx, by - 45);
    ctx.quadraticCurveTo(bx + 15, by - 42 + flagWave, bx + 25, by - 38);
    ctx.lineTo(bx + 22, by - 30);
    ctx.quadraticCurveTo(bx + 12, by - 33 + flagWave, bx, by - 30);
    ctx.fill();
    // Hero silhouette in boat
    ctx.fillStyle = 'rgba(68,136,255,0.3)';
    ctx.beginPath();
    ctx.arc(bx, by - 22, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(bx - 4, by - 16, 8, 12);
  } else if (slideIndex === 5) {
    // Falling candy + confetti
    const candyColors = ['#ff4444', '#44ff44', '#ffaa00', '#ff66aa', '#4488ff', '#ffff44', '#aa44ff'];
    for (let i = 0; i < 25; i++) {
      const seed = i * 137.5;
      const cx2 = (seed * 7.3) % w;
      const cy2 = ((t * 50 + seed * 3.1) % (h + 20)) - 10;
      const rot = t * 3 + seed;
      ctx.save();
      ctx.translate(cx2, cy2);
      ctx.rotate(rot);
      ctx.fillStyle = candyColors[i % candyColors.length];
      ctx.globalAlpha = 0.5;
      if (i % 3 === 0) {
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-4, -3, 8, 6);
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

let activeIntroSlides = INTRO_SLIDES;
let activeIntroDraw = drawIntroScene;

let introTimeout = null;
let introSlideIndex = 0;
let introAnimFrame = null;
let introStartTime = 0;
let introSlideTime = 0;

function showIntro() {
  if (currentLevel === 2) {
    activeIntroSlides = BDAY_INTRO_SLIDES;
    activeIntroDraw = drawBDayIntroScene;
  } else if (currentLevel === 3) {
    activeIntroSlides = POOP_WAR_1_SLIDES;
    activeIntroDraw = drawPoopWar1Intro;
  } else if (currentLevel === 4) {
    activeIntroSlides = POOP_WAR_2_SLIDES;
    activeIntroDraw = drawPoopWar2Intro;
  } else if (currentLevel === 5) {
    activeIntroSlides = POOP_WAR_3_SLIDES;
    activeIntroDraw = drawPoopWar3Intro;
  } else if (currentLevel === 6) {
    activeIntroSlides = CRICKET_CHARGE_SLIDES;
    activeIntroDraw = drawCricketChargeIntro;
  } else if (currentLevel === 7) {
    activeIntroSlides = FLAT_TOP_SLIDES;
    activeIntroDraw = drawFlatTopIntro;
  } else if (currentLevel === 8) {
    activeIntroSlides = SIEGE_OF_TOYS_SLIDES;
    activeIntroDraw = drawSiegeOfToysIntro;
  } else {
    activeIntroSlides = INTRO_SLIDES;
    activeIntroDraw = drawIntroScene;
  }

  hideAllScreens();
  document.getElementById('intro-screen').classList.remove('hidden');
  introSlideIndex = 0;
  introStartTime = performance.now();
  introSlideTime = 0;

  const cvs = document.getElementById('intro-canvas');
  cvs.width = cvs.clientWidth;
  cvs.height = cvs.clientHeight;

  startIntroMusic();
  startIntroAnim();
  playIntroSlide();
}

function startIntroAnim() {
  const cvs = document.getElementById('intro-canvas');
  const ctx = cvs.getContext('2d');
  function frame() {
    const t = (performance.now() - introStartTime) / 1000;
    activeIntroDraw(ctx, cvs.width, cvs.height, Math.max(0, introSlideIndex - 1), introSlideTime > 0 ? t - introSlideTime : t);
    introAnimFrame = requestAnimationFrame(frame);
  }
  frame();
}

function playIntroSlide() {
  if (introSlideIndex >= activeIntroSlides.length) {
    skipIntro();
    return;
  }

  const slide = activeIntroSlides[introSlideIndex];
  const textEl = document.getElementById('intro-text');
  const bgEl = document.getElementById('intro-scene-bg');

  textEl.className = 'intro-text exit';

  setTimeout(() => {
    bgEl.style.background = slide.bg;
    introSlideTime = (performance.now() - introStartTime) / 1000;

    let html = '';
    for (const line of slide.lines) {
      html += '<div class="line ' + line.cls + '">' + line.text + '</div>';
    }
    textEl.innerHTML = html;
    textEl.className = 'intro-text';

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        textEl.className = 'intro-text visible';
      });
    });

    introSlideIndex++;
    introTimeout = setTimeout(playIntroSlide, slide.duration);
  }, 600);
}

function skipIntro() {
  if (introTimeout) { clearTimeout(introTimeout); introTimeout = null; }
  if (introAnimFrame) { cancelAnimationFrame(introAnimFrame); introAnimFrame = null; }
  stopIntroMusic();
  showLoadout();
}

// =============================================
// SCREEN MANAGEMENT
// =============================================
function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  cleanupMirror();
}

function showTitle() {
  if (battleRunning) { battleRunning = false; }
  stopBattleMusic();
  document.exitPointerLock();
  hideAllScreens();
  document.getElementById('title-screen').classList.remove('hidden');
}

// =============================================
// FPS INPUT CONTROLS
// =============================================
document.addEventListener('mousemove', (e) => {
  if (document.pointerLockElement !== renderer?.domElement) return;
  if (!battleRunning) return;
  playerYaw -= e.movementX * 0.002;
  playerPitch -= e.movementY * 0.002;
  playerPitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, playerPitch));
});

document.addEventListener('mousedown', (e) => {
  if (document.pointerLockElement !== renderer?.domElement) return;
  if (!battleRunning) return;
  if (e.button === 0) playerAttack();
  if (e.button === 2) playerShoot();
});

document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k in moveKeys) { moveKeys[k] = true; e.preventDefault(); }
  if (k === ' ' && battleRunning && playerUnit && playerUnit.userData.alive) {
    // Jump if on the ground
    const groundHere = getGroundY(playerUnit.position.x, playerUnit.position.z);
    if (playerUnit.position.y <= groundHere + 0.01) {
      playerVelY = JUMP_SPEED;
    }
    e.preventDefault();
  }
  if (k === 'escape') {
    if (document.pointerLockElement) document.exitPointerLock();
    else showTitle();
  }
});

document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k in moveKeys) moveKeys[k] = false;
});

// Re-acquire pointer lock on click during battle
document.addEventListener('click', (e) => {
  if (!battleRunning) return;
  if (document.pointerLockElement) return;
  if (e.target === renderer?.domElement || e.target.closest('#battle-canvas')) {
    renderer?.domElement.requestPointerLock();
  }
});

// Window resize
window.addEventListener('resize', () => {
  if (!renderer) return;
  const bc = document.getElementById('battle-canvas');
  if (!bc || !bc.clientWidth) return;
  renderer.setSize(bc.clientWidth, bc.clientHeight);
  if (camera) {
    camera.aspect = bc.clientWidth / bc.clientHeight;
    camera.updateProjectionMatrix();
  }
});
</script>
