<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Super Soccer — Graham Games</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9917;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;overflow:hidden;}
.toolbar{height:42px;background:linear-gradient(180deg,#1a1a2e 0%,#0d0d1a 100%);display:flex;align-items:center;padding:0 10px;border-bottom:1px solid #c9a84c44;position:relative;z-index:10;}
.tb-logo{width:32px;height:28px;margin-right:8px;flex-shrink:0;}
.tb-title{font-family:Cinzel,serif;color:#c9a84c;font-size:0.95rem;letter-spacing:2px;flex:1;}
.tb-exit{font-family:Cinzel,serif;color:#c9a84c;text-decoration:none;font-size:0.65rem;border:1px solid #c9a84c44;padding:4px 12px;border-radius:4px;letter-spacing:1px;transition:all 0.2s;}
.tb-exit:hover{background:#c9a84c22;border-color:#c9a84c;}
#game-canvas{display:block;width:100%;height:calc(100vh - 42px);background:#1a3a1a;image-rendering:pixelated;image-rendering:crisp-edges;}
#ach-toast{position:fixed;top:50px;right:10px;background:linear-gradient(135deg,#1a1a2e,#0d0d1a);border:1px solid #c9a84c;border-radius:8px;padding:10px 18px;z-index:9999;opacity:0;transform:translateX(120%);transition:all 0.4s;pointer-events:none;min-width:200px;}
#ach-toast.show{opacity:1;transform:translateX(0);}
.at-title{color:#c9a84c;font-family:Cinzel,serif;font-size:0.65rem;letter-spacing:1px;}
.at-name{color:#fff;font-size:0.85rem;margin:4px 0 2px;font-family:Cinzel,serif;}
.at-reward{color:#c9a84c;font-size:0.75rem;font-family:Cinzel,serif;}
@media(max-width:600px){
  .toolbar{height:38px;padding:0 6px;}
  .tb-title{font-size:0.75rem;}
  .tb-exit{font-size:0.55rem;padding:3px 8px;}
  #game-canvas{height:calc(100vh - 38px);}
}
</style>
</head>
<body>
<div class="toolbar">
  <svg class="tb-logo" viewBox="0 0 300 260" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M90 230 C90 100, 210 100, 210 30" stroke="#2a8a4a" stroke-width="28" stroke-linecap="round" fill="none"/>
    <path d="M210 230 C210 100, 90 100, 90 30" stroke="#2a8a4a" stroke-width="28" stroke-linecap="round" fill="none"/>
    <circle cx="90" cy="30" r="18" fill="#2a8a4a"/><circle cx="210" cy="30" r="18" fill="#2a8a4a"/>
    <ellipse cx="90" cy="26" rx="5" ry="4" fill="#0d0d1a"/><ellipse cx="210" cy="26" rx="5" ry="4" fill="#0d0d1a"/>
    <path d="M80 42 Q90 52 100 42" stroke="#2a8a4a" stroke-width="3" fill="none"/>
    <path d="M200 42 Q210 52 220 42" stroke="#2a8a4a" stroke-width="3" fill="none"/>
  </svg>
  <div class="tb-title">SUPER SOCCER</div>
  <a href="#" class="tb-exit" onclick="toggleFullscreen();return false" style="margin-right:6px;">FULLSCREEN</a>
  <a href="../index.html" class="tb-exit">EXIT TO LAUNCHER</a>
</div>
<canvas id="game-canvas"></canvas>
<div id="ach-toast">
  <div class="at-title">ACHIEVEMENT UNLOCKED</div>
  <div class="at-name" id="ach-name"></div>
  <div class="at-reward" id="ach-reward"></div>
</div>

<script>
// === G BUX SYSTEM ===
const GG_KEY = 'graham-games-data';
function ggLoad(){try{return JSON.parse(localStorage.getItem(GG_KEY))||{gBux:0,achievements:{},shopPurchases:{}};}catch(e){return{gBux:0,achievements:{},shopPurchases:{}};}}
function ggSave(d){localStorage.setItem(GG_KEY,JSON.stringify(d));}
function ggUnlockAchievement(id,name,reward){
  const d=ggLoad();if(d.achievements[id])return false;
  d.achievements[id]=true;d.gBux+=reward;ggSave(d);
  ggToastQueue.push({name,reward});if(!ggToastShowing)processToastQueue();return true;
}
const ggToastQueue=[];let ggToastShowing=false;
function processToastQueue(){
  if(!ggToastQueue.length){ggToastShowing=false;return;}
  ggToastShowing=true;const t=ggToastQueue.shift();
  document.getElementById('ach-name').textContent=t.name;
  document.getElementById('ach-reward').textContent='+'+t.reward+' G Bux';
  document.getElementById('ach-toast').classList.add('show');
  setTimeout(()=>{document.getElementById('ach-toast').classList.remove('show');setTimeout(processToastQueue,400);},3000);
}

// === ACHIEVEMENTS (10, 200G) ===
const SS_ACH={
  ss_first_match:{name:'Kick Off',reward:5},
  ss_first_win:{name:'Victory!',reward:10},
  ss_clean_sheet:{name:'Clean Sheet',reward:20},
  ss_hat_trick:{name:'Hat Trick',reward:20},
  ss_blowout:{name:'Blowout',reward:25},
  ss_screamer:{name:'Screamer',reward:15},
  ss_comeback:{name:'Comeback Kid',reward:30},
  ss_veteran:{name:'Veteran',reward:15},
  ss_all_teams:{name:'World Tour',reward:30},
  ss_golden_boot:{name:'Golden Boot',reward:30}
};
function ggTry(id){const a=SS_ACH[id];if(a)ggUnlockAchievement(id,a.name,a.reward);}

// === STATS ===
const SS_STATS_KEY='ss-stats';
function defaultStats(){return{totalMatches:0,wins:0,goalsScored:0,teamWins:{}};}
function loadStats(){try{return JSON.parse(localStorage.getItem(SS_STATS_KEY))||defaultStats();}catch(e){return defaultStats();}}
function saveStats(s){localStorage.setItem(SS_STATS_KEY,JSON.stringify(s));}

// === CONSTANTS ===
const GAME_W=640,GAME_H=360;
const FL=45,FR=595,FT=40,FB=320;
const FW=FR-FL,FH=FB-FT,FCX=(FL+FR)/2,FCY=(FT+FB)/2;
const GOAL_T=150,GOAL_B=210,GOAL_DEPTH=15;
const PEN_W=85,PEN_T=120,PEN_B=240;
const GA_W=40,GA_T=140,GA_B=220;
const CENTER_R=45,PEN_SPOT=70;
const BALL_R=7,BALL_FRIC=0.97;
const PLAYER_R=7,CONTROL_R=15,STEAL_R=12;
const PASS_PWR=1.8,SHOOT_PWR=2.5;
const HALF_SEC=60; // real seconds per half
const KICKOFF_FRAMES=90;

// === TEAMS (6) ===
const TEAMS=[
  {name:'LIONS',  pri:'#e63946',sec:'#ffffff',spd:0.55,sht:1.0,pas:1.0,def:1.0},
  {name:'EAGLES', pri:'#2a6fdb',sec:'#ffffff',spd:0.55,sht:1.0,pas:1.0,def:1.0},
  {name:'BEARS',  pri:'#d4843e',sec:'#ffffff',spd:0.55,sht:1.0,pas:1.0,def:1.0},
  {name:'SHARKS', pri:'#00b4d8',sec:'#003344',spd:0.55,sht:1.0,pas:1.0,def:1.0},
  {name:'DRAGONS',pri:'#9b59b6',sec:'#f0c040',spd:0.55,sht:1.0,pas:1.0,def:1.0},
  {name:'WOLVES', pri:'#e0e0e0',sec:'#333333',spd:0.55,sht:1.0,pas:1.0,def:1.0}
];
const POSITIONS=[
  {name:'GOALKEEPER',short:'GK',idx:0,desc:'Guard the net'},
  {name:'MIDFIELDER',short:'MID',idx:1,desc:'Control the game'},
  {name:'FORWARD',short:'FWD',idx:2,desc:'Score goals'}
];

// === INPUT ===
const keys={},jp={};
let mouseX=GAME_W/2,mouseY=GAME_H/2;
window.addEventListener('keydown',e=>{if(!keys[e.code])jp[e.code]=true;keys[e.code]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;e.preventDefault();});
window.addEventListener('mousemove',e=>{
  const dc=document.getElementById('game-canvas');
  const rect=dc.getBoundingClientRect();
  const scale=Math.min(dc.clientWidth/GAME_W,dc.clientHeight/GAME_H);
  const ox=(dc.clientWidth-GAME_W*scale)/2;
  const oy=(dc.clientHeight-GAME_H*scale)/2;
  mouseX=(e.clientX-rect.left-ox)/scale;
  mouseY=(e.clientY-rect.top-oy)/scale;
});
function clearJP(){for(const k in jp)delete jp[k];}

// === GAME STATE ===
let gameState='title';
let teamSelIdx=0,posSelIdx=2,playerTeam=0,aiTeam=1,playerPos=2;
let score=[0,0],half=1,playerRight=true;
let matchElapsed=0,lastTime=0;
let team1=[],team2=[]; // player's team, AI team
let ball=null,ballOwner=null;
let selIdx=0; // selected player index on human team
let goalTimer=0,goalBy=-1;
let halfTimer=0,endTimer=0;
let kickoffTimer=0;
let particles=[];
let p1GoalsThisMatch=0,maxDeficit=0;
let lastShotByHuman=false,lastShotDist=0;
let frameCount=0;
let matchShots=[0,0];
let callForPassCd=0; // cooldown for call-for-pass
let tutorialTimer=0;

// === UTILITY ===
function dist(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v;}
function ang(a,b){return Math.atan2(b.y-a.y,b.x-a.x);}
function lerp(a,b,t){return a+(b-a)*t;}

// === ENTITY CREATION ===
function mkPlayer(x,y,teamIdx,role,idx){
  return{x,y,vx:0,vy:0,teamIdx,role,idx,angle:0,kickCd:0};
}

function mkBall(){return{x:FCX,y:FCY,vx:0,vy:0};}

// === FORMATIONS ===
function getFormation(attackRight){
  if(attackRight){
    return[
      {x:FL+20,y:FCY,role:'GK'},
      {x:FCX-40,y:FCY,role:'MID'},
      {x:FCX+80,y:FCY,role:'FWD'}
    ];
  }
  return[
    {x:FR-20,y:FCY,role:'GK'},
    {x:FCX+40,y:FCY,role:'MID'},
    {x:FCX-80,y:FCY,role:'FWD'}
  ];
}

function getKickoffFormation(attackRight){
  if(attackRight){
    return[
      {x:FL+20,y:FCY,role:'GK'},
      {x:FCX-60,y:FCY,role:'MID'},
      {x:FCX-5,y:FCY,role:'FWD'}
    ];
  }
  return[
    {x:FR-20,y:FCY,role:'GK'},
    {x:FCX+60,y:FCY,role:'MID'},
    {x:FCX+30,y:FCY,role:'FWD'}
  ];
}

// === RESET/SETUP ===
function resetPositions(forKickoff){
  const f1=forKickoff?getKickoffFormation(playerRight):getFormation(playerRight);
  const f2=forKickoff?getKickoffFormation(!playerRight):getFormation(!playerRight);
  for(let i=0;i<3;i++){
    team1[i].x=f1[i].x;team1[i].y=f1[i].y;team1[i].role=f1[i].role;
    team1[i].vx=0;team1[i].vy=0;team1[i].kickCd=0;
    team2[i].x=f2[i].x;team2[i].y=f2[i].y;team2[i].role=f2[i].role;
    team2[i].vx=0;team2[i].vy=0;team2[i].kickCd=0;
  }
  ball.x=FCX;ball.y=FCY;ball.vx=0;ball.vy=0;
  ballOwner=null;
  // Give possession to kicking team's FWD
  const kickTeam=playerRight?team1:team2;
  ballOwner=kickTeam[2]; // FWD
  if(ballOwner.teamIdx===0)selIdx=2;
  // Set cooldown on opposing players near center to prevent instant steal
  const otherTeam=playerRight?team2:team1;
  for(const p of otherTeam)p.kickCd=45;
}

function startMatch(){
  score=[0,0];half=1;playerRight=true;
  matchElapsed=0;p1GoalsThisMatch=0;maxDeficit=0;
  matchShots=[0,0];lastShotByHuman=false;lastShotDist=0;
  const shopD=ggLoad();
  // Create teams
  const f1=getKickoffFormation(true);
  const f2=getKickoffFormation(false);
  team1=[];team2=[];
  for(let i=0;i<3;i++){
    team1.push(mkPlayer(f1[i].x,f1[i].y,0,f1[i].role,i));
    team2.push(mkPlayer(f2[i].x,f2[i].y,1,f2[i].role,i));
  }
  ball=mkBall();selIdx=playerPos; // control chosen position
  // Give player's team first possession
  ballOwner=team1[2];
  for(const p of team2)p.kickCd=45;
  kickoffTimer=KICKOFF_FRAMES;
  gameState='playing';
  ggTry('ss_first_match');
}

// === SHOP BONUSES ===
function shopBonus(){
  const d=ggLoad();
  return{
    striker:!!d.shopPurchases['ss_star_striker'],
    speed:!!d.shopPurchases['ss_speed_boots']
  };
}

// === BALL PHYSICS ===
function updateBall(){
  if(ballOwner){
    // Ball sticks in front of owner
    const tx=ballOwner.x+Math.cos(ballOwner.angle)*10;
    const ty=ballOwner.y+Math.sin(ballOwner.angle)*10;
    ball.x+=(tx-ball.x)*0.4;
    ball.y+=(ty-ball.y)*0.4;
    ball.vx=0;ball.vy=0;
    return;
  }
  ball.x+=ball.vx;ball.y+=ball.vy;
  ball.vx*=BALL_FRIC;ball.vy*=BALL_FRIC;
  if(Math.abs(ball.vx)<0.05)ball.vx=0;
  if(Math.abs(ball.vy)<0.05)ball.vy=0;

  // Top/bottom walls
  if(ball.y-BALL_R<FT){ball.y=FT+BALL_R;ball.vy*=-0.6;}
  if(ball.y+BALL_R>FB){ball.y=FB-BALL_R;ball.vy*=-0.6;}

  // Left wall / goal
  if(ball.x-BALL_R<FL){
    if(ball.y>GOAL_T&&ball.y<GOAL_B){
      if(ball.x<FL-GOAL_DEPTH){
        // Goal in left net
        const scorer=playerRight?1:0;
        triggerGoal(scorer);return;
      }
    }else{
      ball.x=FL+BALL_R;ball.vx*=-0.6;
    }
  }
  // Right wall / goal
  if(ball.x+BALL_R>FR){
    if(ball.y>GOAL_T&&ball.y<GOAL_B){
      if(ball.x>FR+GOAL_DEPTH){
        const scorer=playerRight?0:1;
        triggerGoal(scorer);return;
      }
    }else{
      ball.x=FR-BALL_R;ball.vx*=-0.6;
    }
  }
}

// === POSSESSION ===
// Ball is a loose physics object. All players auto-pickup on contact.
function updatePossession(){
  if(ballOwner)return;
  const ballSpeed=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  const autoPickup=ballSpeed<0.5?1.0:0.6;
  // Human player gets priority for pickup
  const humanP=team1[selIdx];
  if(humanP.kickCd<=0){
    const d=dist(humanP,ball);
    if(d<CONTROL_R&&Math.random()<autoPickup){
      ballOwner=humanP;
      ball.vx=0;ball.vy=0;
      return;
    }
  }
  // Then all other players
  const all=[...team1,...team2];
  for(const p of all){
    if(p.kickCd>0)continue;
    if(p.teamIdx===0&&p.idx===selIdx)continue; // already checked
    const d=dist(p,ball);
    if(d<CONTROL_R&&Math.random()<autoPickup){
      ballOwner=p;
      ball.vx=0;ball.vy=0;
      return;
    }
  }
}

function checkSteal(){
  if(!ballOwner)return;
  const prevOwner=ballOwner;
  const opponents=ballOwner.teamIdx===0?team2:team1;
  for(const p of opponents){
    if(p.kickCd>0)continue;
    if(p.teamIdx===0&&p.idx===selIdx)continue; // human steals with E
    const d=dist(p,ball);
    if(d<STEAL_R&&Math.random()<0.6){
      prevOwner.kickCd=30;
      ballOwner=p;
      ball.vx=0;ball.vy=0;
      addParticles(ball.x,ball.y,'#ffffff',5);
      break;
    }
  }
}

// === KICK FUNCTIONS ===
function doPass(kicker,teammates,team){
  const atkDir=((kicker.teamIdx===0)===playerRight)?1:-1;
  const isPlayerTeam=kicker.teamIdx===0;
  let best=null,bestScore=-Infinity;
  for(const t of teammates){
    if(t===kicker)continue;
    const dx=t.x-kicker.x,dy=t.y-kicker.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<25||d>350)continue;
    const forward=dx*atkDir;
    let sc=forward/d-d/500;
    // Strongly prefer passing to the human-controlled player
    if(isPlayerTeam&&t.idx===selIdx)sc+=1.5;
    if(sc>bestScore){bestScore=sc;best=t;}
  }
  if(best){
    doPassToPlayer(kicker,best,team);
  }else{
    const a=atkDir>0?0:Math.PI;
    ball.vx=Math.cos(a)*PASS_PWR*team.pas;
    ball.vy=Math.sin(a)*PASS_PWR*team.pas;
    ballOwner=null;kicker.kickCd=20;
    lastShotByHuman=false;
    addParticles(ball.x,ball.y,'#ffffff',3);
  }
}

// Pass directly to a specific player (used for call-for-pass)
function doPassToPlayer(kicker,target,team){
  const a=ang(kicker,target);
  const d=dist(kicker,target);
  const pwr=clamp(PASS_PWR*team.pas*(d/200+0.5),PASS_PWR*0.6,PASS_PWR*1.3);
  ball.vx=Math.cos(a)*pwr;ball.vy=Math.sin(a)*pwr;
  ballOwner=null;kicker.kickCd=20;
  lastShotByHuman=false;
  addParticles(ball.x,ball.y,'#ffffff',3);
}

// Pass to best available teammate (used when human presses Space with ball)
function doPassToTarget(kicker,teammates,team){
  const atkDir=((kicker.teamIdx===0)===playerRight)?1:-1;
  let best=null,bestScore=-Infinity;
  for(const t of teammates){
    if(t===kicker)continue;
    const dx=t.x-kicker.x,dy=t.y-kicker.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<25||d>350)continue;
    // Prefer players in the direction the kicker is facing
    const faceDot=Math.cos(kicker.angle)*(dx/d)+Math.sin(kicker.angle)*(dy/d);
    const forward=dx*atkDir;
    const sc=faceDot*0.5+forward/d*0.3-d/600;
    if(sc>bestScore){bestScore=sc;best=t;}
  }
  if(best){
    doPassToPlayer(kicker,best,team);
  }else{
    // No good target — just kick in facing direction
    ball.vx=Math.cos(kicker.angle)*PASS_PWR*team.pas;
    ball.vy=Math.sin(kicker.angle)*PASS_PWR*team.pas;
    ballOwner=null;kicker.kickCd=20;
    addParticles(ball.x,ball.y,'#ffffff',3);
  }
}

function doShoot(kicker,team,isHuman){
  const atkRight=(kicker.teamIdx===0)===playerRight;
  const goalX=atkRight?FR:FL;
  const goalY=FCY+(Math.random()-0.5)*40;
  const a=Math.atan2(goalY-kicker.y,goalX-kicker.x);
  const bonus=shopBonus();
  const shtMul=isHuman&&bonus.striker?1.15:1.0;
  const pwr=SHOOT_PWR*team.sht*shtMul*(0.9+Math.random()*0.2);
  ball.vx=Math.cos(a)*pwr;ball.vy=Math.sin(a)*pwr;
  if(isHuman){
    lastShotByHuman=true;
    lastShotDist=Math.abs(kicker.x-goalX);
    matchShots[0]++;
  }else{
    lastShotByHuman=false;
    matchShots[1]++;
  }
  ballOwner=null;kicker.kickCd=20;
  addParticles(ball.x,ball.y,'#ffff00',5);
}

// === PARTICLES ===
function addParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=1+Math.random()*2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:15+Math.random()*10,color,r:1+Math.random()});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// === PLAYER CONTROL (HUMAN) ===
function updateHumanPlayer(){
  const sp=team1[selIdx];
  const t=TEAMS[playerTeam];
  const bonus=shopBonus();
  const spd=t.spd*(bonus.speed?1.1:1.0);

  // Mouse controls facing direction
  const aimAngle=Math.atan2(mouseY-sp.y,mouseX-sp.x);
  sp.angle=aimAngle;

  // W = forward (toward mouse), S = backward
  let forward=0;
  if(keys['KeyW'])forward=1;
  if(keys['KeyS'])forward=-1;

  const hasBall=ballOwner===sp;
  const sprinting=keys['ShiftLeft']||keys['ShiftRight'];
  const sprintMul=sprinting?1.8:1.0;
  const moveSpd=(hasBall?spd*0.85:spd)*sprintMul;
  sp.vx=Math.cos(aimAngle)*forward*moveSpd;
  sp.vy=Math.sin(aimAngle)*forward*moveSpd;

  sp.x+=sp.vx;sp.y+=sp.vy;
  sp.x=clamp(sp.x,FL+PLAYER_R,FR-PLAYER_R);
  sp.y=clamp(sp.y,FT+PLAYER_R,FB-PLAYER_R);

  // SPACE = pick up ball / shoot
  if(jp['Space']&&sp.kickCd<=0){
    if(hasBall){
      // Kick ball forward in facing direction
      const pwr=SHOOT_PWR*(bonus.striker?1.15:1.0);
      ball.vx=Math.cos(sp.angle)*pwr;
      ball.vy=Math.sin(sp.angle)*pwr;
      ballOwner=null;sp.kickCd=20;
      lastShotByHuman=true;
      const goalX=playerRight?FR:FL;
      lastShotDist=Math.abs(sp.x-goalX);
      matchShots[0]++;
      addParticles(ball.x,ball.y,'#ffff00',5);
    }else{
      // Try to pick up loose ball
      const d=dist(sp,ball);
      if(d<CONTROL_R&&!ballOwner){
        ballOwner=sp;ball.vx=0;ball.vy=0;
      }
      // Try to steal from opponent
      if(ballOwner&&ballOwner.teamIdx!==0&&d<STEAL_R+4){
        ballOwner.kickCd=30;
        ballOwner=sp;ball.vx=0;ball.vy=0;
        addParticles(ball.x,ball.y,'#ffffff',5);
      }
    }
  }

  // E = call for pass (when player doesn't have ball) or pass to teammate (when player has ball)
  if(jp['KeyE']&&sp.kickCd<=0){
    if(hasBall){
      // Pass to best teammate
      doPassToTarget(sp,team1,TEAMS[playerTeam]);
    }else if(callForPassCd<=0){
      // Call for pass — find teammate with ball and make them pass to us
      for(const tm of team1){
        if(tm===sp)continue;
        if(ballOwner===tm&&tm.kickCd<=0){
          doPassToPlayer(tm,sp,TEAMS[playerTeam]);
          callForPassCd=30;
          break;
        }
      }
    }
  }
  if(callForPassCd>0)callForPassCd--;

  // Cooldowns
  for(const p of team1)if(p.kickCd>0)p.kickCd--;
}

// === TEAMMATE AI ===
function updateTeammateAI(){
  const t=TEAMS[playerTeam];
  const bonus=shopBonus();
  const spd=t.spd*(bonus.speed?1.1:1.0);
  const baseForms=getFormation(playerRight);

  // Find closest non-selected, non-GK teammate to ball (chaser)
  let chaserIdx=-1,chaserDist=Infinity;
  for(let i=0;i<team1.length;i++){
    if(i===selIdx||team1[i].role==='GK')continue;
    const d=dist(team1[i],ball);
    if(d<chaserDist){chaserDist=d;chaserIdx=i;}
  }

  for(let i=0;i<team1.length;i++){
    if(i===selIdx)continue;
    const p=team1[i];
    if(p.kickCd>0)p.kickCd--;

    if(p.role==='GK'){
      updateGK(p,playerRight,spd*1.3);
      continue;
    }

    if(ballOwner===p&&p.kickCd<=0){
      // Teammate has ball — pass to human player ASAP
      const goalX=playerRight?FR:FL;
      const distToGoal=Math.abs(p.x-goalX);
      const humanP=team1[selIdx];
      const distToHuman=dist(p,humanP);
      const humanOpen=distToHuman>25&&distToHuman<350;
      // Track how long this teammate has held the ball
      if(!p._holdFrames)p._holdFrames=0;
      p._holdFrames++;
      // Priority 1: Pass to human player — very high chance, increases over time
      const passToHumanChance=Math.min(0.12+p._holdFrames*0.008,0.5);
      if(humanOpen&&Math.random()<passToHumanChance){
        doPassToPlayer(p,humanP,t);
        p._holdFrames=0;
      }else if(distToGoal<130&&Math.random()<0.04){
        doShoot(p,t,true);
        p._holdFrames=0;
      }else if(p._holdFrames>60&&Math.random()<0.06){
        // Held too long, pass to anyone
        doPass(p,team1,t);
        p._holdFrames=0;
      }else{
        const a=Math.atan2(FCY-p.y,goalX-p.x);
        p.vx=Math.cos(a)*spd*0.85;
        p.vy=Math.sin(a)*spd*0.85;
        p.angle=a;
      }
    }else if(i===chaserIdx&&!ballOwner){
      // Chase loose ball
      const a=ang(p,ball);
      p.vx=Math.cos(a)*spd;
      p.vy=Math.sin(a)*spd;
      p.angle=a;
    }else{
      // Move towards formation position shifted by ball
      const base=baseForms[i];
      const shiftX=(ball.x-FCX)*0.25;
      const shiftY=(ball.y-FCY)*0.15;
      const tx=clamp(base.x+shiftX,FL+15,FR-15);
      const ty=clamp(base.y+shiftY,FT+15,FB-15);
      const d=dist(p,{x:tx,y:ty});
      if(d>5){
        const a=Math.atan2(ty-p.y,tx-p.x);
        p.vx=Math.cos(a)*Math.min(spd*0.7,d*0.08);
        p.vy=Math.sin(a)*Math.min(spd*0.7,d*0.08);
        p.angle=a;
      }else{p.vx=0;p.vy=0;}
    }
    p.x+=p.vx;p.y+=p.vy;
    p.x=clamp(p.x,FL+PLAYER_R,FR-PLAYER_R);
    p.y=clamp(p.y,FT+PLAYER_R,FB-PLAYER_R);
  }
}

// === GK AI (shared) ===
function updateGK(p,isAttackingRight,spd){
  // GK defends own goal (opposite side from attack direction)
  const gkX=isAttackingRight?FL+20:FR-20;
  const targetY=clamp(ball.y,GOAL_T+10,GOAL_B-10);
  const dx=gkX-p.x,dy=targetY-p.y;

  // Rush out if ball is very close
  const bd=dist(p,ball);
  if(bd<50&&!ballOwner){
    const a=ang(p,ball);
    p.vx=Math.cos(a)*spd*0.7;
    p.vy=Math.sin(a)*spd*0.7;
  }else{
    p.vx=dx*0.04;
    p.vy=dy*0.06;
  }
  p.x+=p.vx;p.y+=p.vy;
  p.x=clamp(p.x,FL+PLAYER_R,FR-PLAYER_R);
  p.y=clamp(p.y,FT+PLAYER_R,FB-PLAYER_R);
  if(p.vx||p.vy)p.angle=Math.atan2(p.vy,p.vx);

  // If GK has ball, try to pass to human player, else kick upfield
  if(ballOwner===p&&p.kickCd<=0){
    // Check if human player is on the same team and open
    const isPlayerTeamGK=p.teamIdx===0;
    if(isPlayerTeamGK){
      const humanP=team1[selIdx];
      const dh=dist(p,humanP);
      if(dh>30&&dh<350&&Math.random()<0.7){
        doPassToPlayer(p,humanP,TEAMS[playerTeam]);
      }else{
        const kickDir=isAttackingRight?0:Math.PI;
        const spread=(Math.random()-0.5)*1.0;
        ball.vx=Math.cos(kickDir+spread)*SHOOT_PWR*0.7;
        ball.vy=Math.sin(kickDir+spread)*SHOOT_PWR*0.7;
        ballOwner=null;p.kickCd=25;lastShotByHuman=false;
      }
    }else{
      const kickDir=isAttackingRight?0:Math.PI;
      const spread=(Math.random()-0.5)*1.0;
      ball.vx=Math.cos(kickDir+spread)*SHOOT_PWR*0.7;
      ball.vy=Math.sin(kickDir+spread)*SHOOT_PWR*0.7;
      ballOwner=null;p.kickCd=25;lastShotByHuman=false;
    }
  }
}

// === OPPONENT AI ===
function updateOpponentAI(){
  const t=TEAMS[aiTeam];
  const aiRight=!playerRight;
  const spd=t.spd*0.9; // slight handicap
  const baseForms=getFormation(aiRight);

  // Find chaser (closest non-GK to ball)
  let chaserIdx=-1,chaserDist=Infinity;
  for(let i=0;i<team2.length;i++){
    if(team2[i].role==='GK')continue;
    const d=dist(team2[i],ball);
    if(d<chaserDist){chaserDist=d;chaserIdx=i;}
  }

  for(let i=0;i<team2.length;i++){
    const p=team2[i];
    if(p.kickCd>0)p.kickCd--;

    if(p.role==='GK'){
      updateGK(p,aiRight,spd*1.3);
      continue;
    }

    if(i===chaserIdx){
      // Chase ball or act on possession
      if(ballOwner===p){
        // Has ball - decide action
        const goalX=aiRight?FR:FL;
        const distToGoal=Math.abs(p.x-goalX);
        if(distToGoal<150&&p.kickCd<=0&&Math.random()<0.05){
          // Shoot
          doShoot(p,t,false);
        }else if(Math.random()<0.03&&p.kickCd<=0){
          // Pass to teammate
          doPass(p,team2,t);
        }else{
          // Dribble towards goal
          const a=Math.atan2(FCY-p.y,goalX-p.x);
          p.vx=Math.cos(a)*spd*0.85;
          p.vy=Math.sin(a)*spd*0.85;
          p.angle=a;
        }
      }else{
        // Chase ball
        const a=ang(p,ball);
        p.vx=Math.cos(a)*spd;
        p.vy=Math.sin(a)*spd;
        p.angle=a;
      }
    }else{
      // Move towards home position shifted by ball
      const base=baseForms[i];
      const isAtk=ballOwner&&ballOwner.teamIdx===1;
      const shiftX=(ball.x-FCX)*(isAtk?0.3:0.2);
      const shiftY=(ball.y-FCY)*0.15;
      const fwdShift=isAtk?(p.role==='FWD'?40:p.role==='MID'?20:0):(p.role==='DEF'?-25:p.role==='MID'?-15:0);
      const dir=aiRight?1:-1;
      const tx=clamp(base.x+shiftX+fwdShift*dir,FL+15,FR-15);
      const ty=clamp(base.y+shiftY,FT+15,FB-15);
      const d=dist(p,{x:tx,y:ty});
      if(d>5){
        const a=Math.atan2(ty-p.y,tx-p.x);
        p.vx=Math.cos(a)*Math.min(spd*0.7,d*0.08);
        p.vy=Math.sin(a)*Math.min(spd*0.7,d*0.08);
        p.angle=a;
      }else{p.vx=0;p.vy=0;}
    }
    p.x+=p.vx;p.y+=p.vy;
    p.x=clamp(p.x,FL+PLAYER_R,FR-PLAYER_R);
    p.y=clamp(p.y,FT+PLAYER_R,FB-PLAYER_R);
  }
}

// === GOAL HANDLING ===
function triggerGoal(teamIdx){
  score[teamIdx]++;
  goalBy=teamIdx;goalTimer=180;
  if(teamIdx===0){
    p1GoalsThisMatch++;
    if(lastShotByHuman&&lastShotDist>FW*0.4)ggTry('ss_screamer');
    if(p1GoalsThisMatch>=3)ggTry('ss_hat_trick');
  }
  const deficit=score[1]-score[0];
  if(deficit>maxDeficit)maxDeficit=deficit;

  // Confetti
  const gx=teamIdx===0?(playerRight?FR:FL):(playerRight?FL:FR);
  for(let i=0;i<20;i++){
    addParticles(gx,FCY,TEAMS[teamIdx===0?playerTeam:aiTeam].pri,3);
  }
  gameState='goalScored';
}

// === HALF/MATCH FLOW ===
function endHalf(){
  if(half===1){
    half=2;playerRight=!playerRight;
    matchElapsed=0;
    gameState='halfTime';halfTimer=0;
  }else{
    endMatch();
  }
}

function endMatch(){
  gameState='matchEnd';endTimer=0;
  const stats=loadStats();
  stats.totalMatches++;
  stats.goalsScored+=p1GoalsThisMatch;
  const won=score[0]>score[1];
  if(won){
    stats.wins++;
    const tn=TEAMS[playerTeam].name;
    if(!stats.teamWins)stats.teamWins={};
    stats.teamWins[tn]=true;
    ggTry('ss_first_win');
    if(score[1]===0)ggTry('ss_clean_sheet');
    if(score[0]-score[1]>=3)ggTry('ss_blowout');
    if(maxDeficit>=1)ggTry('ss_comeback');
    // Check all teams
    const allTeamNames=TEAMS.map(t=>t.name);
    if(allTeamNames.every(n=>stats.teamWins[n]))ggTry('ss_all_teams');
  }
  if(stats.totalMatches>=5)ggTry('ss_veteran');
  if(stats.goalsScored>=20)ggTry('ss_golden_boot');
  saveStats(stats);
}

// === UPDATE ===
function update(timestamp){
  frameCount++;
  const dt=lastTime?(timestamp-lastTime)/1000:0;
  lastTime=timestamp;

  switch(gameState){
    case 'title':
      if(jp['Space'])gameState='teamSelect';
      break;

    case 'teamSelect':
      if(jp['ArrowLeft']||jp['KeyA'])teamSelIdx=(teamSelIdx+5)%6;
      if(jp['ArrowRight']||jp['KeyD'])teamSelIdx=(teamSelIdx+1)%6;
      if(jp['ArrowUp']||jp['KeyW'])teamSelIdx=(teamSelIdx+3)%6;
      if(jp['ArrowDown']||jp['KeyS'])teamSelIdx=(teamSelIdx+3)%6;
      if(jp['Space']){
        playerTeam=teamSelIdx;
        aiTeam=(playerTeam+1+Math.floor(Math.random()*(TEAMS.length-1)))%TEAMS.length;
        gameState='posSelect';
      }
      break;

    case 'posSelect':
      if(jp['ArrowUp']||jp['KeyW'])posSelIdx=(posSelIdx+2)%3;
      if(jp['ArrowDown']||jp['KeyS'])posSelIdx=(posSelIdx+1)%3;
      if(jp['Space']){
        playerPos=POSITIONS[posSelIdx].idx;
        gameState='tutorial';tutorialTimer=0;
      }
      break;

    case 'tutorial':
      tutorialTimer++;
      if((jp['Space'])&&tutorialTimer>30){
        startMatch();
      }
      break;

    case 'playing':
      if(kickoffTimer>0){kickoffTimer--;break;}
      matchElapsed+=dt;
      if(matchElapsed>=HALF_SEC){endHalf();break;}
      updateHumanPlayer();
      updateTeammateAI();
      updateOpponentAI();
      updateBall();
      updatePossession();
      checkSteal();
      updateParticles();
      break;

    case 'goalScored':
      goalTimer--;
      updateParticles();
      if(goalTimer<=0){
        resetPositions(true);
        kickoffTimer=KICKOFF_FRAMES;
        gameState='playing';
      }
      break;

    case 'halfTime':
      halfTimer++;
      if((jp['Space'])&&halfTimer>30){
        resetPositions(true);
        kickoffTimer=KICKOFF_FRAMES;
        matchElapsed=0;
        gameState='playing';
      }
      break;

    case 'matchEnd':
      endTimer++;
      if((jp['Space'])&&endTimer>60){
        gameState='title';
      }
      break;
  }
  clearJP();
}

// === RENDER ===
const gameCanvas=document.createElement('canvas');
gameCanvas.width=GAME_W;gameCanvas.height=GAME_H;
const G=gameCanvas.getContext('2d');
const dispCanvas=document.getElementById('game-canvas');
const D=dispCanvas.getContext('2d');

function render(){
  G.clearRect(0,0,GAME_W,GAME_H);
  switch(gameState){
    case 'title':drawTitle();break;
    case 'teamSelect':drawTeamSelect();break;
    case 'posSelect':drawPosSelect();break;
    case 'tutorial':drawTutorial();break;
    case 'playing':drawMatch();break;
    case 'goalScored':drawMatch();drawGoalOverlay();break;
    case 'halfTime':drawHalfTime();break;
    case 'matchEnd':drawMatchEnd();break;
  }
  // Scale to display
  dispCanvas.width=dispCanvas.clientWidth;
  dispCanvas.height=dispCanvas.clientHeight;
  D.imageSmoothingEnabled=false;
  const scale=Math.min(dispCanvas.width/GAME_W,dispCanvas.height/GAME_H);
  const ox=(dispCanvas.width-GAME_W*scale)/2;
  const oy=(dispCanvas.height-GAME_H*scale)/2;
  D.fillStyle='#0a0a0f';D.fillRect(0,0,dispCanvas.width,dispCanvas.height);
  D.drawImage(gameCanvas,ox,oy,GAME_W*scale,GAME_H*scale);
}

// === DRAW: TITLE ===
function drawTitle(){

  G.fillStyle='#0e2e0e';G.fillRect(0,0,GAME_W,GAME_H);
  // Subtle field pattern
  G.strokeStyle='rgba(255,255,255,0.05)';G.lineWidth=1;
  G.strokeRect(80,60,GAME_W-160,GAME_H-120);
  G.beginPath();G.moveTo(GAME_W/2,60);G.lineTo(GAME_W/2,GAME_H-60);G.stroke();
  G.beginPath();G.arc(GAME_W/2,GAME_H/2,60,0,Math.PI*2);G.stroke();

  // Title
  G.fillStyle='#c9a84c';
  G.font='bold 36px Cinzel,serif';G.textAlign='center';G.textBaseline='middle';
  G.fillText('SUPER SOCCER',GAME_W/2,120);

  // Soccer ball animation
  const by=180+Math.sin(frameCount*0.05)*15;
  G.fillStyle='#ffffff';G.beginPath();G.arc(GAME_W/2,by,14,0,Math.PI*2);G.fill();
  G.strokeStyle='#333';G.lineWidth=1.5;G.stroke();
  // Pentagon pattern

  for(let i=0;i<3;i++){

  }

  // Prompt
  if(Math.floor(frameCount/30)%2===0){
    G.fillStyle='#ffffff';G.font='14px Cinzel,serif';

  }

  G.fillStyle='#888';G.font='10px sans-serif';
  G.fillText('MOUSE: Aim | W/S: Move | SHIFT: Sprint | E: Pass | SPACE: Shoot',GAME_W/2,320);
}

    G.fillStyle='#fff';G.font='bold 13px sans-serif';G.textAlign='left';
    G.fillText(c.label,205,cy+20);

    // Description
    G.fillStyle='#999';G.font='11px sans-serif';
    G.fillText(c.desc,205,cy+38);

    G.globalAlpha=1;
  }

  // Tip box
  const tipY=startY+controls.length*rowH+10;
  const tipFade=clamp((tutorialTimer-50)/20,0,1);
  G.globalAlpha=tipFade;
  G.fillStyle='rgba(201,168,76,0.08)';
  G.fillRect(80,tipY,GAME_W-160,50);
  G.strokeStyle='#c9a84c55';G.lineWidth=1;
  G.strokeRect(80,tipY,GAME_W-160,50);
  G.fillStyle='#c9a84c';G.font='bold 12px sans-serif';G.textAlign='center';
  G.fillText('TIP: Your teammates will look for you!',GAME_W/2,tipY+18);
  G.fillStyle='#aaa';G.font='11px sans-serif';
  G.fillText('Press SPACE to call for the ball and get in the action.',GAME_W/2,tipY+36);
  G.globalAlpha=1;

  // Continue prompt
  if(tutorialTimer>30&&Math.floor(frameCount/30)%2===0){
    G.fillStyle='#fff';G.font='13px Cinzel,serif';G.textAlign='center';
    G.fillText('PRESS SPACE TO START MATCH',GAME_W/2,GAME_H-18);
  }
}

// === DRAW: MATCH ===
function drawMatch(){
  // Background
  G.fillStyle='#1a3a1a';G.fillRect(0,0,GAME_W,GAME_H);

  drawField();
  drawGoals();

  // Draw players (sorted by y for overlap)
  const all=[...team1.map(p=>({...p,tIdx:0})),...team2.map(p=>({...p,tIdx:1}))];
  all.sort((a,b)=>a.y-b.y);
  for(const p of all){
    const t=p.tIdx===0?TEAMS[playerTeam]:TEAMS[aiTeam];
    const isSel=p.tIdx===0&&p.idx===selIdx;
    drawPlayer(p,t,isSel);
  }

  // Ball
  drawBallSprite();

  // Particles
  for(const p of particles){
    const alpha=p.life/25;
    G.globalAlpha=alpha;G.fillStyle=p.color;
    G.beginPath();G.arc(p.x,p.y,p.r,0,Math.PI*2);G.fill();
  }
  G.globalAlpha=1;

  // HUD
  drawHUD();

  // Kickoff overlay
  if(kickoffTimer>0){
    G.fillStyle='rgba(0,0,0,0.4)';G.fillRect(0,0,GAME_W,GAME_H);
    G.fillStyle='#ffffff';G.font='bold 24px Cinzel,serif';
    G.textAlign='center';G.textBaseline='middle';
    if(kickoffTimer>45)G.fillText('KICK OFF',FCX,FCY);
    else G.fillText('PLAY!',FCX,FCY);
  }
}

function drawField(){
  // Grass with stripes
  const stripeW=FW/10;
  for(let i=0;i<10;i++){
    G.fillStyle=i%2===0?'#2d6b27':'#2a6224';
    G.fillRect(FL+i*stripeW,FT,stripeW,FH);
  }

  // Field lines
  G.strokeStyle='rgba(255,255,255,0.7)';G.lineWidth=1.5;

  // Boundary
  G.strokeRect(FL,FT,FW,FH);

  // Center line
  G.beginPath();G.moveTo(FCX,FT);G.lineTo(FCX,FB);G.stroke();

  // Center circle
  G.beginPath();G.arc(FCX,FCY,CENTER_R,0,Math.PI*2);G.stroke();

  // Center spot
  G.fillStyle='rgba(255,255,255,0.7)';
  G.beginPath();G.arc(FCX,FCY,3,0,Math.PI*2);G.fill();

  // Penalty areas
  G.strokeRect(FL,PEN_T,PEN_W,PEN_B-PEN_T);
  G.strokeRect(FR-PEN_W,PEN_T,PEN_W,PEN_B-PEN_T);

  // Goal areas
  G.strokeRect(FL,GA_T,GA_W,GA_B-GA_T);
  G.strokeRect(FR-GA_W,GA_T,GA_W,GA_B-GA_T);

  // Penalty spots
  G.fillStyle='rgba(255,255,255,0.7)';
  G.beginPath();G.arc(FL+PEN_SPOT,FCY,2,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(FR-PEN_SPOT,FCY,2,0,Math.PI*2);G.fill();

  // Corner arcs
  const cr=10;
  G.beginPath();G.arc(FL,FT,cr,0,Math.PI/2);G.stroke();
  G.beginPath();G.arc(FR,FT,cr,Math.PI/2,Math.PI);G.stroke();
  G.beginPath();G.arc(FR,FB,cr,Math.PI,Math.PI*1.5);G.stroke();
  G.beginPath();G.arc(FL,FB,cr,Math.PI*1.5,Math.PI*2);G.stroke();
}

function drawGoals(){
  const gd=GOAL_DEPTH;
  // Left goal
  G.fillStyle='rgba(200,200,200,0.12)';
  G.fillRect(FL-gd,GOAL_T,gd,GOAL_B-GOAL_T);
  G.strokeStyle='rgba(255,255,255,0.2)';G.lineWidth=0.5;
  for(let y=GOAL_T;y<=GOAL_B;y+=6){G.beginPath();G.moveTo(FL-gd,y);G.lineTo(FL,y);G.stroke();}
  for(let x=FL-gd;x<=FL;x+=6){G.beginPath();G.moveTo(x,GOAL_T);G.lineTo(x,GOAL_B);G.stroke();}
  // Posts
  G.fillStyle='#ffffff';
  G.fillRect(FL-2,GOAL_T-2,4,4);G.fillRect(FL-2,GOAL_B-2,4,4);
  // Crossbar
  G.strokeStyle='#ffffff';G.lineWidth=2;
  G.beginPath();G.moveTo(FL-gd,GOAL_T);G.lineTo(FL,GOAL_T);G.stroke();
  G.beginPath();G.moveTo(FL-gd,GOAL_B);G.lineTo(FL,GOAL_B);G.stroke();
  G.beginPath();G.moveTo(FL-gd,GOAL_T);G.lineTo(FL-gd,GOAL_B);G.stroke();

  // Right goal
  G.fillStyle='rgba(200,200,200,0.12)';
  G.fillRect(FR,GOAL_T,gd,GOAL_B-GOAL_T);
  G.strokeStyle='rgba(255,255,255,0.2)';G.lineWidth=0.5;
  for(let y=GOAL_T;y<=GOAL_B;y+=6){G.beginPath();G.moveTo(FR,y);G.lineTo(FR+gd,y);G.stroke();}
  for(let x=FR;x<=FR+gd;x+=6){G.beginPath();G.moveTo(x,GOAL_T);G.lineTo(x,GOAL_B);G.stroke();}
  G.fillStyle='#ffffff';
  G.fillRect(FR-2,GOAL_T-2,4,4);G.fillRect(FR-2,GOAL_B-2,4,4);
  G.strokeStyle='#ffffff';G.lineWidth=2;
  G.beginPath();G.moveTo(FR,GOAL_T);G.lineTo(FR+gd,GOAL_T);G.stroke();
  G.beginPath();G.moveTo(FR,GOAL_B);G.lineTo(FR+gd,GOAL_B);G.stroke();
  G.beginPath();G.moveTo(FR+gd,GOAL_T);G.lineTo(FR+gd,GOAL_B);G.stroke();
}

function drawPlayer(p,team,isSel){
  // Shadow
  G.fillStyle='rgba(0,0,0,0.25)';
  G.beginPath();G.ellipse(p.x,p.y+PLAYER_R,PLAYER_R*0.7,PLAYER_R*0.3,0,0,Math.PI*2);G.fill();

  // Body
  G.fillStyle=team.pri;
  G.beginPath();G.arc(p.x,p.y,PLAYER_R,0,Math.PI*2);G.fill();
  G.strokeStyle=team.sec;G.lineWidth=1.5;G.stroke();

  // Position label
  G.fillStyle=team.sec;G.font='bold 7px sans-serif';
  G.textAlign='center';G.textBaseline='middle';
  G.fillText(p.role[0],p.x,p.y);

  // Selected ring
  if(isSel){
    const pr=PLAYER_R+3+Math.sin(frameCount*0.12)*2;
    G.strokeStyle='#c9a84c';G.lineWidth=2;
    G.beginPath();G.arc(p.x,p.y,pr,0,Math.PI*2);G.stroke();
  }
}

function drawBallSprite(){
  if(!ball)return;
  // Shadow
  G.fillStyle='rgba(0,0,0,0.3)';
  G.beginPath();G.ellipse(ball.x+1,ball.y+2,BALL_R+1,BALL_R*0.5,0,0,Math.PI*2);G.fill();
  // Ball
  G.fillStyle='#ffffff';
  G.beginPath();G.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);G.fill();
  G.strokeStyle='#444';G.lineWidth=1;G.stroke();
}

function drawHUD(){
  const t1=TEAMS[playerTeam],t2=TEAMS[aiTeam];
  // Score background
  G.fillStyle='rgba(0,0,0,0.6)';
  G.fillRect(GAME_W/2-120,0,240,34);

  // Team names
  G.font='bold 10px sans-serif';
  G.textAlign='right';G.fillStyle=t1.pri;
  G.fillText(t1.name,GAME_W/2-35,14);
  G.textAlign='left';G.fillStyle=t2.pri;
  G.fillText(t2.name,GAME_W/2+35,14);

  // Score
  G.font='bold 18px sans-serif';G.textAlign='center';G.fillStyle='#fff';
  G.fillText(score[0]+' - '+score[1],GAME_W/2,16);

  // Timer
  const matchMin=Math.floor(matchElapsed*45/HALF_SEC);
  const dispMin=half===1?matchMin:45+matchMin;
  const remaining=HALF_SEC-matchElapsed;
  G.font='9px sans-serif';
  G.fillStyle=remaining<10?'#ff4444':'#c9a84c';
  G.fillText((half===1?'1ST':'2ND')+' HALF  '+dispMin+"'",GAME_W/2,28);
}

// === DRAW: GOAL OVERLAY ===
function drawGoalOverlay(){
  G.fillStyle='rgba(0,0,0,0.3)';G.fillRect(0,0,GAME_W,GAME_H);
  const t=goalBy===0?TEAMS[playerTeam]:TEAMS[aiTeam];
  const scale=1+Math.sin(goalTimer*0.1)*0.1;
  G.save();G.translate(FCX,FCY-20);G.scale(scale,scale);
  G.fillStyle=t.pri;G.font='bold 40px Cinzel,serif';
  G.textAlign='center';G.textBaseline='middle';
  G.fillText('GOAL!',0,0);
  G.restore();
  G.fillStyle='#fff';G.font='16px Cinzel,serif';
  G.textAlign='center';
  G.fillText(t.name+' SCORES!',FCX,FCY+30);
  G.fillStyle='#c9a84c';G.font='bold 20px sans-serif';
  G.fillText(score[0]+' - '+score[1],FCX,FCY+60);
}

// === DRAW: HALF TIME ===
function drawHalfTime(){
  G.fillStyle='#0e2e0e';G.fillRect(0,0,GAME_W,GAME_H);
  G.fillStyle='#c9a84c';G.font='bold 28px Cinzel,serif';
  G.textAlign='center';G.textBaseline='middle';
  G.fillText('HALF TIME',GAME_W/2,100);
  G.fillStyle='#fff';G.font='bold 36px sans-serif';
  G.fillText(score[0]+' - '+score[1],GAME_W/2,160);
  const t1=TEAMS[playerTeam],t2=TEAMS[aiTeam];
  G.font='14px sans-serif';
  G.fillStyle=t1.pri;G.textAlign='right';G.fillText(t1.name,GAME_W/2-50,160);
  G.fillStyle=t2.pri;G.textAlign='left';G.fillText(t2.name,GAME_W/2+50,160);
  if(halfTimer>30){
    G.fillStyle='#888';G.font='12px sans-serif';G.textAlign='center';
    G.fillText('Press SPACE to continue',GAME_W/2,240);
  }
}

// === DRAW: MATCH END ===
function drawMatchEnd(){
  G.fillStyle='#0e2e0e';G.fillRect(0,0,GAME_W,GAME_H);
  G.fillStyle='#c9a84c';G.font='bold 24px Cinzel,serif';
  G.textAlign='center';G.textBaseline='middle';
  G.fillText('FULL TIME',GAME_W/2,50);

  const t1=TEAMS[playerTeam],t2=TEAMS[aiTeam];
  G.fillStyle='#fff';G.font='bold 40px sans-serif';
  G.fillText(score[0]+' - '+score[1],GAME_W/2,100);
  G.font='14px sans-serif';
  G.fillStyle=t1.pri;G.textAlign='right';G.fillText(t1.name,GAME_W/2-55,100);
  G.fillStyle=t2.pri;G.textAlign='left';G.fillText(t2.name,GAME_W/2+55,100);

  // Result
  const won=score[0]>score[1],drew=score[0]===score[1];
  G.font='bold 20px Cinzel,serif';G.textAlign='center';
  G.fillStyle=won?'#4caf50':drew?'#c9a84c':'#e63946';
  G.fillText(won?'YOU WIN!':drew?'DRAW':'YOU LOSE',GAME_W/2,150);

  // Stats
  G.font='12px sans-serif';G.fillStyle='#aaa';G.textAlign='center';
  G.fillText('Shots: '+matchShots[0]+' - '+matchShots[1],GAME_W/2,190);
  G.fillText('Your Goals: '+p1GoalsThisMatch,GAME_W/2,210);

  // Stats totals
  const stats=loadStats();
  G.fillStyle='#888';G.font='10px sans-serif';
  G.fillText('Career: '+stats.totalMatches+' matches, '+stats.wins+' wins, '+stats.goalsScored+' goals',GAME_W/2,250);

  if(endTimer>60){
    G.fillStyle='#888';G.font='12px sans-serif';
    G.fillText('Press SPACE to continue',GAME_W/2,300);
  }
}

// === GAME LOOP ===
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  }else{
    document.exitFullscreen();
  }
}

function gameLoop(ts){
  update(ts);
  render();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
